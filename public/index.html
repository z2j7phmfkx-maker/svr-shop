
  <div id="authContainer" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 100%); align-items: center; justify-content: center; z-index: 10000; flex-direction: column;">
    <div style="text-align: center; color: #fff;">
      <h1 style="color: #00d4ff; margin-bottom: 20px;">🔐 Vérification d'accès</h1>
      <p style="color: #aaa; margin-bottom: 30px; font-size: 14px;">Vérification de votre accès en cours...</p>
      <div style="width: 40px; height: 40px; border: 3px solid #00d4ff; border-top-color: #00ff64; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
    </div>
  </div>

  <div id="deniedContainer" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 100%); align-items: center; justify-content: center; z-index: 10000;">
    <div style="text-align: center; color: #fff; padding: 20px;">
      <h1 style="color: #ff4444; margin-bottom: 20px;">❌ Accès Refusé</h1>
      <p style="color: #aaa; margin-bottom: 30px;">Tu dois rejoindre le channel @SVR_TO pour accéder au shop.</p>
      <a href="https://t.me/SVR_TO" style="background: linear-gradient(135deg, #00d4ff, #00ff64); color: #000; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; display: inline-block;">Rejoindre le channel</a>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script>
    async function verifyAccess() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('deniedContainer').style.display = 'flex';
        return;
      }

      try {
        const res = await fetch(`/api/verify-token?token=${token}`);
        const data = await res.json();

        if (data.valid) {
          document.getElementById('authContainer').style.display = 'none';
          document.getElementById('deniedContainer').style.display = 'none';
          console.log('✅ Accès autorisé');
        } else {
          document.getElementById('authContainer').style.display = 'none';
          document.getElementById('deniedContainer').style.display = 'flex';
        }
      } catch (error) {
        console.error('Error verifying token:', error);
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('deniedContainer').style.display = 'flex';
      }
    }

    window.addEventListener('load', verifyAccess);
  </script>

<!DOCTYPE html>

<body>
    <div class="concours-banner" id="concoursBanner" style="display: none;">
        <h2>🎁 Concours</h2>
        <p id="concoursDesc"></p>
    </div>

    <div class="container">
        <div class="catalogue-title">📦 Catalogue</div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <a href="/admin" class="admin-link" title="Admin">⚙️</a>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            
            <h2 id="modalProductName"></h2>
            <p id="modalProductDesc"></p>

            <!-- Galerie (avec image principale + galerie) -->
            <div class="gallery-modal" id="gallerySection" style="display: none;">
                <img id="modalMainImage" class="main-image" />
                <div class="thumbnails" id="modalThumbnails"></div>
            </div>

            <!-- Tarifs -->
            <div class="tariffs-section" id="tariffsSection" style="display: none;">
                <h3>💰 Tarifs</h3>
                <div id="tariffsList"></div>
            </div>

            <!-- Vidéos -->
            <div class="videos-section" id="videosSection" style="display: none;">
                <h3>🎥 Vidéos</h3>
                <div id="videosList"></div>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let currentProduct = null;
        let currentImageIndex = 0;

        // LOAD DATA
        async function loadData() {
            try {
                const res = await fetch('/data.json');
                const data = await res.json();
                
                // Afficher concours
                if (data.concours && data.concours.description) {
                    document.getElementById('concoursDesc').textContent = data.concours.description;
                    document.getElementById('concoursBanner').style.display = 'block';
                }
                
                // Afficher produits
                products = data.products || [];
                displayProducts();
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            const today = new Date();
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => showProductDetails(product);
                
                // Min price
                const minPrice = Math.min(...product.tariffs.split('|').map(t => {
                    const [_, price] = t.split('=');
                    return parseFloat(price);
                }));
                
                // Stock class
                const stockClass = product.stock.toLowerCase().replace('ô', 'o');
                
                // Vérifier si le badge "Nouveau" est valide
                const isNewValid = product.isNew && product.newUntil && new Date(product.newUntil) > today;
                const hasPromo = product.promoTariffs ? true : false;
                
                // Badges
                let badgesHTML = '';
                if (isNewValid) {
                    badgesHTML += '<span class="badge-new">✨ NOUVEAU</span>';
                }
                if (hasPromo) {
                    badgesHTML += '<span class="badge-promo">🏷️ PROMO</span>';
                }
                
                card.innerHTML = `
                    <img src="${product.image}" class="product-image" alt="${product.name}" loading="lazy" />
                    <div class="product-info">
                        ${badgesHTML ? `<div class="product-badges">${badgesHTML}</div>` : ''}
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">À partir de <span class="product-price-value">${minPrice}€</span></div>
                        <div class="product-stock ${stockClass}">
                            <span class="stock-indicator"></span>
                            ${product.stock}
                        </div>
                        <div class="product-icons">
                            ${product.gallery && product.gallery.length > 0 ? '📸' : ''}
                            ${product.videos && product.videos.length > 0 ? '🎥' : ''}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function showProductDetails(product) {
            currentProduct = product;
            currentImageIndex = 0;
            
            const today = new Date();
            const isNewValid = product.isNew && product.newUntil && new Date(product.newUntil) > today;
            
            // Nom & desc
            let titleHTML = product.name;
            if (isNewValid) {
                titleHTML += ' <span style="color: #00d4ff; font-size: 12px;">✨ NOUVEAU</span>';
            }
            document.getElementById('modalProductName').innerHTML = titleHTML;
            document.getElementById('modalProductDesc').textContent = product.description || '';
            
            // Galerie (image principale + galerie)
            const allImages = [product.image];
            if (product.gallery && product.gallery.length > 0) {
                allImages.push(...product.gallery);
            }
            
            if (allImages.length > 0) {
                document.getElementById('gallerySection').style.display = 'block';
                document.getElementById('modalMainImage').src = allImages[0];
                
                const thumbnails = document.getElementById('modalThumbnails');
                thumbnails.innerHTML = '';
                allImages.forEach((img, i) => {
                    const thumb = document.createElement('img');
                    thumb.src = img;
                    thumb.className = `thumbnail ${i === 0 ? 'active' : ''}`;
                    thumb.onclick = () => {
                        currentImageIndex = i;
                        document.getElementById('modalMainImage').src = img;
                        document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                        thumb.classList.add('active');
                    };
                    thumbnails.appendChild(thumb);
                });
            } else {
                document.getElementById('gallerySection').style.display = 'none';
            }
            
            // Tarifs
            if (product.tariffs) {
                document.getElementById('tariffsSection').style.display = 'block';
                displayTariffs(product);
            } else {
                document.getElementById('tariffsSection').style.display = 'none';
            }
            
            // Vidéos
            if (product.videos && product.videos.length > 0) {
                document.getElementById('videosSection').style.display = 'block';
                const videosList = document.getElementById('videosList');
                videosList.innerHTML = '';
                product.videos.forEach(videoUrl => {
                    const video = document.createElement('video');
                    video.src = videoUrl;
                    video.controls = true;
                    video.className = 'video-player';
                    videosList.appendChild(video);
                });
            } else {
                document.getElementById('videosSection').style.display = 'none';
            }
            
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function displayTariffs(product) {
            // Parser tarifs normaux
            const normalTariffs = {};
            product.tariffs.split('|').forEach(t => {
                const [size, price] = t.split('=');
                normalTariffs[size.trim()] = parseFloat(price);
            });
            
            // Parser tarifs promo
            const promoTariffs = {};
            if (product.promoTariffs) {
                product.promoTariffs.split('|').forEach(t => {
                    const [size, price] = t.split('=');
                    promoTariffs[size.trim()] = parseFloat(price);
                });
            }
            
            // Afficher
            const tariffsList = document.getElementById('tariffsList');
            tariffsList.innerHTML = '';
            
            Object.entries(normalTariffs).forEach(([size, normalPrice]) => {
                const item = document.createElement('div');
                item.className = 'tariff-item';
                
                const promoPrice = promoTariffs[size];
                
                if (promoPrice && promoPrice < normalPrice) {
                    // En promo
                    item.innerHTML = `
                        <span>${size}</span>
                        <span class="tariff-original">${normalPrice}€</span>
                        <span class="tariff-promo">${promoPrice}€</span>
                        <span class="promo-badge">PROMO</span>
                    `;
                } else {
                    // Normal
                    item.innerHTML = `
                        <span>${size}</span>
                        <span>${normalPrice}€</span>
                    `;
                }
                
                tariffsList.appendChild(item);
            });
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Load on page load
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
