<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVR Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      background-attachment: fixed;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(100, 150, 180, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(100, 150, 180, 0.05) 0%, transparent 50%),
        linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    /* Auth Container */
    #authContainer, #deniedContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .auth-modal, .denied-modal {
      text-align: center;
      padding: 40px;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      border: 2px solid rgba(100, 150, 180, 0.3);
      border-radius: 15px;
      max-width: 400px;
    }

    .denied-modal h2, .auth-modal h2 {
      margin-bottom: 20px;
      color: #6496b4;
      font-size: 24px;
    }

    .denied-modal p, .auth-modal p {
      margin-bottom: 15px;
      font-size: 16px;
      color: #ccc;
    }

    #authContainer.hidden, #deniedContainer.hidden {
      display: none;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, rgba(15, 52, 96, 0.95) 0%, rgba(22, 33, 62, 0.95) 100%);
      padding: 20px 30px;
      border-bottom: 2px solid rgba(100, 150, 180, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(100, 150, 180, 0.1);
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #6496b4;
      text-shadow: 0 0 10px rgba(100, 150, 180, 0.5);
    }

    .shop-name {
      font-size: 14px;
      color: #a0c4d4;
      margin-left: 10px;
    }

    .header-right {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .header-link {
      color: #6496b4;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .header-link:hover {
      color: #a0c4d4;
      text-shadow: 0 0 10px rgba(100, 150, 180, 0.5);
    }

    .cart-button {
      position: relative;
      background: linear-gradient(135deg, #6496b4 0%, #4a7a9e 100%);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(100, 150, 180, 0.3);
    }

    .cart-button:hover {
      box-shadow: 0 0 25px rgba(100, 150, 180, 0.6);
      transform: translateY(-2px);
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ff6b6b;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      font-weight: bold;
    }

    /* Concours Banner */
    #concoursBanner {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.2) 0%, rgba(74, 122, 158, 0.2) 100%);
      border: 2px solid rgba(100, 150, 180, 0.4);
      border-radius: 15px;
      margin: 30px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.2);
    }

    #concoursBanner img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin: 15px 0;
    }

    /* Filter Section */
    #filterSection {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 20px 30px;
      flex-wrap: wrap;
      background: rgba(15, 52, 96, 0.3);
      border-bottom: 1px solid rgba(100, 150, 180, 0.2);
    }

    .filter-btn {
      padding: 10px 20px;
      border: 2px solid rgba(100, 150, 180, 0.3);
      background: rgba(100, 150, 180, 0.1);
      color: #a0c4d4;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .filter-btn:hover, .filter-btn.active {
      background: linear-gradient(135deg, #6496b4 0%, #4a7a9e 100%);
      border-color: #6496b4;
      box-shadow: 0 0 15px rgba(100, 150, 180, 0.4);
      color: white;
    }

    /* Products Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 15px;
      }
    }

    .product-card {
      background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(22, 33, 62, 0.8) 100%);
      border: 3px solid rgba(100, 150, 180, 0.5);
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.2);
      position: relative;
    }

    .product-card:hover {
      box-shadow: 0 0 30px rgba(100, 150, 180, 0.5);
      transform: translateY(-5px);
      border-color: rgba(100, 150, 180, 0.8);
    }

    .product-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      cursor: pointer;
    }

    .product-info {
      padding: 15px;
    }

    .product-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #a0c4d4;
    }

    .badges {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
    }

    .badge-nouveau {
      background: rgba(76, 175, 80, 0.3);
      border: 1px solid #4caf50;
      color: #7cfc00;
    }

    .badge-promo {
      background: rgba(255, 152, 0, 0.3);
      border: 1px solid #ffa500;
      color: #ffb700;
    }

    .badge-stock-limite {
      background: rgba(255, 193, 7, 0.3);
      border: 1px solid #ffc107;
      color: #ffeb3b;
    }

    .badge-rupture {
      background: rgba(244, 67, 54, 0.3);
      border: 1px solid #f44336;
      color: #ff5252;
    }

    .product-price {
      font-size: 18px;
      font-weight: bold;
      color: #6496b4;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(100, 150, 180, 0.3);
    }

    .btn-add-cart {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #6496b4 0%, #4a7a9e 100%);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(100, 150, 180, 0.3);
    }

    .btn-add-cart:hover:not(:disabled) {
      box-shadow: 0 0 25px rgba(100, 150, 180, 0.6);
      transform: translateY(-2px);
    }

    .btn-add-cart:disabled {
      background: linear-gradient(135deg, #666 0%, #444 100%);
      cursor: not-allowed;
      opacity: 0.6;
      box-shadow: none;
    }

    /* Modal Add Cart */
    #modalAddCart {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 500;
      justify-content: center;
      align-items: center;
    }

    #modalAddCart.active {
      display: flex;
    }

    .modal-add-cart-content {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      border: 3px solid rgba(100, 150, 180, 0.5);
      border-radius: 15px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      position: relative;
      box-shadow: 0 0 40px rgba(100, 150, 180, 0.4);
    }

    .modal-add-cart-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #6496b4;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .modal-add-cart-close:hover {
      color: #a0c4d4;
      transform: rotate(90deg);
    }

    .modal-product-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .modal-product-name {
      font-size: 20px;
      font-weight: bold;
      color: #a0c4d4;
      margin-bottom: 15px;
      text-align: center;
    }

    .quantity-selection {
      margin-bottom: 20px;
    }

    .quantity-label {
      display: block;
      font-size: 14px;
      color: #a0c4d4;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .quantity-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .qty-btn {
      padding: 12px;
      background: rgba(100, 150, 180, 0.2);
      border: 2px solid rgba(100, 150, 180, 0.3);
      color: #a0c4d4;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .qty-btn:hover, .qty-btn.selected {
      background: linear-gradient(135deg, #6496b4 0%, #4a7a9e 100%);
      border-color: #6496b4;
      box-shadow: 0 0 15px rgba(100, 150, 180, 0.4);
      color: white;
    }

    .quantity-spinner-label {
      display: block;
      font-size: 14px;
      color: #a0c4d4;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .quantity-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .spinner-btn {
      background: rgba(100, 150, 180, 0.2);
      border: 2px solid rgba(100, 150, 180, 0.3);
      color: #a0c4d4;
      width: 35px;
      height: 35px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s ease;
    }

    .spinner-btn:hover {
      background: linear-gradient(135deg, #6496b4 0%, #4a7a9e 100%);
      border-color: #6496b4;
      color: white;
    }

    .spinner-value {
      color: #6496b4;
      font-size: 18px;
      font-weight: bold;
      min-width: 40px;
      text-align: center;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-cancel, .btn-add-to-cart-modal {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn-cancel {
      background: rgba(100, 150, 180, 0.2);
      border: 2px solid rgba(100, 150, 180, 0.3);
      color: #a0c4d4;
    }

    .btn-cancel:hover {
      background: rgba(100, 150, 180, 0.4);
    }

    .btn-add-to-cart-modal {
      background: linear-gradient(135deg, #6496b4 0%, #4a7a9e 100%);
      color: white;
      box-shadow: 0 0 15px rgba(100, 150, 180, 0.3);
    }

    .btn-add-to-cart-modal:hover {
      box-shadow: 0 0 25px rgba(100, 150, 180, 0.6);
      transform: translateY(-2px);
    }

    /* Cart Panel */
    #cartPanel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      border-left: 3px solid rgba(100, 150, 180, 0.5);
      z-index: 400;
      transition: right 0.3s ease;
      overflow-y: auto;
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
    }

    #cartPanel.open {
      right: 0;
    }

    @media (max-width: 768px) {
      #cartPanel {
        width: 100%;
        right: -100%;
      }
    }

    .cart-header {
      padding: 20px;
      border-bottom: 2px solid rgba(100, 150, 180, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-header h2 {
      color: #a0c4d4;
      font-size: 18px;
    }

    .cart-close {
      background: none;
      border: none;
      color: #6496b4;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cart-close:hover {
      color: #a0c4d4;
      transform: rotate(90deg);
    }

    .cart-items {
      padding: 20px;
    }

    .cart-item {
      background: rgba(100, 150, 180, 0.1);
      border: 1px solid rgba(100, 150, 180, 0.2);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .cart-item-name {
      font-weight: bold;
      color: #a0c4d4;
      margin-bottom: 8px;
    }

    .cart-item-details {
      font-size: 12px;
      color: #8ba8c4;
      margin-bottom: 10px;
    }

    .cart-item-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-item-price {
      color: #6496b4;
      font-weight: bold;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #ff5252;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .remove-btn:hover {
      transform: scale(1.2);
    }

    .cart-footer {
      padding: 20px;
      border-top: 2px solid rgba(100, 150, 180, 0.3);
      position: sticky;
      bottom: 0;
      background: linear-gradient(135deg, #0a2540 0%, #0f3460 100%);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #a0c4d4;
    }

    .cart-total-price {
      color: #6496b4;
      text-shadow: 0 0 10px rgba(100, 150, 180, 0.3);
    }

    .btn-checkout {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6496b4 0%, #4a7a9e 100%);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(100, 150, 180, 0.3);
    }

    .btn-checkout:hover {
      box-shadow: 0 0 25px rgba(100, 150, 180, 0.6);
      transform: translateY(-2px);
    }

    /* Product Modal */
    #productModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 300;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      padding: 20px;
    }

    #productModal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      border: 3px solid rgba(100, 150, 180, 0.5);
      border-radius: 15px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 40px rgba(100, 150, 180, 0.4);
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #6496b4;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      color: #a0c4d4;
      transform: rotate(90deg);
    }

    .modal-gallery {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .modal-image {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: bold;
      color: #a0c4d4;
      margin-bottom: 15px;
    }

    .modal-description {
      color: #8ba8c4;
      line-height: 1.6;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .tariff-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      background: rgba(100, 150, 180, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    .tariff-table th, .tariff-table td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid rgba(100, 150, 180, 0.2);
      color: #a0c4d4;
    }

    .tariff-table th {
      background: rgba(100, 150, 180, 0.2);
      font-weight: bold;
    }

    .tariff-price {
      color: #6496b4;
      font-weight: bold;
    }

    .modal-video {
      width: 100%;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<!-- Auth Container -->
<div id="authContainer">
  <div class="auth-modal">
    <h2>🔐 Vérification du token</h2>
    <p>Vérification en cours...</p>
  </div>
</div>

<!-- Denied Container -->
<div id="deniedContainer" class="hidden">
  <div class="denied-modal">
    <h2>❌ Accès refusé</h2>
    <p>Token invalide ou expiré. Retourne sur Telegram pour obtenir un nouveau lien.</p>
  </div>
</div>

<!-- Header -->
<header>
  <div>
    <span class="logo">דהר</span>
    <span class="shop-name">SVR Shop</span>
  </div>
  <div class="header-right">
    <a href="/admin" class="header-link">Admin</a>
    <button class="cart-button" id="cartBtn">
      🛒 Panier
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- Concours Banner -->
<div id="concoursBanner"></div>

<!-- Filter Section -->
<div id="filterSection"></div>

<!-- Products Grid -->
<div class="products-grid" id="productsGrid"></div>

<!-- Modal Add Cart -->
<div id="modalAddCart">
  <div class="modal-add-cart-content">
    <button class="modal-add-cart-close" onclick="closeAddCartModal()">✕</button>
    <img id="modalProductImage" class="modal-product-image" src="" alt="">
    <h3 class="modal-product-name" id="modalProductName"></h3>
    
    <div class="quantity-selection">
      <label class="quantity-label">Sélectionne une quantité :</label>
      <div class="quantity-buttons">
        <button class="qty-btn" data-qty="3" data-price="20">3g - 20€</button>
        <button class="qty-btn" data-qty="10" data-price="60">10g - 60€</button>
        <button class="qty-btn" data-qty="20" data-price="120">20g - 120€</button>
      </div>
    </div>

    <div>
      <label class="quantity-spinner-label">Combien de fois ?</label>
      <div class="quantity-spinner">
        <button class="spinner-btn" onclick="decrementSpinner()">−</button>
        <span class="spinner-value" id="spinnerValue">1</span>
        <button class="spinner-btn" onclick="incrementSpinner()">+</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddCartModal()">Annuler</button>
      <button class="btn-add-to-cart-modal" onclick="confirmAddToCart()">Ajouter au panier</button>
    </div>
  </div>
</div>

<!-- Cart Panel -->
<div id="cartPanel">
  <div class="cart-header">
    <h2>Panier</h2>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      Total: <span class="cart-total-price" id="cartTotalPrice">0€</span>
    </div>
    <button class="btn-checkout" onclick="checkout()">Valider la commande</button>
  </div>
</div>

<!-- Product Modal -->
<div id="productModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeProductModal()">✕</button>
    <img id="modalProductImage2" class="modal-image" src="" alt="">
    <h2 class="modal-title" id="modalProductTitle"></h2>
    <p class="modal-description" id="modalProductDescription"></p>
    <table class="tariff-table" id="tariffTable">
      <thead>
        <tr>
          <th>Quantité</th>
          <th>Prix</th>
        </tr>
      </thead>
      <tbody id="tariffBody"></tbody>
    </table>
    <div id="videosContainer"></div>
  </div>
</div>

<script>
  let cart = [];
  let shopData = {};
  let currentFilter = 'Tous';
  let selectedQuantity = null;
  let selectedPrice = null;
  let spinnerValue = 1;
  let currentProductId = null;

  // Vérification du token
  async function verifyToken() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const userId = params.get('userId');

    if (!token || !userId) {
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('deniedContainer').classList.remove('hidden');
      return;
    }

    try {
      const response = await fetch('/api/verify-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, userId })
      });

      const data = await response.json();

      if (data.valid) {
        document.getElementById('authContainer').classList.add('hidden');
        loadShopData();
      } else {
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('deniedContainer').classList.remove('hidden');
      }
    } catch (err) {
      console.error('❌ Erreur vérification:', err);
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('deniedContainer').classList.remove('hidden');
    }
  }

  // Charger les données du shop
  async function loadShopData() {
    try {
      const response = await fetch('/data.json');
      shopData = await response.json();
      renderShop();
      loadCartFromStorage();
    } catch (err) {
      console.error('❌ Erreur chargement données:', err);
    }
  }

  // Rendu du shop
  function renderShop() {
    // Concours Banner
    if (shopData.concours && shopData.concours.description) {
      document.getElementById('concoursBanner').innerHTML = `
        <p>${shopData.concours.description}</p>
        <img src="https://res.cloudinary.com/diezs6eqa/image/upload/v1775412560/Illustration_sans_titre_uj29od.jpg" alt="Illustration">
      `;
    }

    // Filtre
    const categories = ['Tous', ...new Set(shopData.products.map(p => p.category))];
    document.getElementById('filterSection').innerHTML = categories
      .map(cat => `<button class="filter-btn ${cat === 'Tous' ? 'active' : ''}" onclick="filterProducts('${cat}')">${cat}</button>`)
      .join('');

    // Produits
    renderProducts();
  }

  function filterProducts(category) {
    currentFilter = category;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderProducts();
  }

  function renderProducts() {
    const filtered = currentFilter === 'Tous' 
      ? shopData.products 
      : shopData.products.filter(p => p.category === currentFilter);

    document.getElementById('productsGrid').innerHTML = filtered
      .map(product => {
        const isOutOfStock = product.stock === 0;
        const badges = [];
        
        if (product.new) badges.push('<span class="badge badge-nouveau">NOUVEAU</span>');
        if (product.promo) badges.push('<span class="badge badge-promo">PROMO</span>');
        if (product.stock === 0) badges.push('<span class="badge badge-rupture">RUPTURE DE STOCK</span>');
        else if (product.stock <= 3) badges.push('<span class="badge badge-stock-limite">STOCK LIMITÉ</span>');

        return `
          <div class="product-card" onclick="openProductModal(${product.id})">
            <img src="${product.image}" alt="${product.name}" class="product-image">
            <div class="product-info">
              <h3 class="product-name">${product.name}</h3>
              <div class="badges">${badges.join('')}</div>
              <p class="product-price">${product.price}€</p>
              <button class="btn-add-cart" 
                onclick="event.stopPropagation(); openAddCartModal(${product.id}, '${product.name}', '${product.image}', ${product.price})"
                ${isOutOfStock ? 'disabled' : ''}>
                ${isOutOfStock ? 'Rupture' : 'Ajouter au panier'}
              </button>
            </div>
          </div>
        `;
      })
      .join('');
  }

  // Modal Add Cart
  function openAddCartModal(productId, name, image, price) {
    currentProductId = productId;
    selectedQuantity = null;
    selectedPrice = null;
    spinnerValue = 1;
    
    document.getElementById('modalProductImage').src = image;
    document.getElementById('modalProductName').textContent = name;
    document.getElementById('spinnerValue').textContent = '1';
    
    document.querySelectorAll('.qty-btn').forEach(btn => btn.classList.remove('selected'));
    document.getElementById('modalAddCart').classList.add('active');
  }

  function closeAddCartModal() {
    document.getElementById('modalAddCart').classList.remove('active');
    selectedQuantity = null;
    selectedPrice = null;
  }

  document.addEventListener('click', (e) => {
    if (e.target.classList.contains('qty-btn')) {
      document.querySelectorAll('.qty-btn').forEach(btn => btn.classList.remove('selected'));
      e.target.classList.add('selected');
      selectedQuantity = parseInt(e.target.dataset.qty);
      selectedPrice = parseInt(e.target.dataset.price);
    }
  });

  function incrementSpinner() {
    spinnerValue++;
    document.getElementById('spinnerValue').textContent = spinnerValue;
  }

  function decrementSpinner() {
    if (spinnerValue > 1) {
      spinnerValue--;
      document.getElementById('spinnerValue').textContent = spinnerValue;
    }
  }

  function confirmAddToCart() {
    if (!selectedQuantity || !selectedPrice) {
      alert('Sélectionne une quantité d\'abord !');
      return;
    }

    const product = shopData.products.find(p => p.id === currentProductId);
    const item = {
      id: product.id,
      name: product.name,
      selectedQuantity: selectedQuantity,
      quantity: spinnerValue,
      price: selectedPrice,
      totalPrice: selectedPrice * spinnerValue
    };

    const existing = cart.find(c => c.id === product.id && c.selectedQuantity === selectedQuantity);
    if (existing) {
      existing.quantity += spinnerValue;
      existing.totalPrice = existing.price * existing.quantity;
    } else {
      cart.push(item);
    }

    saveCartToStorage();
    updateCartCount();
    closeAddCartModal();
  }

  // Cart Management
  function toggleCart() {
    document.getElementById('cartPanel').classList.toggle('open');
  }

  document.getElementById('cartBtn').addEventListener('click', toggleCart);

  function updateCart() {
    const cartItemsDiv = document.getElementById('cartItems');
    if (cart.length === 0) {
      cartItemsDiv.innerHTML = '<p style="text-align: center; color: #8ba8c4; padding: 20px;">Panier vide</p>';
      document.getElementById('cartTotalPrice').textContent = '0€';
      return;
    }

    cartItemsDiv.innerHTML = cart.map((item, index) => `
      <div class="cart-item">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-details">${item.quantity}x ${item.selectedQuantity}g = ${item.totalPrice}€</div>
        <div class="cart-item-controls">
          <span class="cart-item-price">${item.totalPrice}€</span>
          <button class="remove-btn" onclick="removeFromCart(${index})">🗑️</button>
        </div>
      </div>
    `).join('');

    const total = cart.reduce((sum, item) => sum + item.totalPrice, 0);
    document.getElementById('cartTotalPrice').textContent = total + '€';
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    saveCartToStorage();
    updateCart();
    updateCartCount();
  }

  function updateCartCount() {
    document.getElementById('cartCount').textContent = cart.length;
  }

  function saveCartToStorage() {
    localStorage.setItem('cart', JSON.stringify(cart));
  }

  function loadCartFromStorage() {
    const stored = localStorage.getItem('cart');
    if (stored) {
      cart = JSON.parse(stored);
      updateCart();
      updateCartCount();
    }
  }

  // Checkout
  async function checkout() {
    if (cart.length === 0) {
      alert('Panier vide !');
      return;
    }

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const total = cart.reduce((sum, item) => sum + item.totalPrice, 0);

    try {
      const response = await fetch('/api/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId,
          items: cart,
          total
        })
      });

      if (response.ok) {
        alert('✅ Commande validée ! Merci !');
        cart = [];
        localStorage.removeItem('cart');
        updateCart();
        updateCartCount();
        toggleCart();
      } else {
        alert('❌ Erreur lors de la validation');
      }
    } catch (err) {
      console.error('❌ Erreur:', err);
      alert('❌ Erreur de connexion');
    }
  }

  // Product Modal
  function openProductModal(productId) {
    const product = shopData.products.find(p => p.id === productId);
    if (!product) return;

    document.getElementById('modalProductImage2').src = product.image;
    document.getElementById('modalProductTitle').textContent = product.name;
    document.getElementById('modalProductDescription').textContent = product.description || '';

    const tariffBody = document.getElementById('tariffBody');
    tariffBody.innerHTML = product.tariffs
      ? product.tariffs.map(t => `<tr><td>${t.quantity}g</td><td class="tariff-price">${t.price}€</td></tr>`).join('')
      : '';

    const videosContainer = document.getElementById('videosContainer');
    videosContainer.innerHTML = product.videos
      ? product.videos.map(video => `<iframe class="modal-video" src="${video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`).join('')
      : '';

    document.getElementById('productModal').classList.add('active');
  }

  function closeProductModal() {
    document.getElementById('productModal').classList.remove('active');
  }

  // Init
  verifyToken();
</script>

</body>
</html>
