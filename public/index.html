<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVR Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      min-height: 100vh;
      padding: 10px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* Bannière Concours */
    .concours-banner {
      background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .concours-banner:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .concours-banner h2 {
      color: white;
      margin-bottom: 10px;
      font-size: 20px;
    }

    .concours-text {
      color: white;
      font-size: 14px;
      line-height: 1.6;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .concours-text.expanded {
      max-height: 500px;
    }

    .concours-preview {
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      transition: opacity 0.3s ease;
    }

    .concours-preview.hidden {
      display: none;
    }

    .expand-icon {
      display: inline-block;
      margin-left: 5px;
      font-size: 12px;
      transition: transform 0.3s ease;
    }

    .concours-banner.expanded .expand-icon {
      transform: rotate(180deg);
    }

    /* Header */
    .header {
      background: white;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: #00d4ff;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      color: #666;
      font-size: 12px;
    }

    /* Grille Produits */
    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .product-image {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
    }

    .product-info {
      padding: 12px;
    }

    .product-name {
      font-size: 14px;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .product-badges {
      display: flex;
      gap: 5px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    .badge-new {
      background: #00d4ff;
      color: white;
    }

    .badge-promo {
      background: #ff6b35;
      color: white;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .product-price {
      font-size: 12px;
      color: #666;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px;
      position: relative;
      margin: 20px auto;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .modal-close:hover {
      color: #333;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      color: #00d4ff;
      margin-bottom: 15px;
      margin-top: 10px;
    }

    .modal-description {
      color: #666;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .modal-gallery {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      overflow-x: auto;
    }

    .gallery-thumb {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .gallery-thumb:hover,
    .gallery-thumb.active {
      border-color: #00d4ff;
      transform: scale(1.05);
    }

    .modal-main-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .modal-tariffs {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .tariff-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 13px;
      border-bottom: 1px solid #e0e0e0;
    }

    .tariff-row:last-child {
      border-bottom: none;
    }

    .tariff-normal {
      color: #666;
    }

    .tariff-promo {
      color: #ff6b35;
      font-weight: bold;
      text-decoration: line-through;
      margin-right: 5px;
    }

    .tariff-price {
      font-weight: bold;
      color: #00d4ff;
    }

    .modal-videos {
      margin-top: 15px;
    }

    .video-player {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .admin-link {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
    }

    .admin-link a {
      color: #00d4ff;
      text-decoration: none;
      font-weight: bold;
    }

    /* Auth Container */
    #authContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      z-index: 2000;
    }

    .auth-box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #00d4ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .auth-box h2 {
      color: #333;
      margin-bottom: 10px;
    }

    .auth-box p {
      color: #666;
      font-size: 13px;
    }

    #deniedContainer {
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
      z-index: 2000;
    }

    .denied-box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .denied-box h2 {
      color: #ff6b35;
      margin-bottom: 15px;
      font-size: 24px;
    }

    .denied-box p {
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .denied-box a {
      display: inline-block;
      background: #00d4ff;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .denied-box a:hover {
      background: #0099ff;
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 24px;
      }

      .products-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        width: 95%;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <!-- Auth Container -->
  <div id="authContainer">
    <div class="auth-box">
      <div class="spinner"></div>
      <h2>Vérification d'accès</h2>
      <p>Veuillez patienter...</p>
    </div>
  </div>

  <!-- Denied Container -->
  <div id="deniedContainer">
    <div class="denied-box">
      <h2>❌ Accès Refusé</h2>
      <p>Tu n'as pas accès à ce shop.</p>
      <p>Rejoins le channel @SVR_TO pour accéder.</p>
      <a href="https://t.me/SVR_TO" target="_blank">Rejoindre le channel</a>
    </div>
  </div>

  <!-- Main Content -->
  <div id="mainContent" style="display: none;">
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>SVR Shop</h1>
        <p>Découvre nos produits exclusifs</p>
      </div>

      <!-- Bannière Concours (Cliquable) -->
      <div class="concours-banner" id="concoursBanner" onclick="toggleConcours()">
        <h2>🚨 Concours SVR 🚨</h2>
        <div class="concours-preview" id="concoursPreview">
          Clique pour voir les détails <span class="expand-icon">▼</span>
        </div>
        <div class="concours-text" id="concoursText"></div>
      </div>

      <!-- Grille Produits -->
      <div class="products-grid" id="productsGrid"></div>

      <!-- Admin Link -->
      <div class="admin-link">
        <a href="/admin">Accès Admin</a>
      </div>
    </div>
  </div>

  <!-- Modal Produit -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <h3 class="modal-title" id="modalTitle"></h3>
      <img class="modal-main-image" id="modalMainImage" src="" alt="">
      
      <div class="modal-gallery" id="modalGallery"></div>

      <div class="modal-description" id="modalDescription"></div>

      <div class="modal-tariffs" id="modalTariffs"></div>

      <div class="modal-videos" id="modalVideos"></div>
    </div>
  </div>

  <script>
    let shopData = {};

    // Vérifier le token au démarrage
    async function verifyAccess() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const userId = urlParams.get('userId');

      if (!token || !userId) {
        showDenied();
        return;
      }

      try {
        const response = await fetch(`/api/verify-token?token=${token}&userId=${userId}`);
        const result = await response.json();

        if (result.valid) {
          loadShop();
        } else {
          showDenied();
        }
      } catch (error) {
        console.error('Erreur vérification:', error);
        showDenied();
      }
    }

    function showDenied() {
      document.getElementById('authContainer').style.display = 'none';
      document.getElementById('deniedContainer').style.display = 'flex';
    }

    async function loadShop() {
      try {
        const response = await fetch('/data.json');
        shopData = await response.json();

        // Afficher le contenu principal
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        // Charger le concours
        loadConcours();

        // Charger les produits
        loadProducts();
      } catch (error) {
        console.error('Erreur chargement données:', error);
        showDenied();
      }
    }

    function loadConcours() {
      const description = shopData.concours?.description || '';
      document.getElementById('concoursText').textContent = description;
    }

    function toggleConcours() {
      const banner = document.getElementById('concoursBanner');
      const text = document.getElementById('concoursText');
      const preview = document.getElementById('concoursPreview');

      banner.classList.toggle('expanded');
      text.classList.toggle('expanded');
      preview.classList.toggle('hidden');
    }

    function loadProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';

      shopData.products?.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => openModal(product);

        let badges = '';
        if (product.isNew) {
          badges += '<span class="badge badge-new">✨ NOUVEAU</span>';
        }
        if (product.promoTariffs) {
          badges += '<span class="badge badge-promo">🏷️ PROMO</span>';
        }

        const price = product.tariffs?.split('|')[0]?.split('=')[1] || 'N/A';

        card.innerHTML = `
          <img class="product-image" src="${product.image}" alt="${product.name}">
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-badges">${badges}</div>
            <div class="product-price">À partir de ${price}€</div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function openModal(product) {
      document.getElementById('modalTitle').textContent = product.name;
      document.getElementById('modalMainImage').src = product.image;
      document.getElementById('modalDescription').textContent = product.description;

      // Galerie
      const gallery = document.getElementById('modalGallery');
      gallery.innerHTML = '';
      
      // Ajouter l'image principale à la galerie
      const mainThumb = document.createElement('img');
      mainThumb.className = 'gallery-thumb active';
      mainThumb.src = product.image;
      mainThumb.onclick = () => {
        document.getElementById('modalMainImage').src = product.image;
        document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
        mainThumb.classList.add('active');
      };
      gallery.appendChild(mainThumb);

      // Images supplémentaires
      (product.images || []).forEach(img => {
        const thumb = document.createElement('img');
        thumb.className = 'gallery-thumb';
        thumb.src = img;
        thumb.onclick = () => {
          document.getElementById('modalMainImage').src = img;
          document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
          thumb.classList.add('active');
        };
        gallery.appendChild(thumb);
      });

      // Tarifs
      const tariffsDiv = document.getElementById('modalTariffs');
      tariffsDiv.innerHTML = '<strong>Tarifs:</strong><br>';
      
      if (product.tariffs) {
        product.tariffs.split('|').forEach(tariff => {
          const [size, price] = tariff.split('=');
          tariffsDiv.innerHTML += `<div class="tariff-row"><span>${size.trim()}</span><span class="tariff-price">${price}€</span></div>`;
        });
      }

      if (product.promoTariffs) {
        tariffsDiv.innerHTML += '<br><strong style="color: #ff6b35;">Tarifs Promo:</strong><br>';
        product.promoTariffs.split('|').forEach(tariff => {
          const [size, price] = tariff.split('=');
          const normalPrice = product.tariffs?.split('|').find(t => t.includes(size))?.split('=')[1];
          tariffsDiv.innerHTML += `<div class="tariff-row"><span>${size.trim()}</span><span><span class="tariff-promo">${normalPrice}€</span><span class="tariff-price">${price}€</span></span></div>`;
        });
      }

      // Vidéos
      const videosDiv = document.getElementById('modalVideos');
      videosDiv.innerHTML = '';
      if (product.videos && product.videos.length > 0) {
        product.videos.forEach(video => {
          const videoEl = document.createElement('video');
          videoEl.className = 'video-player';
          videoEl.controls = true;
          videoEl.src = video;
          videosDiv.appendChild(videoEl);
        });
      }

      document.getElementById('productModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    // Vérifier l'accès au chargement
    verifyAccess();
  </script>
</body>
</html>
