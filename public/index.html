<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0, 212, 255, 0.05);
            border-bottom: 2px solid #00d4ff;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 24px;
        }
        
        .admin-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #000;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            transition: all 0.3s;
            z-index: 99;
        }
        
        .admin-link:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }
        
        .concours-banner {
            background: linear-gradient(135deg, #ff8c00 0%, #ff6b00 100%);
            padding: 30px 20px;
            margin: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }
        
        .concours-banner h2 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 22px;
        }
        
        .concours-banner p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }
        
        .concours-banner img {
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            margin-top: 15px;
            object-fit: cover;
            aspect-ratio: 16/9;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .product-card {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
            border-color: #00ffff;
        }
        
        .product-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            background: rgba(0, 212, 255, 0.2);
        }
        
        .product-info {
            padding: 15px;
        }
        
        .product-name {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 14px;
        }
        
        .product-price {
            color: #00ff64;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .product-stock {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .stock-en {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid #00ff64;
        }
        
        .stock-rupture {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        
        .stock-bientot {
            background: rgba(255, 140, 0, 0.2);
            color: #ff8c00;
            border: 1px solid #ff8c00;
        }
        
        .product-icons {
            display: flex;
            gap: 10px;
            font-size: 18px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: #ff6666;
        }
        
        .modal h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            margin-top: 20px;
        }
        
        .modal p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .gallery-modal {
            margin-bottom: 30px;
        }
        
        .main-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
            object-fit: cover;
            aspect-ratio: 1/1;
            border: 2px solid #00d4ff;
        }
        
        .thumbnails {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        
        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid #00d4ff;
            object-fit: cover;
            opacity: 0.6;
            transition: all 0.3s;
        }
        
        .thumbnail.active {
            opacity: 1;
            border-color: #00ffff;
        }
        
        .thumbnail:hover {
            opacity: 1;
        }
        
        .tariffs-section {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00d4ff;
            margin: 20px 0;
        }
        
        .tariffs-section h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .tariff-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }
        
        .tariff-item:last-child {
            margin-bottom: 0;
        }
        
        .tariff-original {
            text-decoration: line-through;
            color: #ff6464;
            font-size: 12px;
        }
        
        .tariff-promo {
            color: #00ff64;
            font-weight: bold;
            font-size: 14px;
        }
        
        .promo-badge {
            background: linear-gradient(135deg, #ff8c00 0%, #ff6b00 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }
        
        .videos-section {
            margin-top: 20px;
        }
        
        .videos-section h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .video-player {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #00d4ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍️ SVR Shop</h1>
    </div>

    <div class="concours-banner" id="concoursBanner" style="display: none;">
        <h2>🎁 Concours</h2>
        <p id="concoursDesc"></p>
        <img id="concoursImage" alt="Concours" />
    </div>

    <div class="container">
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <a href="/admin" class="admin-link" title="Admin">⚙️</a>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            
            <h2 id="modalProductName"></h2>
            <p id="modalProductDesc"></p>

            <!-- Galerie -->
            <div class="gallery-modal" id="gallerySection" style="display: none;">
                <div class="gallery-title">📸 Galerie</div>
                <img id="modalMainImage" class="main-image" />
                <div class="thumbnails" id="modalThumbnails"></div>
            </div>

            <!-- Tarifs -->
            <div class="tariffs-section" id="tariffsSection" style="display: none;">
                <h3>💰 Tarifs</h3>
                <div id="tariffsList"></div>
            </div>

            <!-- Vidéos -->
            <div class="videos-section" id="videosSection" style="display: none;">
                <h3>🎥 Vidéos</h3>
                <div id="videosList"></div>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let currentProduct = null;
        let currentImageIndex = 0;

        // LOAD DATA
        async function loadData() {
            try {
                const res = await fetch('/data.json');
                const data = await res.json();
                
                // Afficher concours
                if (data.concours && data.concours.description) {
                    document.getElementById('concoursDesc').textContent = data.concours.description;
                    if (data.concours.image) {
                        document.getElementById('concoursImage').src = data.concours.image;
                        document.getElementById('concoursBanner').style.display = 'block';
                    }
                }
                
                // Afficher produits
                products = data.products || [];
                displayProducts();
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => showProductDetails(product);
                
                // Min price
                const minPrice = Math.min(...product.tariffs.split('|').map(t => {
                    const [_, price] = t.split('=');
                    return parseFloat(price);
                }));
                
                // Stock class
                const stockClass = `stock-${product.stock.toLowerCase().replace('ô', 'o')}`;
                
                card.innerHTML = `
                    <img src="${product.image}" class="product-image" alt="${product.name}" />
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">À partir de ${minPrice}€</div>
                        <div class="product-stock ${stockClass}">${product.stock}</div>
                        <div class="product-icons">
                            ${product.images && product.images.length > 0 ? '📸' : ''}
                            ${product.videos && product.videos.length > 0 ? '🎥' : ''}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function showProductDetails(product) {
            currentProduct = product;
            currentImageIndex = 0;
            
            // Nom & desc
            document.getElementById('modalProductName').textContent = product.name;
            document.getElementById('modalProductDesc').textContent = product.description || '';
            
            // Galerie
            if (product.images && product.images.length > 0) {
                document.getElementById('gallerySection').style.display = 'block';
                document.getElementById('modalMainImage').src = product.images[0];
                
                const thumbnails = document.getElementById('modalThumbnails');
                thumbnails.innerHTML = '';
                product.images.forEach((img, i) => {
                    const thumb = document.createElement('img');
                    thumb.src = img;
                    thumb.className = `thumbnail ${i === 0 ? 'active' : ''}`;
                    thumb.onclick = () => {
                        currentImageIndex = i;
                        document.getElementById('modalMainImage').src = img;
                        document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                        thumb.classList.add('active');
                    };
                    thumbnails.appendChild(thumb);
                });
            } else {
                document.getElementById('gallerySection').style.display = 'none';
            }
            
            // Tarifs
            if (product.tariffs) {
                document.getElementById('tariffsSection').style.display = 'block';
                displayTariffs(product);
            } else {
                document.getElementById('tariffsSection').style.display = 'none';
            }
            
            // Vidéos
            if (product.videos && product.videos.length > 0) {
                document.getElementById('videosSection').style.display = 'block';
                const videosList = document.getElementById('videosList');
                videosList.innerHTML = '';
                product.videos.forEach(videoUrl => {
                    const video = document.createElement('video');
                    video.src = videoUrl;
                    video.controls = true;
                    video.className = 'video-player';
                    videosList.appendChild(video);
                });
            } else {
                document.getElementById('videosSection').style.display = 'none';
            }
            
            document.getElementById('productModal').classList.add('active');
        }

        function displayTariffs(product) {
            // Parser tarifs normaux
            const normalTariffs = {};
            product.tariffs.split('|').forEach(t => {
                const [size, price] = t.split('=');
                normalTariffs[size.trim()] = parseFloat(price);
            });
            
            // Parser tarifs promo
            const promoTariffs = {};
            if (product.promoTariffs) {
                product.promoTariffs.split('|').forEach(t => {
                    const [size, price] = t.split('=');
                    promoTariffs[size.trim()] = parseFloat(price);
                });
            }
            
            // Afficher
            const tariffsList = document.getElementById('tariffsList');
            tariffsList.innerHTML = '';
            
            Object.entries(normalTariffs).forEach(([size, normalPrice]) => {
                const item = document.createElement('div');
                item.className = 'tariff-item';
                
                const promoPrice = promoTariffs[size];
                
                if (promoPrice && promoPrice < normalPrice) {
                    // En promo
                    item.innerHTML = `
                        <span>${size}</span>
                        <span class="tariff-original">${normalPrice}€</span>
                        <span class="tariff-promo">${promoPrice}€</span>
                        <span class="promo-badge">🏷️ PROMO</span>
                    `;
                } else {
                    // Normal
                    item.innerHTML = `
                        <span>${size}</span>
                        <span>${normalPrice}€</span>
                    `;
                }
                
                tariffsList.appendChild(item);
            });
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        // Load on page load
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
