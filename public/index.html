<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVR Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #000000;
      background-image: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 100px,
          rgba(100, 150, 180, 0.02) 100px,
          rgba(100, 150, 180, 0.02) 200px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 150px,
          rgba(100, 150, 180, 0.01) 150px,
          rgba(100, 150, 180, 0.01) 300px
        );
      min-height: 100vh;
      padding: 10px;
      color: #fff;
      position: relative;
    }

    /* Pattern "דהר" en background - NOIR avec Academy Engraved */
    body::before {
      content: 'דהר    דהר    דהר\A\Aדהר    דהר    דהר\A\Aדהר    דהר    דהר';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      font-size: 120px;
      font-weight: bold;
      color: rgba(20, 20, 20, 0.08);
      white-space: pre;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
      line-height: 1.6;
      text-align: center;
      letter-spacing: 30px;
      direction: rtl;
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header avec Logo */
    .header {
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(100, 150, 180, 0.15);
      border: 1px solid rgba(100, 150, 180, 0.3);
    }

    .logo {
      width: 140px;
      height: 100px;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-text {
      font-size: 85px;
      font-weight: bold;
      color: #6496b4;
      text-shadow: 0 0 20px rgba(100, 150, 180, 0.4);
      letter-spacing: 8px;
      direction: rtl;
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    }

    .header h1 {
      color: #6496b4;
      font-size: 24px;
      margin-bottom: 5px;
      text-shadow: 0 0 10px rgba(100, 150, 180, 0.3);
    }

    .header p {
      color: #a0b0c0;
      font-size: 12px;
    }

    /* Bannière Concours */
    .concours-banner {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.15) 0%, rgba(100, 150, 180, 0.05) 100%);
      border: 1px solid rgba(100, 150, 180, 0.3);
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.1);
      backdrop-filter: blur(10px);
    }

    .concours-banner:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 30px rgba(100, 150, 180, 0.2);
      border-color: rgba(100, 150, 180, 0.5);
    }

    .concours-banner h2 {
      color: #6496b4;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .concours-text {
      color: #a0b0c0;
      font-size: 13px;
      line-height: 1.6;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .concours-text.expanded {
      max-height: 3000px;
    }

    .concours-preview {
      color: #a0b0c0;
      font-size: 13px;
      transition: opacity 0.3s ease;
    }

    .concours-preview.hidden {
      display: none;
    }

    .expand-icon {
      display: inline-block;
      margin-left: 5px;
      font-size: 12px;
      transition: transform 0.3s ease;
    }

    .concours-banner.expanded .expand-icon {
      transform: rotate(180deg);
    }

    /* Section Filtre */
    .filter-section {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      justify-content: center;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 20px;
      border: 2px solid rgba(100, 150, 180, 0.3);
      background: rgba(15, 20, 40, 0.85);
      color: #a0b0c0;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
    }

    .filter-btn:hover {
      border-color: rgba(100, 150, 180, 0.6);
      color: #6496b4;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.4) 0%, rgba(100, 150, 180, 0.2) 100%);
      border-color: #6496b4;
      color: #6496b4;
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.3);
    }

    /* Grille Produits */
    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .product-card {
      background: rgba(20, 28, 50, 0.85);
      border: 1px solid rgba(100, 150, 180, 0.2);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.1);
      position: relative;
      backdrop-filter: blur(10px);
    }

    .product-card:hover {
      transform: translateY(-8px);
      border-color: rgba(100, 150, 180, 0.5);
      box-shadow: 0 0 50px rgba(100, 150, 180, 0.5);
    }

    /* AURA PRONONCÉE autour des cartes */
    .product-card::before {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      background: radial-gradient(circle at 50% 50%, rgba(100, 150, 180, 0.4) 0%, rgba(100, 150, 180, 0.15) 40%, transparent 70%);
      border-radius: 12px;
      pointer-events: none;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
      filter: blur(8px);
    }

    .product-card:hover::before {
      opacity: 1;
    }

    .product-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(100, 150, 180, 0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    .product-image {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.1) 0%, rgba(15, 20, 40, 0.9) 100%);
    }

    .product-info {
      padding: 12px;
      position: relative;
      z-index: 2;
    }

    .product-name {
      font-size: 14px;
      font-weight: bold;
      color: #6496b4;
      margin-bottom: 5px;
    }

    .product-badges {
      display: flex;
      gap: 5px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    .badge-new {
      background: rgba(100, 150, 180, 0.3);
      color: #6496b4;
      border: 1px solid rgba(100, 150, 180, 0.5);
    }

    .badge-promo {
      background: rgba(220, 100, 100, 0.3);
      color: #ff6b6b;
      border: 1px solid rgba(220, 100, 100, 0.5);
    }

    .badge-category {
      background: rgba(100, 150, 180, 0.2);
      color: #a0b0c0;
      border: 1px solid rgba(100, 150, 180, 0.3);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .product-price {
      font-size: 12px;
      color: #a0b0c0;
    }

    .product-price span {
      color: #6496b4;
      font-weight: bold;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(20, 28, 50, 0.95) 0%, rgba(15, 20, 40, 0.95) 100%);
      border: 1px solid rgba(100, 150, 180, 0.3);
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      padding: 20px;
      position: relative;
      margin: auto;
      box-shadow: 0 0 40px rgba(100, 150, 180, 0.2);
      backdrop-filter: blur(10px);
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #a0b0c0;
      background: none;
      border: none;
      padding: 0;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      color: #6496b4;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      color: #6496b4;
      margin-bottom: 15px;
      margin-top: 10px;
    }

    .modal-description {
      color: #a0b0c0;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .modal-main-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
      border: 1px solid rgba(100, 150, 180, 0.2);
    }

    .modal-gallery {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      overflow-x: auto;
      padding-bottom: 5px;
    }

    .gallery-thumb {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid rgba(100, 150, 180, 0.2);
      transition: all 0.3s ease;
      flex-shrink: 0;
      object-fit: cover;
    }

    .gallery-thumb:hover,
    .gallery-thumb.active {
      border-color: #6496b4;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(100, 150, 180, 0.3);
    }

    .modal-tariffs {
      background: rgba(100, 150, 180, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid rgba(100, 150, 180, 0.2);
    }

    .modal-tariffs strong {
      display: block;
      margin-bottom: 10px;
      color: #6496b4;
      font-size: 14px;
    }

    .tariff-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(100, 150, 180, 0.1);
      color: #a0b0c0;
    }

    .tariff-row:last-child {
      border-bottom: none;
    }

    .tariff-price {
      font-weight: bold;
      color: #6496b4;
    }

    .tariff-promo-label {
      display: block;
      margin-top: 10px;
      margin-bottom: 10px;
      color: #ff6b6b;
      font-weight: bold;
      font-size: 13px;
    }

    .tariff-price-promo {
      color: #ff6b6b;
      font-weight: bold;
    }

    .tariff-price-original {
      text-decoration: line-through;
      color: #6a7080;
      margin-right: 8px;
      font-size: 12px;
    }

    .modal-videos {
      margin-top: 15px;
    }

    .modal-videos h4 {
      color: #6496b4;
      font-size: 13px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .video-player {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
      max-height: 300px;
      border: 1px solid rgba(100, 150, 180, 0.2);
    }

    .admin-link {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 12px;
    }

    .admin-link a {
      color: #6496b4;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .admin-link a:hover {
      color: #8ab4d4;
    }

    /* Auth Container */
    #authContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000000;
      z-index: 2000;
    }

    .auth-box {
      text-align: center;
      background: rgba(20, 28, 50, 0.9);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(100, 150, 180, 0.2);
      border: 1px solid rgba(100, 150, 180, 0.3);
      backdrop-filter: blur(10px);
    }

    .spinner {
      border: 4px solid rgba(100, 150, 180, 0.2);
      border-top: 4px solid #6496b4;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .auth-box h2 {
      color: #6496b4;
      margin-bottom: 10px;
    }

    .auth-box p {
      color: #a0b0c0;
      font-size: 13px;
    }

    #deniedContainer {
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000000;
      z-index: 2000;
    }

    .denied-box {
      text-align: center;
      background: rgba(40, 20, 20, 0.9);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(220, 100, 100, 0.2);
      border: 1px solid rgba(220, 100, 100, 0.3);
      max-width: 400px;
      backdrop-filter: blur(10px);
    }

    .denied-box h2 {
      color: #ff6b6b;
      margin-bottom: 15px;
      font-size: 24px;
    }

    .denied-box p {
      color: #b0a0a0;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    .denied-box a {
      display: inline-block;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.4) 0%, rgba(100, 150, 180, 0.2) 100%);
      color: #6496b4;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      border: 1px solid rgba(100, 150, 180, 0.5);
    }

    .denied-box a:hover {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.6) 0%, rgba(100, 150, 180, 0.4) 100%);
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 20px;
      }

      .products-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        width: 95%;
        padding: 15px;
      }

      .filter-section {
        gap: 8px;
      }

      .filter-btn {
        padding: 8px 15px;
        font-size: 12px;
      }

      body::before {
        font-size: 70px;
        letter-spacing: 15px;
      }

      .logo-text {
        font-size: 60px;
      }
    }
  </style>
</head>
<body>
  <!-- Auth Container -->
  <div id="authContainer">
    <div class="auth-box">
      <div class="spinner"></div>
      <h2>Vérification d'accès</h2>
      <p>Veuillez patienter...</p>
    </div>
  </div>

  <!-- Denied Container -->
  <div id="deniedContainer">
    <div class="denied-box">
      <h2>Accès Refusé</h2>
      <p>Tu n'as pas accès à ce shop.</p>
      <p>Rejoins le channel @SVR_TO pour accéder.</p>
      <a href="https://t.me/SVR_TO" target="_blank">Rejoindre le channel</a>
    </div>
  </div>

  <!-- Main Content -->
  <div id="mainContent" style="display: none;">
    <div class="container">
      <!-- Header avec Logo -->
      <div class="header">
        <div class="logo">
          <div class="logo-text">דהר</div>
        </div>
        <h1>SVR Shop</h1>
        <p>Découvre nos produits exclusifs</p>
      </div>

      <!-- Bannière Concours (Cliquable) -->
      <div class="concours-banner" id="concoursBanner" onclick="toggleConcours()">
        <h2>🚨 Concours SVR 🚨</h2>
        <div class="concours-preview" id="concoursPreview">
          Clique pour voir les détails <span class="expand-icon">▼</span>
        </div>
        <div class="concours-text" id="concoursText"></div>
      </div>

      <!-- Section Filtre -->
      <div class="filter-section" id="filterSection"></div>

      <!-- Grille Produits -->
      <div class="products-grid" id="productsGrid"></div>

      <!-- Admin Link -->
      <div class="admin-link">
        <a href="/admin">Accès Admin</a>
      </div>
    </div>
  </div>

  <!-- Modal Produit -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h3 class="modal-title" id="modalTitle"></h3>
      <img class="modal-main-image" id="modalMainImage" src="" alt="Produit">
      
      <div class="modal-gallery" id="modalGallery"></div>

      <div class="modal-description" id="modalDescription"></div>

      <div class="modal-tariffs" id="modalTariffs"></div>

      <div class="modal-videos" id="modalVideos"></div>
    </div>
  </div>

  <script>
    let shopData = {};
    let currentFilter = 'Tous';

    // Vérifier le token au démarrage
    async function verifyAccess() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const userId = urlParams.get('userId');

      if (!token || !userId) {
        showDenied();
        return;
      }

      try {
        const response = await fetch(`/api/verify-token?token=${token}&userId=${userId}`);
        const result = await response.json();

        if (result.valid) {
          loadShop();
        } else {
          showDenied();
        }
      } catch (error) {
        console.error('Erreur vérification:', error);
        showDenied();
      }
    }

    function showDenied() {
      document.getElementById('authContainer').style.display = 'none';
      document.getElementById('deniedContainer').style.display = 'flex';
    }

    async function loadShop() {
      try {
        const response = await fetch('/data.json');
        shopData = await response.json();

        // Afficher le contenu principal
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        // Charger le concours
        loadConcours();

        // Créer section filtre
        createFilterSection();

        // Charger les produits
        loadProducts();
      } catch (error) {
        console.error('Erreur chargement données:', error);
        showDenied();
      }
    }

    function loadConcours() {
      const description = shopData.concours?.description || '';
      document.getElementById('concoursText').textContent = description;
    }

    function toggleConcours() {
      const banner = document.getElementById('concoursBanner');
      const text = document.getElementById('concoursText');
      const preview = document.getElementById('concoursPreview');

      banner.classList.toggle('expanded');
      text.classList.toggle('expanded');
      preview.classList.toggle('hidden');
    }

    function createFilterSection() {
      const filterSection = document.getElementById('filterSection');
      const categories = ['Tous', 'WEED', 'HASH', 'EXTRA'];
      
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        if (cat === 'Tous') btn.classList.add('active');
        btn.textContent = cat;
        btn.onclick = () => setFilter(cat);
        filterSection.appendChild(btn);
      });
    }

    function setFilter(category) {
      currentFilter = category;
      
      // Mettre à jour les boutons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent === category) btn.classList.add('active');
      });

      // Recharger les produits
      loadProducts();
    }

    function loadProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';

      let filteredProducts = shopData.products || [];

      // Filtrer par catégorie
      if (currentFilter !== 'Tous') {
        filteredProducts = filteredProducts.filter(p => p.category === currentFilter);
      }

      filteredProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => openModal(product);

        let badges = '';
        if (product.isNew) {
          badges += '<span class="badge badge-new">✨ NOUVEAU</span>';
        }
        if (product.promoTariffs) {
          badges += '<span class="badge badge-promo">🏷️ PROMO</span>';
        }
        if (product.category) {
          badges += `<span class="badge badge-category">${product.category}</span>`;
        }

        // Prix normal
        const normalPrice = product.tariffs?.split('|')[0]?.split('=')[1] || 'N/A';
        
        // Prix promo
        const promoPrice = product.promoTariffs?.split('|')[0]?.split('=')[1] || null;

        let priceHTML = `<div class="product-price">À partir de <span>${normalPrice}€</span></div>`;
        
        if (promoPrice) {
          priceHTML = `
            <div class="product-price">
              <span style="text-decoration: line-through; color: #6a7080; margin-right: 5px;">${normalPrice}€</span>
              <span>${promoPrice}€</span>
            </div>
          `;
        }

        card.innerHTML = `
          <img class="product-image" src="${product.image}" alt="${product.name}" loading="lazy">
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-badges">${badges}</div>
            ${priceHTML}
          </div>
        `;

        grid.appendChild(card);
      });

      if (filteredProducts.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #a0b0c0; padding: 40px 20px;">Aucun produit trouvé</div>';
      }
    }

    function openModal(product) {
      document.getElementById('modalTitle').textContent = product.name;
      document.getElementById('modalMainImage').src = product.image;
      document.getElementById('modalDescription').textContent = product.description || 'Pas de description';

      // Galerie
      const gallery = document.getElementById('modalGallery');
      gallery.innerHTML = '';
      
      // Ajouter l'image principale à la galerie
      const mainThumb = document.createElement('img');
      mainThumb.className = 'gallery-thumb active';
      mainThumb.src = product.image;
      mainThumb.alt = product.name;
      mainThumb.onclick = () => {
        document.getElementById('modalMainImage').src = product.image;
        document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
        mainThumb.classList.add('active');
      };
      gallery.appendChild(mainThumb);

      // Images supplémentaires depuis la galerie
      if (product.gallery && product.gallery.length > 0) {
        product.gallery.forEach(img => {
          const thumb = document.createElement('img');
          thumb.className = 'gallery-thumb';
          thumb.src = img;
          thumb.alt = product.name;
          thumb.loading = 'lazy';
          thumb.onclick = () => {
            document.getElementById('modalMainImage').src = img;
            document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
          };
          gallery.appendChild(thumb);
        });
      }

      // Tarifs normaux
      const tariffsDiv = document.getElementById('modalTariffs');
      tariffsDiv.innerHTML = '';
      
      if (product.tariffs) {
        const normalLabel = document.createElement('strong');
        normalLabel.textContent = 'Tarifs:';
        tariffsDiv.appendChild(normalLabel);
        
        product.tariffs.split('|').forEach(tariff => {
          const [size, price] = tariff.split('=');
          const row = document.createElement('div');
          row.className = 'tariff-row';
          row.innerHTML = `
            <span>${size.trim()}</span>
            <span class="tariff-price">${price.trim()}€</span>
          `;
          tariffsDiv.appendChild(row);
        });
      }

      // Tarifs promo
      if (product.promoTariffs) {
        const promoLabel = document.createElement('div');
        promoLabel.className = 'tariff-promo-label';
        promoLabel.textContent = 'Tarifs Promo:';
        tariffsDiv.appendChild(promoLabel);

        product.promoTariffs.split('|').forEach(tariff => {
          const [size, promoPrice] = tariff.split('=');
          const normalTariff = product.tariffs.split('|').find(t => t.includes(size));
          const normalPrice = normalTariff ? normalTariff.split('=')[1].trim() : null;

          const row = document.createElement('div');
          row.className = 'tariff-row';
          row.innerHTML = `
            <span>${size.trim()}</span>
            <span>
              ${normalPrice ? `<span class="tariff-price-original">${normalPrice}€</span>` : ''}
              <span class="tariff-price-promo">${promoPrice.trim()}€</span>
            </span>
          `;
          tariffsDiv.appendChild(row);
        });
      }

      // Vidéos
      const videosDiv = document.getElementById('modalVideos');
      videosDiv.innerHTML = '';
      if (product.videos && product.videos.length > 0) {
        const videosTitle = document.createElement('h4');
        videosTitle.textContent = 'Vidéos:';
        videosDiv.appendChild(videosTitle);

        product.videos.forEach(video => {
          const videoEl = document.createElement('video');
          videoEl.className = 'video-player';
          videoEl.controls = true;
          videoEl.src = video;
          videosDiv.appendChild(videoEl);
        });
      }

      document.getElementById('productModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    // Fermer le modal au clic sur le fond
    document.getElementById('productModal').addEventListener('click', (e) => {
      if (e.target.id === 'productModal') {
        closeModal();
      }
    });

    // Vérifier l'accès au chargement
    verifyAccess();
  </script>
</body>
</html>
