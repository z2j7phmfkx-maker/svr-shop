<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVR Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #000000;
      background-image: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 100px,
          rgba(100, 150, 180, 0.02) 100px,
          rgba(100, 150, 180, 0.02) 200px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 150px,
          rgba(100, 150, 180, 0.01) 150px,
          rgba(100, 150, 180, 0.01) 300px
        );
      min-height: 100vh;
      padding: 10px;
      color: #fff;
      position: relative;
    }

    /* Pattern "דהר" en background */
    body::before {
      content: 'דהר    דהר    דהר\A\Aדהר    דהר    דהר\A\Aדהר    דהר    דהר';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      font-size: 120px;
      font-weight: bold;
      color: rgba(20, 20, 20, 0.08);
      white-space: pre;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
      line-height: 1.6;
      text-align: center;
      letter-spacing: 30px;
      direction: rtl;
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    }

    .container {
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      padding: 0 8px;
    }

    .header-wrapper {
      max-width: 600px;
      margin: 0 auto 15px;
    }

    /* Header avec Logo - NOUVELLE FORME */
    .header {
      background: linear-gradient(135deg, rgba(15, 20, 40, 0.95) 0%, rgba(20, 28, 50, 0.95) 100%);
      backdrop-filter: blur(10px);
      padding: 25px 30px;
      border-radius: 30px;
      box-shadow: 
        0 8px 32px rgba(100, 150, 180, 0.15),
        0 0 20px rgba(100, 150, 180, 0.1);
      border: 1px solid rgba(100, 150, 180, 0.3);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 30px;
    }

    .logo {
      width: 140px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 100px;
      font-weight: bold;
      color: #6496b4;
      text-shadow: 0 0 20px rgba(100, 150, 180, 0.4);
      letter-spacing: 10px;
      direction: rtl;
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    }

    .header-content {
      text-align: left;
      flex-grow: 1;
    }

    .header h1 {
      color: #6496b4;
      font-size: 32px;
      margin-bottom: 5px;
      text-shadow: 0 0 8px rgba(100, 150, 180, 0.2);
      font-weight: 700;
      letter-spacing: 2px;
    }

    .header p {
      color: #8ab4d4;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Bannière Concours avec image Cloudinary */
    .concours-banner {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.3) 100%),
                  url('https://res.cloudinary.com/diezs6eqa/image/upload/v1775412560/Illustration_sans_titre_uj29od.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      position: relative;
      margin: 15px auto;
      max-width: 600px;
      min-height: 150px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.2);
    }

    .concours-banner:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 30px rgba(100, 150, 180, 0.3);
    }

    .concours-content {
      position: relative;
      z-index: 2;
      padding: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      flex-direction: column;
      text-align: center;
    }

    .concours-preview {
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      transition: opacity 0.3s ease;
    }

    .concours-preview.hidden {
      display: none;
    }

    .concours-text {
      color: #ffffff;
      font-size: 12px;
      line-height: 1.6;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-top: 15px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }

    .concours-text.expanded {
      max-height: 3000px;
    }

    .expand-icon {
      display: inline-block;
      margin-left: 5px;
      font-size: 12px;
      transition: transform 0.3s ease;
    }

    .concours-banner.expanded .expand-icon {
      transform: rotate(180deg);
    }

    /* Section Filtre */
    .filter-section {
      display: flex;
      gap: 8px;
      margin: 0 auto 15px;
      max-width: 600px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 2px solid rgba(100, 150, 180, 0.4);
      background: rgba(15, 20, 40, 0.85);
      color: #a0b0c0;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      backdrop-filter: blur(10px);
    }

    .filter-btn:hover {
      border-color: rgba(100, 150, 180, 0.7);
      color: #6496b4;
      box-shadow: 0 0 15px rgba(100, 150, 180, 0.3);
    }

    .filter-btn.active {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.5) 0%, rgba(100, 150, 180, 0.3) 100%);
      border-color: #6496b4;
      color: #6496b4;
      box-shadow: 0 0 25px rgba(100, 150, 180, 0.5);
    }

    /* Grille Produits - 2 COLONNES PARTOUT */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
      width: 100%;
    }

    /* CONTOURS NÉON ULTRA PRONONCÉS */
    .product-card {
      background: rgba(20, 28, 50, 0.8);
      border: 3px solid #6496b4;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 
        0 0 20px rgba(100, 150, 180, 0.6),
        0 0 40px rgba(100, 150, 180, 0.3),
        inset 0 0 15px rgba(100, 150, 180, 0.2);
      position: relative;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-6px);
      border-color: #8ab4d4;
      box-shadow: 
        0 0 30px rgba(100, 150, 180, 0.8),
        0 0 60px rgba(100, 150, 180, 0.5),
        inset 0 0 20px rgba(100, 150, 180, 0.3);
    }

    /* AURA ULTRA PRONONCÉE */
    .product-card::before {
      content: '';
      position: absolute;
      top: -8px;
      left: -8px;
      right: -8px;
      bottom: -8px;
      background: radial-gradient(ellipse at center, rgba(100, 150, 180, 0.6) 0%, rgba(100, 150, 180, 0.2) 40%, transparent 70%);
      border-radius: 14px;
      pointer-events: none;
      z-index: -1;
      opacity: 0.8;
      filter: blur(12px);
      transition: all 0.3s ease;
    }

    .product-card:hover::before {
      opacity: 1;
      filter: blur(15px);
    }

    .product-image {
      width: 100%;
      height: 120px;
      object-fit: cover;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.1) 0%, rgba(15, 20, 40, 0.9) 100%);
      border-radius: 11px 11px 0 0;
    }

    .product-info {
      padding: 8px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .product-name {
      font-size: 11px;
      font-weight: bold;
      color: #8ab4d4;
      margin-bottom: 4px;
      line-height: 1.1;
      text-shadow: 0 0 6px rgba(100, 150, 180, 0.2);
    }

    .product-badges {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 8px;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    .badge-new {
      background: rgba(100, 150, 180, 0.4);
      color: #8ab4d4;
      border: 1px solid rgba(100, 150, 180, 0.6);
      box-shadow: 0 0 8px rgba(100, 150, 180, 0.3);
    }

    .badge-promo {
      background: rgba(220, 100, 100, 0.4);
      color: #ff8888;
      border: 1px solid rgba(220, 100, 100, 0.6);
      box-shadow: 0 0 8px rgba(220, 100, 100, 0.3);
    }

    .badge-stock {
      background: rgba(255, 200, 87, 0.4);
      color: #ffc857;
      border: 1px solid rgba(255, 200, 87, 0.6);
      box-shadow: 0 0 8px rgba(255, 200, 87, 0.3);
    }

    .badge-rupture {
      background: rgba(220, 60, 60, 0.4);
      color: #ff6b6b;
      border: 1px solid rgba(220, 60, 60, 0.6);
      box-shadow: 0 0 8px rgba(220, 60, 60, 0.3);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .product-price {
      font-size: 10px;
      color: #a0b0c0;
      margin-top: auto;
      margin-bottom: 6px;
    }

    .product-price span {
      color: #8ab4d4;
      font-weight: bold;
      text-shadow: 0 0 5px rgba(100, 150, 180, 0.3);
    }

    .btn-add-cart {
      width: 100%;
      padding: 6px;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.3) 0%, rgba(100, 150, 180, 0.1) 100%);
      border: 1px solid rgba(100, 150, 180, 0.4);
      color: #6496b4;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 9px;
      transition: all 0.2s ease;
    }

    .btn-add-cart:hover {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.5) 0%, rgba(100, 150, 180, 0.3) 100%);
    }

    /* CART STYLES */
    .cart-button-float {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.6) 0%, rgba(100, 150, 180, 0.4) 100%);
      border: 2px solid #6496b4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.5);
      transition: all 0.3s ease;
      z-index: 900;
    }

    .cart-button-float:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(100, 150, 180, 0.7);
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ff6b6b;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    .cart-panel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 350px;
      height: 100vh;
      background: linear-gradient(135deg, rgba(15, 20, 40, 0.95) 0%, rgba(20, 28, 50, 0.95) 100%);
      border-left: 3px solid #6496b4;
      box-shadow: -0 0 40px rgba(100, 150, 180, 0.3);
      transition: right 0.3s ease;
      z-index: 950;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .cart-panel.active {
      right: 0;
    }

    .cart-header {
      padding: 20px;
      border-bottom: 2px solid rgba(100, 150, 180, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-header h2 {
      color: #6496b4;
      font-size: 18px;
    }

    .close-cart-btn {
      background: none;
      border: none;
      color: #6496b4;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close-cart-btn:hover {
      color: #ff6b6b;
    }

    .cart-items {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .cart-item {
      background: rgba(100, 150, 180, 0.1);
      border-left: 3px solid #6496b4;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      color: #e0e0e0;
    }

    .cart-item-name {
      color: #8ab4d4;
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 12px;
    }

    .cart-item-details {
      font-size: 11px;
      color: #b0b0b0;
      margin-bottom: 8px;
    }

    .cart-item-quantity {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .cart-item-quantity button {
      width: 24px;
      height: 24px;
      border: 1px solid #6496b4;
      background: rgba(100, 150, 180, 0.2);
      color: #6496b4;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .cart-item-quantity button:hover {
      background: rgba(100, 150, 180, 0.4);
    }

    .cart-item-remove {
      width: 100%;
      padding: 6px;
      background: rgba(220, 100, 100, 0.2);
      border: 1px solid rgba(220, 100, 100, 0.4);
      color: #ff6b6b;
      cursor: pointer;
      border-radius: 4px;
      font-size: 10px;
      margin-top: 8px;
      transition: all 0.2s ease;
    }

    .cart-item-remove:hover {
      background: rgba(220, 100, 100, 0.4);
    }

    .cart-total {
      padding: 15px;
      border-top: 2px solid rgba(100, 150, 180, 0.2);
      background: rgba(100, 150, 180, 0.05);
    }

    .cart-total h3 {
      color: #6496b4;
      font-size: 16px;
      text-align: center;
    }

    .cart-total span {
      color: #ff6b6b;
      font-weight: bold;
    }

    .btn-checkout {
      margin: 10px;
      padding: 15px;
      background: linear-gradient(135deg, rgba(50, 150, 100, 0.4) 0%, rgba(50, 150, 100, 0.2) 100%);
      border: 2px solid rgba(50, 150, 100, 0.6);
      color: #6bc34a;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      font-size: 12px;
    }

    .btn-checkout:hover {
      background: linear-gradient(135deg, rgba(50, 150, 100, 0.6) 0%, rgba(50, 150, 100, 0.4) 100%);
      transform: translateY(-2px);
    }

    .btn-continue {
      margin: 0 10px 10px 10px;
      padding: 12px;
      background: rgba(100, 150, 180, 0.2);
      border: 1px solid #6496b4;
      color: #6496b4;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      font-size: 12px;
    }

    .btn-continue:hover {
      background: rgba(100, 150, 180, 0.4);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(20, 28, 50, 0.95) 0%, rgba(15, 20, 40, 0.95) 100%);
      border: 3px solid rgba(100, 150, 180, 0.5);
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      padding: 20px;
      position: relative;
      margin: auto;
      box-shadow: 
        0 0 30px rgba(100, 150, 180, 0.4),
        0 0 60px rgba(100, 150, 180, 0.2),
        inset 0 0 20px rgba(100, 150, 180, 0.1);
      backdrop-filter: blur(10px);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
      color: #a0b0c0;
      background: none;
      border: none;
      padding: 0;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      color: #8ab4d4;
    }

    .modal-title {
      font-size: 18px;
      font-weight: bold;
      color: #8ab4d4;
      margin-bottom: 12px;
      margin-top: 8px;
      text-shadow: 0 0 8px rgba(100, 150, 180, 0.2);
    }

    .modal-description {
      color: #a0b0c0;
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 12px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      max-height: none;
      overflow: visible;
    }

    .modal-main-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      border: 2px solid rgba(100, 150, 180, 0.3);
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.2);
    }

    .modal-gallery {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .gallery-thumb {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid rgba(100, 150, 180, 0.3);
      transition: all 0.3s ease;
      flex-shrink: 0;
      object-fit: cover;
      box-shadow: 0 0 12px rgba(100, 150, 180, 0.2);
    }

    .gallery-thumb:hover,
    .gallery-thumb.active {
      border-color: #6496b4;
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.5);
    }

    .modal-tariffs {
      background: rgba(100, 150, 180, 0.1);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 2px solid rgba(100, 150, 180, 0.2);
    }

    .modal-tariffs strong {
      display: block;
      margin-bottom: 8px;
      color: #6496b4;
      font-size: 12px;
    }

    .tariff-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 12px;
      border-bottom: 1px solid rgba(100, 150, 180, 0.1);
      color: #a0b0c0;
    }

    .tariff-row:last-child {
      border-bottom: none;
    }

    .tariff-price {
      font-weight: bold;
      color: #6496b4;
    }

    .tariff-promo-label {
      display: block;
      margin-top: 8px;
      margin-bottom: 8px;
      color: #ff6b6b;
      font-weight: bold;
      font-size: 12px;
    }

    .tariff-price-promo {
      color: #ff6b6b;
      font-weight: bold;
    }

    .tariff-price-original {
      text-decoration: line-through;
      color: #6a7080;
      margin-right: 6px;
      font-size: 11px;
    }

    .modal-videos {
      margin-top: 12px;
    }

    .modal-videos h4 {
      color: #6496b4;
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .video-player {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 8px;
      max-height: 280px;
      border: 1px solid rgba(100, 150, 180, 0.2);
    }

    .admin-link {
      text-align: center;
      margin-top: 15px;
      margin-bottom: 15px;
      font-size: 11px;
    }

    .admin-link a {
      color: #6496b4;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .admin-link a:hover {
      color: #8ab4d4;
    }

    /* Auth Container */
    #authContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000000;
      z-index: 2000;
    }

    .auth-box {
      text-align: center;
      background: rgba(20, 28, 50, 0.9);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100, 150, 180, 0.2);
      border: 2px solid rgba(100, 150, 180, 0.3);
      backdrop-filter: blur(10px);
    }

    .spinner {
      border: 4px solid rgba(100, 150, 180, 0.2);
      border-top: 4px solid #6496b4;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .auth-box h2 {
      color: #6496b4;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .auth-box p {
      color: #a0b0c0;
      font-size: 12px;
    }

    #deniedContainer {
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000000;
      z-index: 2000;
    }

    .denied-box {
      text-align: center;
      background: rgba(40, 20, 20, 0.9);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(220, 100, 100, 0.2);
      border: 2px solid rgba(220, 100, 100, 0.3);
      max-width: 350px;
      backdrop-filter: blur(10px);
    }

    .denied-box h2 {
      color: #ff6b6b;
      margin-bottom: 12px;
      font-size: 20px;
    }

    .denied-box p {
      color: #b0a0a0;
      margin-bottom: 15px;
      font-size: 12px;
      line-height: 1.5;
    }

    .denied-box a {
      display: inline-block;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.4) 0%, rgba(100, 150, 180, 0.2) 100%);
      color: #6496b4;
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      border: 1px solid rgba(100, 150, 180, 0.5);
      font-size: 12px;
    }

    .denied-box a:hover {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.6) 0%, rgba(100, 150, 180, 0.4) 100%);
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .header {
        padding: 20px;
        gap: 20px;
      }

      .logo {
        width: 110px;
        height: 80px;
      }

      .logo-text {
        font-size: 85px;
        letter-spacing: 8px;
      }

      .header h1 {
        font-size: 26px;
      }

      .header p {
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .header {
        flex-direction: column;
        text-align: center;
        padding: 15px;
        gap: 15px;
        border-radius: 20px;
      }

      .logo {
        width: 100px;
        height: 70px;
      }

      .logo-text {
        font-size: 75px;
        letter-spacing: 6px;
      }

      .header-content {
        text-align: center;
      }

      .header h1 {
        font-size: 20px;
      }

      .header p {
        font-size: 11px;
      }

      .modal-content {
        width: 95%;
        padding: 15px;
      }

      .filter-section {
        gap: 6px;
      }

      .filter-btn {
        padding: 6px 12px;
        font-size: 10px;
      }

      body::before {
        font-size: 70px;
        letter-spacing: 15px;
      }

      .concours-banner {
        min-height: 130px;
      }

      .concours-content {
        padding: 20px;
        min-height: 130px;
      }

      .cart-panel {
        width: 100%;
        right: -100%;
      }

      .cart-button-float {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Auth Container -->
  <div id="authContainer">
    <div class="auth-box">
      <div class="spinner"></div>
      <h2>Vérification d'accès</h2>
      <p>Veuillez patienter...</p>
    </div>
  </div>

  <!-- Denied Container -->
  <div id="deniedContainer">
    <div class="denied-box">
      <h2>Accès Refusé</h2>
      <p>Tu n'as pas accès à ce shop.</p>
      <p>Rejoins le channel @SVR_TO pour accéder.</p>
      <a href="https://t.me/SVR_TO" target="_blank">Rejoindre le channel</a>
    </div>
  </div>

  <!-- Main Content -->
  <div id="mainContent" style="display: none;">
    <div class="header-wrapper">
      <!-- Header avec Logo - NOUVELLE FORME -->
      <div class="header">
        <div class="logo">
          <div class="logo-text">דהר</div>
        </div>
        <div class="header-content">
          <h1>SVR SHOP</h1>
          <p>Découvre nos produits exclusifs</p>
        </div>
      </div>
    </div>

    <!-- Bannière Concours avec image Cloudinary (sans titre) -->
    <div class="concours-banner" id="concoursBanner" onclick="toggleConcours()">
      <div class="concours-content">
        <div class="concours-preview" id="concoursPreview">
          Clique pour voir les détails <span class="expand-icon">▼</span>
        </div>
        <div class="concours-text" id="concoursText"></div>
      </div>
    </div>

    <!-- Section Filtre -->
    <div class="filter-section" id="filterSection"></div>

    <div class="container">
      <!-- Grille Produits -->
      <div class="products-grid" id="productsGrid"></div>

      <!-- Admin Link -->
      <div class="admin-link">
        <a href="/admin">Accès Admin</a>
      </div>
    </div>
  </div>

  <!-- PANIER -->
  <div id="cartPanel" class="cart-panel">
    <div class="cart-header">
      <h2>Mon Panier 🛒</h2>
      <button class="close-cart-btn">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total">
      <h3>Total : <span id="cartTotal">0€</span></h3>
    </div>
    <button class="btn-checkout" onclick="checkout()">Valider la commande</button>
    <button class="btn-continue" onclick="closeCart()">Continuer vos achats</button>
  </div>

  <!-- Bouton panier flottant -->
  <div class="cart-button-float" onclick="openCart()">
    <span class="cart-icon">🛒</span>
    <span class="cart-count" id="cartCount">0</span>
  </div>

  <!-- Modal Produit -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h3 class="modal-title" id="modalTitle"></h3>
      <img class="modal-main-image" id="modalMainImage" src="" alt="Produit">
      
      <div class="modal-gallery" id="modalGallery"></div>

      <div class="modal-description" id="modalDescription"></div>

      <div class="modal-tariffs" id="modalTariffs"></div>

      <div class="modal-videos" id="modalVideos"></div>
    </div>
  </div>

  <script>
    let shopData = {};
    let currentFilter = 'Tous';
    let cart = [];

    // Vérifier le token au démarrage
    async function verifyAccess() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const userId = urlParams.get('userId');

      if (!token || !userId) {
        showDenied();
        return;
      }

      try {
        const response = await fetch('/api/verify-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, userId: userId })
        });
        const result = await response.json();

        if (result.valid) {
          loadShop();
        } else {
          showDenied();
        }
      } catch (error) {
        console.error('Erreur vérification:', error);
        showDenied();
      }
    }

    function showDenied() {
      document.getElementById('authContainer').style.display = 'none';
      document.getElementById('deniedContainer').style.display = 'flex';
    }

    async function loadShop() {
      try {
        const response = await fetch('/data.json');
        shopData = await response.json();

        // Afficher le contenu principal
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        // Charger le concours
        loadConcours();

        // Créer section filtre
        createFilterSection();

        // Charger les produits
        loadProducts();

        // Charger le panier sauvegardé
        const savedCart = localStorage.getItem('cart');
        if (savedCart) {
          cart = JSON.parse(savedCart);
          updateCart();
        }
      } catch (error) {
        console.error('Erreur chargement données:', error);
        showDenied();
      }
    }

    function loadConcours() {
      const description = shopData.concours?.description || '';
      document.getElementById('concoursText').textContent = description;
    }

    function toggleConcours() {
      const banner = document.getElementById('concoursBanner');
      const text = document.getElementById('concoursText');
      const preview = document.getElementById('concoursPreview');

      banner.classList.toggle('expanded');
      text.classList.toggle('expanded');
      preview.classList.toggle('hidden');
    }

    function createFilterSection() {
      const filterSection = document.getElementById('filterSection');
      const categories = ['Tous', 'WEED', 'HASH', 'EXTRA'];
      
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        if (cat === 'Tous') btn.classList.add('active');
        btn.textContent = cat;
        btn.onclick = () => setFilter(cat);
        filterSection.appendChild(btn);
      });
    }

    function setFilter(category) {
      currentFilter = category;
      
      // Mettre à jour les boutons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent === category) btn.classList.add('active');
      });

      // Recharger les produits
      loadProducts();
    }

    function loadProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';

      let filteredProducts = shopData.products || [];

      // Filtrer par catégorie
      if (currentFilter !== 'Tous') {
        filteredProducts = filteredProducts.filter(p => p.category === currentFilter);
      }

      filteredProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';

        let badges = '';
        
        // Vérifier si le produit est toujours "NOUVEAU"
        if (product.isNew) {
          const today = new Date().toISOString().split('T')[0];
          const newUntilDate = product.newUntil;
          
          if (newUntilDate && today <= newUntilDate) {
            badges += '<span class="badge badge-new">✨ NOUVEAU</span>';
          }
        }
        
        // Badge PROMO
        if (product.promoTariffs) {
          badges += '<span class="badge badge-promo">🏷️ PROMO</span>';
        }

        // Badge STOCK LIMITÉ
        if (product.stock === 'Stock limité') {
          badges += '<span class="badge badge-stock">⚠️ STOCK LIMITÉ</span>';
        }

        // Badge RUPTURE DE STOCK
        if (product.stock === 'Rupture de stock') {
          badges += '<span class="badge badge-rupture">❌ RUPTURE DE STOCK</span>';
        }

        // Afficher SEULEMENT le prix normal
        const displayPrice = product.tariffs?.split('|')[0]?.split('=')[1] || 'N/A';

        const priceHTML = `<div class="product-price">À partir de <span>${displayPrice}€</span></div>`;

        card.innerHTML = `
          <img class="product-image" src="${product.image}" alt="${product.name}" loading="lazy">
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-badges">${badges}</div>
            ${priceHTML}
            <button class="btn-add-cart" onclick="addToCart(event, ${JSON.stringify(product).replace(/"/g, '&quot;')})">Ajouter au panier 🛒</button>
          </div>
        `;

        card.addEventListener('click', (e) => {
          if (!e.target.classList.contains('btn-add-cart')) {
            openModal(product);
          }
        });

        grid.appendChild(card);
      });

      if (filteredProducts.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #a0b0c0; padding: 30px 20px; font-size: 13px;">Aucun produit trouvé</div>';
      }
    }

    // PANIER
    function addToCart(event, product) {
      event.stopPropagation();
      
      const size = prompt(`Sélectionne une taille pour ${product.name}:\n\n${product.tariffs}`);
      if (!size) return;

      const price = product.tariffs
        .split('|')
        .find(t => t.includes(size))
        ?.split('=')[1];

      if (!price) {
        alert('Taille invalide');
        return;
      }

      const cartItem = {
        id: product.id,
        name: product.name,
        size: size,
        price: parseInt(price),
        quantity: 1
      };

      const existingItem = cart.find(item => item.id === product.id && item.size === size);
      if (existingItem) {
        existingItem.quantity++;
      } else {
        cart.push(cartItem);
      }

      updateCart();
      showNotification(`${product.name} ajouté au panier ! ✅`);
    }

    function updateCart() {
      const cartItemsDiv = document.getElementById('cartItems');
      const cartCount = document.getElementById('cartCount');
      const cartTotal = document.getElementById('cartTotal');

      cartItemsDiv.innerHTML = '';
      let total = 0;
      let count = 0;

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        count += item.quantity;

        const itemDiv = document.createElement('div');
        itemDiv.className = 'cart-item';
        itemDiv.innerHTML = `
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-details">${item.size} - ${item.price}€</div>
          <div class="cart-item-quantity">
            <button onclick="decreaseQuantity(${index})">−</button>
            <span>${item.quantity}</span>
            <button onclick="increaseQuantity(${index})">+</button>
            <span style="flex: 1; text-align: right; color: #6496b4; font-weight: bold;">${itemTotal}€</span>
          </div>
          <button class="cart-item-remove" onclick="removeFromCart(${index})">Supprimer ✕</button>
        `;
        cartItemsDiv.appendChild(itemDiv);
      });

      cartCount.textContent = count;
      cartTotal.textContent = total + '€';
      
      // Sauvegarder le panier
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function increaseQuantity(index) {
      cart[index].quantity++;
      updateCart();
    }

    function decreaseQuantity(index) {
      if (cart[index].quantity > 1) {
        cart[index].quantity--;
      } else {
        removeFromCart(index);
      }
      updateCart();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }

    function openCart() {
      document.getElementById('cartPanel').classList.add('active');
    }

    function closeCart() {
      document.getElementById('cartPanel').classList.remove('active');
    }

    document.querySelector('.close-cart-btn').addEventListener('click', closeCart);

    async function checkout() {
      if (cart.length === 0) {
        alert('Ton panier est vide !');
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const userId = urlParams.get('userId');

      if (!token || !userId) {
        alert('Tu dois être authentifié pour commander');
        return;
      }

      const order = {
        userId: userId,
        token: token,
        items: cart,
        total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
        timestamp: new Date().toISOString()
      };

      try {
        const response = await fetch('/api/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(order)
        });

        const result = await response.json();

        if (result.success) {
          alert('✅ Commande validée ! Le propriétaire a reçu ta prise de commande.');
          cart = [];
          localStorage.removeItem('cart');
          updateCart();
          closeCart();
        } else {
          alert('Erreur lors de la commande: ' + result.message);
        }
      } catch (error) {
        alert('Erreur: ' + error.message);
      }
    }

    function showNotification(message) {
      const notif = document.createElement('div');
      notif.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(50, 150, 100, 0.8);
        color: #fff;
        padding: 15px 20px;
        border-radius: 8px;
        z-index: 10000;
        animation: slideIn 0.3s ease;
      `;
      notif.textContent = message;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    function openModal(product) {
      document.getElementById('modalTitle').textContent = product.name;
      document.getElementById('modalMainImage').src = product.image;
      document.getElementById('modalDescription').textContent = product.description || 'Pas de description';

      // Galerie
      const gallery = document.getElementById('modalGallery');
      gallery.innerHTML = '';
      
      const mainThumb = document.createElement('img');
      mainThumb.className = 'gallery-thumb active';
      mainThumb.src = product.image;
      mainThumb.alt = product.name;
      mainThumb.onclick = () => {
        document.getElementById('modalMainImage').src = product.image;
        document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
        mainThumb.classList.add('active');
      };
      gallery.appendChild(mainThumb);

      if (product.gallery && product.gallery.length > 0) {
        product.gallery.forEach(img => {
          const thumb = document.createElement('img');
          thumb.className = 'gallery-thumb';
          thumb.src = img;
          thumb.alt = product.name;
          thumb.loading = 'lazy';
          thumb.onclick = () => {
            document.getElementById('modalMainImage').src = img;
            document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
          };
          gallery.appendChild(thumb);
        });
      }

      // Tarifs normaux
      const tariffsDiv = document.getElementById('modalTariffs');
      tariffsDiv.innerHTML = '';
      
      if (product.tariffs) {
        const normalLabel = document.createElement('strong');
        normalLabel.textContent = 'Tarifs:';
        tariffsDiv.appendChild(normalLabel);
        
        product.tariffs.split('|').forEach(tariff => {
          const [size, price] = tariff.split('=');
          const row = document.createElement('div');
          row.className = 'tariff-row';
          row.innerHTML = `
            <span>${size.trim()}</span>
            <span class="tariff-price">${price.trim()}€</span>
          `;
          tariffsDiv.appendChild(row);
        });
      }

      // Tarifs promo
      if (product.promoTariffs) {
        const promoLabel = document.createElement('div');
        promoLabel.className = 'tariff-promo-label';
        promoLabel.textContent = 'Tarifs Promo:';
        tariffsDiv.appendChild(promoLabel);

        product.promoTariffs.split('|').forEach(tariff => {
          const [size, promoPrice] = tariff.split('=');
          const normalTariff = product.tariffs.split('|').find(t => t.includes(size));
          const normalPrice = normalTariff ? normalTariff.split('=')[1].trim() : null;

          const row = document.createElement('div');
          row.className = 'tariff-row';
          row.innerHTML = `
            <span>${size.trim()}</span>
            <span>
              ${normalPrice ? `<span class="tariff-price-original">${normalPrice}€</span>` : ''}
              <span class="tariff-price-promo">${promoPrice.trim()}€</span>
            </span>
          `;
          tariffsDiv.appendChild(row);
        });
      }

      // Vidéos
      const videosDiv = document.getElementById('modalVideos');
      videosDiv.innerHTML = '';
      if (product.videos && product.videos.length > 0) {
        const videosTitle = document.createElement('h4');
        videosTitle.textContent = 'Vidéos:';
        videosDiv.appendChild(videosTitle);

        product.videos.forEach(video => {
          const videoEl = document.createElement('video');
          videoEl.className = 'video-player';
          videoEl.controls = true;
          videoEl.src = video;
          videosDiv.appendChild(videoEl);
        });
      }

      document.getElementById('productModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    document.getElementById('productModal').addEventListener('click', (e) => {
      if (e.target.id === 'productModal') {
        closeModal();
      }
    });

    // Vérifier l'accès au chargement
    verifyAccess();
  </script>
</body>
</html>
