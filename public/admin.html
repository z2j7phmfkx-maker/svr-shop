<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVR Shop - Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      background: rgba(15, 20, 40, 0.8);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      border: 1px solid rgba(100, 150, 180, 0.2);
    }

    .header h1 {
      color: #6496b4;
      margin-bottom: 10px;
    }

    .header p {
      color: #a0b0c0;
      font-size: 13px;
    }

    .auth-section {
      background: rgba(15, 20, 40, 0.8);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      border: 1px solid rgba(100, 150, 180, 0.2);
    }

    .auth-section input {
      padding: 10px;
      border: 1px solid rgba(100, 150, 180, 0.3);
      border-radius: 8px;
      background: rgba(20, 28, 50, 0.8);
      color: #fff;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .auth-section button {
      padding: 10px 20px;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.4) 0%, rgba(100, 150, 180, 0.2) 100%);
      border: 1px solid rgba(100, 150, 180, 0.5);
      color: #6496b4;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .auth-section button:hover {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.6) 0%, rgba(100, 150, 180, 0.4) 100%);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 20px;
      background: rgba(20, 28, 50, 0.8);
      border: 1px solid rgba(100, 150, 180, 0.2);
      color: #a0b0c0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.4) 0%, rgba(100, 150, 180, 0.2) 100%);
      border-color: #6496b4;
      color: #6496b4;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-section {
      background: rgba(15, 20, 40, 0.8);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      border: 1px solid rgba(100, 150, 180, 0.2);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #6496b4;
      font-weight: 600;
      font-size: 13px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(100, 150, 180, 0.3);
      border-radius: 8px;
      background: rgba(20, 28, 50, 0.8);
      color: #fff;
      font-size: 13px;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #6496b4;
      box-shadow: 0 0 10px rgba(100, 150, 180, 0.2);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.4) 0%, rgba(100, 150, 180, 0.2) 100%);
      border: 1px solid rgba(100, 150, 180, 0.5);
      color: #6496b4;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.6) 0%, rgba(100, 150, 180, 0.4) 100%);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: linear-gradient(135deg, rgba(220, 100, 100, 0.4) 0%, rgba(220, 100, 100, 0.2) 100%);
      border-color: rgba(220, 100, 100, 0.5);
      color: #ff6b6b;
    }

    .btn-danger:hover {
      background: linear-gradient(135deg, rgba(220, 100, 100, 0.6) 0%, rgba(220, 100, 100, 0.4) 100%);
    }

    .products-list {
      display: grid;
      gap: 15px;
    }

    .product-item {
      background: rgba(20, 28, 50, 0.8);
      border: 1px solid rgba(100, 150, 180, 0.2);
      border-radius: 12px;
      padding: 15px;
      transition: all 0.3s ease;
    }

    .product-item:hover {
      border-color: rgba(100, 150, 180, 0.5);
      box-shadow: 0 0 20px rgba(100, 150, 180, 0.1);
    }

    .product-name {
      color: #6496b4;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .product-info {
      color: #a0b0c0;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .product-actions {
      display: flex;
      gap: 10px;
    }

    .product-actions button {
      flex: 1;
      padding: 8px;
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.3) 0%, rgba(100, 150, 180, 0.1) 100%);
      border: 1px solid rgba(100, 150, 180, 0.4);
      color: #6496b4;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .product-actions button:hover {
      background: linear-gradient(135deg, rgba(100, 150, 180, 0.5) 0%, rgba(100, 150, 180, 0.3) 100%);
    }

    .success {
      background: rgba(50, 150, 100, 0.2);
      border: 1px solid rgba(50, 150, 100, 0.5);
      color: #6bc34a;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .error {
      background: rgba(220, 100, 100, 0.2);
      border: 1px solid rgba(220, 100, 100, 0.5);
      color: #ff6b6b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .image-preview {
      max-width: 200px;
      max-height: 200px;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid rgba(100, 150, 180, 0.2);
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .auth-section input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>SVR Shop - Admin</h1>
      <p>Gestion des produits, concours et contenu</p>
    </div>

    <!-- Auth Section -->
    <div class="auth-section" id="authSection">
      <h3 style="margin-bottom: 15px; color: #6496b4;">Authentification</h3>
      <input type="password" id="password" placeholder="Mot de passe admin" onkeypress="if(event.key==='Enter') login()">
      <button onclick="login()">Accéder à l'admin</button>
    </div>

    <!-- Main Content (hidden until authenticated) -->
    <div id="mainContent" style="display: none;">
      <!-- Messages -->
      <div id="message" style="display: none;"></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('products')">Produits</button>
        <button class="tab-btn" onclick="switchTab('concours')">Concours</button>
      </div>

      <!-- Tab: Produits -->
      <div id="products" class="tab-content active">
        <!-- Ajouter produit -->
        <div class="form-section">
          <h3 style="margin-bottom: 20px; color: #6496b4;">Ajouter un nouveau produit</h3>
          
          <div class="form-group">
            <label>Nom</label>
            <input type="text" id="productName" placeholder="Ex: GARY PAYTON">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Catégorie</label>
              <select id="productCategory">
                <option value="WEED">WEED</option>
                <option value="HASH">HASH</option>
                <option value="EXTRA">EXTRA</option>
              </select>
            </div>
            <div class="form-group">
              <label>Stock</label>
              <select id="productStock">
                <option value="En stock">En stock</option>
                <option value="Stock limité">Stock limité</option>
                <option value="Rupture">Rupture</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="productDescription" placeholder="Description du produit"></textarea>
          </div>

          <div class="form-group">
            <label>Tarifs (format: 2g=20|10g=80|20g=150)</label>
            <input type="text" id="productTariffs" placeholder="2g=20|10g=80|20g=150">
          </div>

          <div class="form-group">
            <label>Tarifs Promo (optionnel, même format)</label>
            <input type="text" id="productPromoTariffs" placeholder="10g=60|20g=120">
          </div>

          <div class="form-group">
            <label>Image principale (URL Cloudinary)</label>
            <input type="text" id="productImage" placeholder="https://res.cloudinary.com/...">
            <img id="imagePreview" class="image-preview" style="display: none;">
          </div>

          <div class="form-group">
            <label>Images galerie (URLs Cloudinary, une par ligne)</label>
            <textarea id="productGallery" placeholder="https://res.cloudinary.com/...&#10;https://res.cloudinary.com/..."></textarea>
          </div>

          <div class="form-group">
            <label>Vidéos (URLs, une par ligne)</label>
            <textarea id="productVideos" placeholder="https://res.cloudinary.com/.../video.mov&#10;https://res.cloudinary.com/.../video.mp4"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Nouveau produit?</label>
              <select id="productIsNew">
                <option value="false">Non</option>
                <option value="true">Oui</option>
              </select>
            </div>
            <div class="form-group">
              <label>Valide jusqu'au (YYYY-MM-DD)</label>
              <input type="text" id="productNewUntil" placeholder="2026-04-07">
            </div>
          </div>

          <button class="btn" onclick="addProduct()">Ajouter produit</button>
        </div>

        <!-- Liste des produits -->
        <div class="form-section">
          <h3 style="margin-bottom: 20px; color: #6496b4;">Produits existants</h3>
          <div class="products-list" id="productsList"></div>
        </div>
      </div>

      <!-- Tab: Concours -->
      <div id="concours" class="tab-content">
        <div class="form-section">
          <h3 style="margin-bottom: 20px; color: #6496b4;">Éditer le concours</h3>
          
          <div class="form-group">
            <label>Description du concours</label>
            <textarea id="concoursDescription" placeholder="Décris les détails du concours..." style="min-height: 200px;"></textarea>
          </div>

          <button class="btn" onclick="saveConcours()">Sauvegarder concours</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'Tova$Shop2024!Secure';
    let shopData = {};
    let isAuthenticated = false;

    async function login() {
      const password = document.getElementById('password').value;
      if (password === ADMIN_PASSWORD) {
        isAuthenticated = true;
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        loadShopData();
      } else {
        showMessage('Mot de passe incorrect', 'error');
      }
    }

    async function loadShopData() {
      try {
        const response = await fetch('/data.json');
        shopData = await response.json();
        
        loadProducts();
        loadConcours();
      } catch (error) {
        showMessage('Erreur chargement données', 'error');
      }
    }

    function loadProducts() {
      const list = document.getElementById('productsList');
      list.innerHTML = '';

      shopData.products?.forEach(product => {
        const div = document.createElement('div');
        div.className = 'product-item';
        div.innerHTML = `
          <div class="product-name">${product.name}</div>
          <div class="product-info">
            <strong>Catégorie:</strong> ${product.category || 'N/A'} | 
            <strong>Stock:</strong> ${product.stock} | 
            <strong>Tarif:</strong> À partir de ${product.tariffs?.split('|')[0]?.split('=')[1]}€
          </div>
          <div class="product-actions">
            <button onclick="editProduct(${product.id})">Éditer</button>
            <button onclick="deleteProduct(${product.id})" style="background: linear-gradient(135deg, rgba(220, 100, 100, 0.3) 0%, rgba(220, 100, 100, 0.1) 100%); color: #ff6b6b;">Supprimer</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function editProduct(id) {
      const product = shopData.products.find(p => p.id === id);
      if (!product) return;

      document.getElementById('productName').value = product.name;
      document.getElementById('productCategory').value = product.category || 'WEED';
      document.getElementById('productStock').value = product.stock;
      document.getElementById('productDescription').value = product.description || '';
      document.getElementById('productTariffs').value = product.tariffs || '';
      document.getElementById('productPromoTariffs').value = product.promoTariffs || '';
      document.getElementById('productImage').value = product.image || '';
      document.getElementById('productGallery').value = (product.gallery || []).join('\n');
      document.getElementById('productVideos').value = (product.videos || []).join('\n');
      document.getElementById('productIsNew').value = product.isNew ? 'true' : 'false';
      document.getElementById('productNewUntil').value = product.newUntil || '';

      if (product.image) {
        document.getElementById('imagePreview').src = product.image;
        document.getElementById('imagePreview').style.display = 'block';
      }

      // Changer le titre et le bouton
      document.querySelector('.form-section h3').textContent = `Éditer: ${product.name}`;
      document.querySelector('.form-section button').textContent = 'Mettre à jour';
      document.querySelector('.form-section button').onclick = () => updateProduct(id);

      // Scroll vers le formulaire
      document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
    }

    function addProduct() {
      const product = {
        id: Date.now(),
        name: document.getElementById('productName').value,
        category: document.getElementById('productCategory').value,
        stock: document.getElementById('productStock').value,
        description: document.getElementById('productDescription').value,
        tariffs: document.getElementById('productTariffs').value,
        promoTariffs: document.getElementById('productPromoTariffs').value,
        image: document.getElementById('productImage').value,
        gallery: document.getElementById('productGallery').value.split('\n').filter(x => x.trim()),
        videos: document.getElementById('productVideos').value.split('\n').filter(x => x.trim()),
        isNew: document.getElementById('productIsNew').value === 'true',
        newUntil: document.getElementById('productNewUntil').value,
        createdAt: new Date().toISOString()
      };

      if (!product.name || !product.tariffs) {
        showMessage('Remplis au minimum le nom et les tarifs', 'error');
        return;
      }

      shopData.products.push(product);
      saveData();
      clearProductForm();
    }

    function updateProduct(id) {
      const product = shopData.products.find(p => p.id === id);
      if (!product) return;

      product.name = document.getElementById('productName').value;
      product.category = document.getElementById('productCategory').value;
      product.stock = document.getElementById('productStock').value;
      product.description = document.getElementById('productDescription').value;
      product.tariffs = document.getElementById('productTariffs').value;
      product.promoTariffs = document.getElementById('productPromoTariffs').value;
      product.image = document.getElementById('productImage').value;
      product.gallery = document.getElementById('productGallery').value.split('\n').filter(x => x.trim());
      product.videos = document.getElementById('productVideos').value.split('\n').filter(x => x.trim());
      product.isNew = document.getElementById('productIsNew').value === 'true';
      product.newUntil = document.getElementById('productNewUntil').value;

      saveData();
      clearProductForm();
    }

    function deleteProduct(id) {
      if (confirm('Supprimer ce produit?')) {
        shopData.products = shopData.products.filter(p => p.id !== id);
        saveData();
      }
    }

    function clearProductForm() {
      document.getElementById('productName').value = '';
      document.getElementById('productCategory').value = 'WEED';
      document.getElementById('productStock').value = 'En stock';
      document.getElementById('productDescription').value = '';
      document.getElementById('productTariffs').value = '';
      document.getElementById('productPromoTariffs').value = '';
      document.getElementById('productImage').value = '';
      document.getElementById('productGallery').value = '';
      document.getElementById('productVideos').value = '';
      document.getElementById('productIsNew').value = 'false';
      document.getElementById('productNewUntil').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      document.querySelector('.form-section h3').textContent = 'Ajouter un nouveau produit';
      document.querySelector('.form-section button').textContent = 'Ajouter produit';
      document.querySelector('.form-section button').onclick = () => addProduct();
    }

    function loadConcours() {
      document.getElementById('concoursDescription').value = shopData.concours?.description || '';
    }

    function saveConcours() {
      shopData.concours = {
        description: document.getElementById('concoursDescription').value
      };
      saveData();
    }

    async function saveData() {
      try {
        const response = await fetch('/api/save-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(shopData)
        });

        const result = await response.json();
        if (result.success) {
          showMessage('Données sauvegardées avec succès!', 'success');
          loadProducts();
        } else {
          showMessage('Erreur sauvegarde: ' + result.message, 'error');
        }
      } catch (error) {
        showMessage('Erreur: ' + error.message, 'error');
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    function showMessage(msg, type) {
      const div = document.getElementById('message');
      div.textContent = msg;
      div.className = type;
      div.style.display = 'block';
      setTimeout(() => div.style.display = 'none', 5000);
    }

    // Preview image
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('productImage').addEventListener('change', function() {
        if (this.value) {
          document.getElementById('imagePreview').src = this.value;
          document.getElementById('imagePreview').style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
