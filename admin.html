<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-screen.hidden {
            display: none;
        }
        
        .login-box {
            background: rgba(30, 30, 50, 0.9);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
        }
        
        .login-box h2 {
            margin-bottom: 30px;
            text-align: center;
            color: #00d4ff;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        .login-box button:hover {
            opacity: 0.9;
        }
        
        .admin-panel {
            display: none;
        }
        
        .admin-panel.active {
            display: block;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
        }
        
        .header h1 {
            color: #00d4ff;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: #ff4444;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }
        
        .logout-btn:hover {
            background: #ff6666;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .tab-btn {
            padding: 12px 25px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 5px;
            color: #00d4ff;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            border-bottom: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.2);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #000;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .upload-btn:hover {
            opacity: 0.9;
        }
        
        .image-preview {
            width: 150px;
            height: 150px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            margin-top: 10px;
            object-fit: cover;
            display: none;
        }
        
        .gallery-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            border: 1px solid #00d4ff;
            display: none;
        }
        
        .gallery-container.active {
            display: block;
        }
        
        .gallery-title {
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .gallery-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        
        .gallery-item {
            position: relative;
            cursor: move;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #00d4ff;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }
        
        .gallery-item-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .gallery-item:hover .gallery-item-remove {
            opacity: 1;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #000;
            flex: 1;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .btn-secondary {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border: 1px solid #00d4ff;
        }
        
        .btn-danger {
            background: #ff4444;
            color: white;
        }
        
        .products-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .product-card {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 15px;
        }
        
        .product-card h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        .product-card p {
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .product-card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .product-card-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        
        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }
        
        .message.active {
            display: block;
        }
        
        .message.success {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid #00ff64;
        }
        
        .message.error {
            background: rgba(255, 0, 100, 0.2);
            color: #ff6464;
            border: 1px solid #ff6464;
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <input type="password" id="passwordInput" placeholder="Mot de passe" />
            <button onclick="handleLogin()">Se connecter</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="container">
            <div class="header">
                <h1>⚙️ SVR Shop Admin</h1>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>

            <div id="message" class="message"></div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('concours')">🎁 Concours</button>
                <button class="tab-btn" onclick="switchTab('products')">📦 Produits</button>
            </div>

            <!-- CONCOURS TAB -->
            <div id="concours" class="tab-content active">
                <h2>Gérer le Concours</h2>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="concoursDesc" placeholder="Description du concours..."></textarea>
                </div>

                <div class="form-group">
                    <label>Image (16:9)</label>
                    <button class="upload-btn" onclick="uploadConcoursImage()">📸 Uploader une image</button>
                    <img id="concoursImagePreview" class="image-preview" />
                </div>

                <div class="buttons">
                    <button class="btn btn-primary" onclick="saveConcours()">💾 Sauvegarder</button>
                </div>
            </div>

            <!-- PRODUCTS TAB -->
            <div id="products" class="tab-content">
                <h2>Gérer les Produits</h2>

                <div style="background: rgba(0, 212, 255, 0.1); padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                    <h3 style="color: #00d4ff; margin-bottom: 15px;">➕ Ajouter un Produit</h3>

                    <div class="form-group">
                        <label>Nom *</label>
                        <input type="text" id="productName" placeholder="Ex: GARY PAYTON" />
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDesc" placeholder="Description du produit..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Tarifs * (ex: 1g=10|2g=20|30g=80)</label>
                        <input type="text" id="productTariffs" placeholder="1g=10|2g=20" />
                    </div>

                    <div class="form-group">
                        <label>Stock *</label>
                        <select id="productStock">
                            <option value="En stock">En stock</option>
                            <option value="Rupture">Rupture</option>
                            <option value="Bientôt">Bientôt</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Image principale (1:1) *</label>
                        <button class="upload-btn" onclick="uploadProductImage()">📸 Uploader une image</button>
                        <img id="productImagePreview" class="image-preview" />
                    </div>

                    <div class="form-group">
                        <label>Galerie (jusqu'à 10 images)</label>
                        <button class="upload-btn" onclick="uploadGalleryImage()">📷 Ajouter une image</button>
                        <div id="galleryContainer" class="gallery-container">
                            <div class="gallery-title">Galerie</div>
                            <div class="gallery-items" id="galleryItems"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Vidéo (URL)</label>
                        <input type="text" id="productVideo" placeholder="https://..." />
                    </div>

                    <div class="buttons">
                        <button class="btn btn-primary" onclick="saveProduct()">💾 Sauvegarder</button>
                        <button class="btn btn-secondary" onclick="resetForm()">🔄 Réinitialiser</button>
                    </div>
                </div>

                <h3 style="color: #00d4ff; margin-top: 30px; margin-bottom: 20px;">📦 Produits existants</h3>
                <div id="productsList" class="products-list"></div>
            </div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/latest/sources/index.js"></script>
    <script>
        const ADMIN_PASSWORD = "Tova$Shop2024!Secure";
        const CLOUDINARY_CLOUD = "diezs6eqa";
        const UPLOAD_PRESET = "unsigned_upload";
        
        let shopData = { concours: {}, products: [] };
        let galleryImages = [];
        let concoursImageUrl = null;
        let productImageUrl = null;
        let currentProductId = null;

        // INIT
        window.addEventListener('load', () => {
            loadData();
        });

        // LOGIN
        function handleLogin() {
            const password = document.getElementById('passwordInput').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.add('active');
                loadData();
                console.log('✅ Login success');
            } else {
                showMessage('❌ Mot de passe incorrect', 'error');
            }
        }

        function handleLogout() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('passwordInput').value = '';
        }

        // LOAD
        async function loadData() {
            try {
                const res = await fetch('/data.json');
                shopData = await res.json();
                loadConcours();
                loadProducts();
                console.log('✅ Data loaded');
            } catch (e) {
                console.error('❌ Load error:', e);
            }
        }

        // CLOUDINARY UPLOAD
        function uploadConcoursImage() {
            const widget = cloudinary.createUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: UPLOAD_PRESET,
                    cropping: true,
                    croppingAspectRatio: 16/9,
                    showCompletedButton: true,
                    folder: "svr_shop/concours"
                },
                (error, result) => {
                    if (!error && result && result.event === "success") {
                        concoursImageUrl = result.info.secure_url;
                        document.getElementById('concoursImagePreview').src = concoursImageUrl;
                        document.getElementById('concoursImagePreview').style.display = 'block';
                        showMessage('✅ Image uploadée!', 'success');
                    }
                }
            );
            widget.open();
        }

        function uploadProductImage() {
            const widget = cloudinary.createUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: UPLOAD_PRESET,
                    cropping: true,
                    croppingAspectRatio: 1,
                    showCompletedButton: true,
                    folder: "svr_shop/products"
                },
                (error, result) => {
                    if (!error && result && result.event === "success") {
                        productImageUrl = result.info.secure_url;
                        document.getElementById('productImagePreview').src = productImageUrl;
                        document.getElementById('productImagePreview').style.display = 'block';
                        showMessage('✅ Image uploadée!', 'success');
                    }
                }
            );
            widget.open();
        }

        function uploadGalleryImage() {
            if (galleryImages.length >= 10) {
                showMessage('❌ Max 10 images', 'error');
                return;
            }
            const widget = cloudinary.createUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: UPLOAD_PRESET,
                    cropping: true,
                    croppingAspectRatio: 1,
                    showCompletedButton: true,
                    folder: "svr_shop/gallery"
                },
                (error, result) => {
                    if (!error && result && result.event === "success") {
                        galleryImages.push({
                            url: result.info.secure_url,
                            id: Date.now() + Math.random()
                        });
                        renderGallery();
                        showMessage('✅ Image ajoutée!', 'success');
                    }
                }
            );
            widget.open();
        }

        function renderGallery() {
            const container = document.getElementById('galleryContainer');
            const items = document.getElementById('galleryItems');
            
            if (galleryImages.length === 0) {
                container.classList.remove('active');
                return;
            }
            
            container.classList.add('active');
            items.innerHTML = '';
            
            galleryImages.forEach((img, i) => {
                const el = document.createElement('div');
                el.className = 'gallery-item';
                el.draggable = true;
                el.innerHTML = `
                    <img src="${img.url}" alt="gallery">
                    <button class="gallery-item-remove" onclick="removeGalleryImage(${i})">✕</button>
                `;
                
                el.addEventListener('dragstart', e => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('index', i);
                });
                
                el.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });
                
                el.addEventListener('drop', e => {
                    e.preventDefault();
                    const dragIdx = parseInt(e.dataTransfer.getData('index'));
                    if (dragIdx !== i) {
                        const temp = galleryImages[dragIdx];
                        galleryImages[dragIdx] = galleryImages[i];
                        galleryImages[i] = temp;
                        renderGallery();
                    }
                });
                
                items.appendChild(el);
            });
        }

        function removeGalleryImage(i) {
            galleryImages.splice(i, 1);
            renderGallery();
        }

        // CONCOURS
        function loadConcours() {
            if (shopData.concours) {
                document.getElementById('concoursDesc').value = shopData.concours.description || '';
                if (shopData.concours.image) {
                    concoursImageUrl = shopData.concours.image;
                    const preview = document.getElementById('concoursImagePreview');
                    preview.src = concoursImageUrl;
                    preview.style.display = 'block';
                }
            }
        }

        async function saveConcours() {
            const desc = document.getElementById('concoursDesc').value;
            if (!concoursImageUrl) {
                showMessage('❌ Ajoute une image SVP', 'error');
                return;
            }
            shopData.concours = { description: desc, image: concoursImageUrl };
            await saveData();
            showMessage('✅ Concours sauvegardé!', 'success');
        }

        // PRODUCTS
        function loadProducts() {
            const list = document.getElementById('productsList');
            list.innerHTML = '';
            shopData.products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3>${p.name}</h3>
                    <p><strong>Tarifs:</strong> ${p.tariffs}</p>
                    <p><strong>Stock:</strong> ${p.stock}</p>
                    <p><strong>Images:</strong> ${(p.images || []).length}</p>
                    <div class="product-card-actions">
                        <button class="btn btn-secondary" onclick="editProduct(${p.id})">✏️ Éditer</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️ Supprimer</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function editProduct(id) {
            const product = shopData.products.find(p => p.id === id);
            if (!product) return;
            
            currentProductId = id;
            document.getElementById('productName').value = product.name || '';
            document.getElementById('productDesc').value = product.description || '';
            document.getElementById('productTariffs').value = product.tariffs || '';
            document.getElementById('productStock').value = product.stock || 'En stock';
            document.getElementById('productVideo').value = product.video || '';
            
            productImageUrl = product.image || null;
            if (productImageUrl) {
                const preview = document.getElementById('productImagePreview');
                preview.src = productImageUrl;
                preview.style.display = 'block';
            }
            
            galleryImages = (product.images || []).map(url => ({ url, id: Date.now() + Math.random() }));
            renderGallery();
        }

        function resetForm() {
            currentProductId = null;
            document.getElementById('productName').value = '';
            document.getElementById('productDesc').value = '';
            document.getElementById('productTariffs').value = '';
            document.getElementById('productStock').value = 'En stock';
            document.getElementById('productVideo').value = '';
            productImageUrl = null;
            galleryImages = [];
            document.getElementById('productImagePreview').style.display = 'none';
            document.getElementById('galleryContainer').classList.remove('active');
        }

        async function saveProduct() {
            const name = document.getElementById('productName').value.trim();
            const desc = document.getElementById('productDesc').value.trim();
            const tariffs = document.getElementById('productTariffs').value.trim();
            const stock = document.getElementById('productStock').value;
            const video = document.getElementById('productVideo').value.trim();

            if (!name || !tariffs || !productImageUrl) {
                showMessage('❌ Remplis: Nom, Tarifs et Image', 'error');
                return;
            }

            const product = {
                id: currentProductId || Date.now(),
                name,
                description: desc,
                tariffs,
                stock,
                image: productImageUrl,
                images: galleryImages.map(g => g.url),
                video,
                createdAt: new Date().toISOString()
            };

            if (currentProductId) {
                const idx = shopData.products.findIndex(p => p.id === currentProductId);
                shopData.products[idx] = product;
            } else {
                shopData.products.push(product);
            }

            await saveData();
            resetForm();
            loadProducts();
            showMessage('✅ Produit sauvegardé!', 'success');
        }

        async function deleteProduct(id) {
            if (confirm('Supprimer ce produit?')) {
                shopData.products = shopData.products.filter(p => p.id !== id);
                await saveData();
                loadProducts();
                showMessage('✅ Produit supprimé!', 'success');
            }
        }

        // SAVE
        async function saveData() {
            try {
                const res = await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(shopData)
                });
                const result = await res.json();
                console.log('✅ Save success');
            } catch (e) {
                showMessage('❌ Erreur save', 'error');
                console.error('❌ Save error:', e);
            }
        }

        // TABS
        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.target.classList.add('active');
        }

        // MESSAGES
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message active ${type}`;
            setTimeout(() => msg.classList.remove('active'), 3000);
        }
    </script>
</body>
</html>
