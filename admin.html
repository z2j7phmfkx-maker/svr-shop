<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop - Admin</title>
    <script src="https://upload-widget.cloudinary.com/latest/sources/index.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1e1e2e; color: #fff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #333; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; }
        .login-box h1 { margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; }
        .login-btn { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .admin-panel { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #444; }
        .logout-btn { padding: 10px 20px; background: #f5576c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; background: #444; border: none; color: #aaa; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #333; color: #fff; }
        .submit-btn { padding: 12px 24px; background: #84fab0; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .products-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-item { background: #333; padding: 15px; border-radius: 8px; }
        .product-item img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .product-item h3 { margin-bottom: 10px; }
        .product-actions { display: flex; gap: 5px; }
        .edit-btn { flex: 1; padding: 8px; background: #667eea; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .delete-btn { flex: 1; padding: 8px; background: #f5576c; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .message { padding: 12px; margin-bottom: 20px; border-radius: 8px; display: none; }
        .message.success { background: #84fab0; color: #000; display: block; }
        .message.error { background: #f5576c; color: white; display: block; }
        .image-preview { width: 100%; height: 200px; background: #333; border: 1px solid #444; border-radius: 8px; object-fit: cover; margin-bottom: 10px; }
        .promo-list { background: #333; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .promo-item { background: #444; padding: 10px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .promo-delete { background: #f5576c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h1>🛍️ Admin</h1>
            <input type="password" id="password" placeholder="Mot de passe">
            <button class="login-btn" onclick="login()">Se Connecter</button>
            <div id="login-error" style="color: #f5576c; margin-top: 15px;"></div>
        </div>
    </div>

    <div id="admin-panel" class="admin-panel">
        <div class="container">
            <div class="header">
                <h1>Admin Panel</h1>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('concours')">Concours</button>
                <button class="tab-btn" onclick="switchTab('products')">Produits</button>
                <button class="tab-btn" onclick="switchTab('promos')">Promos</button>
            </div>

            <!-- CONCOURS -->
            <div id="concours-tab" class="tab-content active">
                <div id="concours-message" class="message"></div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="concours-description"></textarea>
                </div>
                <div class="form-group">
                    <label>Image</label>
                    <img id="concours-image-preview" class="image-preview" style="display:none;">
                    <button class="submit-btn" onclick="uploadConcoursImage()">Upload Image</button>
                </div>
                <button class="submit-btn" onclick="saveConcours()" style="width: 100%;">Sauvegarder</button>
            </div>

            <!-- PRODUITS -->
            <div id="products-tab" class="tab-content">
                <div id="products-message" class="message"></div>
                <h2>Ajouter Produit</h2>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="product-name">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="product-description"></textarea>
                </div>
                <div class="form-group">
                    <label>Tarifs (2g=20|30g=80)</label>
                    <input type="text" id="product-tariffs">
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <select id="product-stock">
                        <option>En stock</option>
                        <option>Rupture</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Image</label>
                    <img id="product-image-preview" class="image-preview" style="display:none;">
                    <button class="submit-btn" onclick="uploadProductImage()">Upload Image</button>
                </div>
                <div class="form-group">
                    <label>Vidéo (URL)</label>
                    <input type="text" id="product-video">
                </div>
                <button class="submit-btn" id="save-product-btn" onclick="saveProduct()" style="width: 100%;">Ajouter</button>
                <h2 style="margin-top: 40px;">Produits</h2>
                <div id="products-list" class="products-list"></div>
            </div>

            <!-- PROMOS -->
            <div id="promos-tab" class="tab-content">
                <div id="promos-message" class="message"></div>
                <h2>Ajouter Promo</h2>
                <div class="form-group">
                    <label>Sélectionner Produit</label>
                    <select id="promo-product">
                        <option value="">-- Choisir un produit --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantité (ex: 30g)</label>
                    <input type="text" id="promo-quantity" placeholder="30g">
                </div>
                <div class="form-group">
                    <label>Nouveau Prix €</label>
                    <input type="number" id="promo-price" placeholder="64">
                </div>
                <div class="form-group">
                    <label>Pourcentage Réduction %</label>
                    <input type="number" id="promo-percent" placeholder="20">
                </div>
                <div class="form-group">
                    <label>Date Expiration (optionnel)</label>
                    <input type="date" id="promo-expiration">
                </div>
                <button class="submit-btn" onclick="savePromo()" style="width: 100%;">Ajouter Promo</button>
                <h2 style="margin-top: 40px;">Promos Actives</h2>
                <div id="promos-list" class="promo-list"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "Tova$Shop2024!Secure";
        const CLOUDINARY_CLOUD = 'diezs6eqa';
        const CLOUDINARY_PRESET = 'svr_shop';

        let isLoggedIn = false;
        let shopData = { concours: { description: "", image: "" }, products: [], promos: [] };
        let currentProductId = null;
        let productImageUrl = null;

        async function loadShopData() {
            try {
                const response = await fetch('/data.json');
                shopData = await response.json();
                if (!shopData.promos) shopData.promos = [];
            } catch (error) {
                console.log('Error:', error);
            }
        }

        function login() {
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                isLoggedIn = true;
                showAdminPanel();
                loadShopData().then(() => {
                    loadConcours();
                    loadProducts();
                    loadPromos();
                });
            } else {
                document.getElementById('login-error').textContent = 'Mot de passe incorrect';
            }
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-panel').style.display = 'none';
        }

        function showAdminPanel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // CONCOURS
        function loadConcours() {
            document.getElementById('concours-description').value = shopData.concours.description || '';
            if (shopData.concours.image) {
                const img = document.getElementById('concours-image-preview');
                img.src = shopData.concours.image;
                img.style.display = 'block';
                img.dataset.url = shopData.concours.image;
            }
        }

        function uploadConcoursImage() {
            cloudinary.openUploadWidget({ cloudName: CLOUDINARY_CLOUD, uploadPreset: CLOUDINARY_PRESET, cropping: true, croppingAspectRatio: 16/9 }, (error, result) => {
                if (result && result.event === 'success') {
                    const img = document.getElementById('concours-image-preview');
                    img.src = result.info.secure_url;
                    img.style.display = 'block';
                    img.dataset.url = result.info.secure_url;
                }
            });
        }

        async function saveConcours() {
            const description = document.getElementById('concours-description').value;
            const imageEl = document.getElementById('concours-image-preview');
            const image = imageEl.dataset.url || imageEl.src;

            shopData.concours = { description, image };

            try {
                await fetch('/api/save-data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(shopData) });
                showMessage('concours', 'Sauvegardé!', 'success');
            } catch (error) {
                showMessage('concours', 'Erreur', 'error');
            }
        }

        // PRODUITS
        function loadProducts() {
            const grid = document.getElementById('products-list');
            grid.innerHTML = '';
            if (!shopData.products || shopData.products.length === 0) return;

            shopData.products.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-item';
                card.innerHTML = `<img src="${product.image}" alt="${product.name}"><h3>${product.name}</h3><div class="product-actions"><button class="edit-btn" onclick="editProduct(${index})">Éditer</button><button class="delete-btn" onclick="deleteProduct(${index})">Supprimer</button></div>`;
                grid.appendChild(card);
            });

            // Remplir le select des promos
            const select = document.getElementById('promo-product');
            select.innerHTML = '<option value="">-- Choisir un produit --</option>';
            shopData.products.forEach((product, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = product.name;
                select.appendChild(option);
            });
        }

        function uploadProductImage() {
            cloudinary.openUploadWidget({ cloudName: CLOUDINARY_CLOUD, uploadPreset: CLOUDINARY_PRESET, cropping: true, croppingAspectRatio: 1 }, (error, result) => {
                if (result && result.event === 'success') {
                    const img = document.getElementById('product-image-preview');
                    img.src = result.info.secure_url;
                    img.style.display = 'block';
                    productImageUrl = result.info.secure_url;
                }
            });
        }

        async function saveProduct() {
            const name = document.getElementById('product-name').value;
            const description = document.getElementById('product-description').value;
            const tariffs = document.getElementById('product-tariffs').value;
            const stock = document.getElementById('product-stock').value;
            const image = productImageUrl;
            const video = document.getElementById('product-video').value;

            if (!name || !tariffs || !image) {
                showMessage('products', 'Remplissez tous les champs', 'error');
                return;
            }

            const productData = { id: currentProductId !== null ? shopData.products[currentProductId].id : Date.now(), name, description, tariffs, stock, image, images: [], video };

            if (currentProductId !== null) {
                shopData.products[currentProductId] = productData;
            } else {
                shopData.products.push(productData);
            }

            try {
                await fetch('/api/save-data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(shopData) });
                showMessage('products', 'Sauvegardé!', 'success');
                resetProductForm();
                loadProducts();
            } catch (error) {
                showMessage('products', 'Erreur', 'error');
            }
        }

        function editProduct(index) {
            const product = shopData.products[index];
            currentProductId = index;
            document.getElementById('product-name').value = product.name;
            document.getElementById('product-description').value = product.description;
            document.getElementById('product-tariffs').value = product.tariffs;
            document.getElementById('product-stock').value = product.stock;
            document.getElementById('product-video').value = product.video || '';
            const img = document.getElementById('product-image-preview');
            img.src = product.image;
            img.style.display = 'block';
            productImageUrl = product.image;
            document.getElementById('save-product-btn').textContent = 'Modifier';
        }

        async function deleteProduct(index) {
            if (confirm('Êtes-vous sûr?')) {
                shopData.products.splice(index, 1);
                try {
                    await fetch('/api/save-data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(shopData) });
                    showMessage('products', 'Supprimé!', 'success');
                    loadProducts();
                } catch (error) {
                    showMessage('products', 'Erreur', 'error');
                }
            }
        }

        function resetProductForm() {
            document.getElementById('product-name').value = '';
            document.getElementById('product-description').value = '';
            document.getElementById('product-tariffs').value = '';
            document.getElementById('product-video').value = '';
            document.getElementById('product-image-preview').style.display = 'none';
            productImageUrl = null;
            currentProductId = null;
            document.getElementById('save-product-btn').textContent = 'Ajouter';
        }

        // PROMOS
        function loadPromos() {
            const list = document.getElementById('promos-list');
            list.innerHTML = '';

            if (!shopData.promos || shopData.promos.length === 0) {
                list.innerHTML = '<p style="color: #aaa;">Aucune promo</p>';
                return;
            }

            shopData.promos.forEach((promo, index) => {
                const product = shopData.products[promo.productId];
                const item = document.createElement('div');
                item.className = 'promo-item';
                item.innerHTML = `
                    <div>
                        <strong>${product ? product.name : 'Produit'}</strong> - ${promo.quantity} = ${promo.price}€ (-${promo.percent}%)
                        ${promo.expiration ? '<br><small>Expire: ' + promo.expiration + '</small>' : ''}
                    </div>
                    <button class="promo-delete" onclick="deletePromo(${index})">Supprimer</button>
                `;
                list.appendChild(item);
            });
        }

        async function savePromo() {
            const productId = document.getElementById('promo-product').value;
            const quantity = document.getElementById('promo-quantity').value;
            const price = document.getElementById('promo-price').value;
            const percent = document.getElementById('promo-percent').value;
            const expiration = document.getElementById('promo-expiration').value;

            if (!productId || !quantity || !price || !percent) {
                showMessage('promos', 'Remplissez tous les champs', 'error');
                return;
            }

            const promo = {
                id: Date.now(),
                productId: parseInt(productId),
                quantity,
                price: parseFloat(price),
                percent: parseInt(percent),
                expiration: expiration || null
            };

            shopData.promos.push(promo);

            try {
                await fetch('/api/save-data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(shopData) });
                showMessage('promos', 'Promo ajoutée!', 'success');
                document.getElementById('promo-product').value = '';
                document.getElementById('promo-quantity').value = '';
                document.getElementById('promo-price').value = '';
                document.getElementById('promo-percent').value = '';
                document.getElementById('promo-expiration').value = '';
                loadPromos();
            } catch (error) {
                showMessage('promos', 'Erreur', 'error');
            }
        }

        async function deletePromo(index) {
            if (confirm('Supprimer cette promo?')) {
                shopData.promos.splice(index, 1);
                try {
                    await fetch('/api/save-data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(shopData) });
                    showMessage('promos', 'Supprimé!', 'success');
                    loadPromos();
                } catch (error) {
                    showMessage('promos', 'Erreur', 'error');
                }
            }
        }

        function showMessage(type, message, status) {
            const el = document.getElementById(type + '-message');
            el.textContent = message;
            el.className = 'message ' + status;
            setTimeout(() => el.className = 'message', 3000);
        }

        resetProductForm();
    </script>
</body>
</html>
