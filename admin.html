<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://upload-widget.cloudinary.com/latest/sources/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .login-box input::placeholder {
            color: #aaa;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .admin-panel {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #d63447;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px 8px 0 0;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ddd;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .form-group textarea {
            min-height: 100px;
        }

        .submit-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .products-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }

        .product-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .product-item h3 {
            color: #667eea;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .product-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .edit-btn,
        .delete-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #667eea;
            color: white;
        }

        .edit-btn:hover {
            background: #5568d3;
        }

        .delete-btn {
            background: #f5576c;
            color: white;
        }

        .delete-btn:hover {
            background: #d63447;
        }

        .image-preview {
            width: 100%;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .gallery-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .gallery-item {
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gallery-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #000;
            display: block;
        }

        .message.error {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            display: block;
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h1>🛍️ SVR Shop Admin</h1>
            <input type="email" id="email" placeholder="Email" value="tovashop@svr.com">
            <input type="password" id="password" placeholder="Mot de passe" value="Tova$Shop2024!Secure">
            <button class="login-btn" onclick="login()">Se Connecter</button>
            <div id="login-error" style="color: #f5576c; margin-top: 15px; text-align: center;"></div>
        </div>
    </div>

    <div id="admin-panel" class="admin-panel">
        <div class="container">
            <div class="header">
                <h1>⚙️ Admin Panel</h1>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('concours')">🏆 Concours</button>
                <button class="tab-btn" onclick="switchTab('products')">📦 Produits</button>
            </div>

            <!-- CONCOURS TAB -->
            <div id="concours-tab" class="tab-content active">
                <div id="concours-message" class="message"></div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="concours-description" placeholder="Description du concours"></textarea>
                </div>
                <div class="form-group">
                    <label>Image (16:9)</label>
                    <img id="concours-image-preview" class="image-preview" style="display:none;">
                    <button class="submit-btn" onclick="uploadConcoursImage()">Télécharger Image</button>
                </div>
                <button class="submit-btn" onclick="saveConcours()" style="width: 100%; margin-top: 20px;">Sauvegarder Concours</button>
            </div>

            <!-- PRODUCTS TAB -->
            <div id="products-tab" class="tab-content">
                <div id="products-message" class="message"></div>

                <h2 style="margin-bottom: 20px; color: #667eea;">Ajouter/Éditer Produit</h2>

                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="product-name" placeholder="Nom du produit">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="product-description" placeholder="Description"></textarea>
                </div>

                <div class="form-group">
                    <label>Tarifs (format: 2g=20|30g=80|20g=150)</label>
                    <input type="text" id="product-tariffs" placeholder="2g=20|30g=80|20g=150">
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <select id="product-stock">
                        <option value="En stock">En stock</option>
                        <option value="Rupture">Rupture</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Image principale (1:1)</label>
                    <img id="product-image-preview" class="image-preview" style="display:none;">
                    <button class="submit-btn" onclick="uploadProductImage()">Télécharger Image</button>
                </div>

                <div class="form-group">
                    <label>Galerie (jusqu'à 10 images 1:1)</label>
                    <div id="gallery-preview" class="gallery-list"></div>
                    <button class="submit-btn" onclick="uploadGalleryImage()">Ajouter Image Galerie</button>
                </div>

                <div class="form-group">
                    <label>Vidéo (URL)</label>
                    <input type="text" id="product-video" placeholder="URL de la vidéo MP4">
                    <button class="submit-btn" onclick="uploadProductVideo()" style="margin-top: 10px;">Télécharger Vidéo</button>
                </div>

                <button class="submit-btn" id="save-product-btn" onclick="saveProduct()" style="width: 100%; margin-top: 20px;">Ajouter Produit</button>

                <h2 style="margin-top: 40px; margin-bottom: 20px; color: #667eea;">Produits</h2>
                <div id="products-list" class="products-list"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const BOT_TOKEN = '8774455983:AAHkE3OlVnrfaZ6-ni3W4d4vL1YLUdtpufs';
        const CLOUDINARY_CLOUD = 'diezs6eqa';
        const CLOUDINARY_PRESET = 'svr_shop';

        let currentUser = null;
        let currentProductId = null;
        let productGallery = [];
        let productImageUrl = null;

        // Check auth state
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                showAdminPanel();
                loadConcours();
                loadProducts();
            } else {
                showLoginScreen();
            }
        });

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                document.getElementById('login-error').textContent = error.message;
                console.error('Login error:', error);
            }
        }

        function logout() {
            auth.signOut();
            showLoginScreen();
        }

        function showLoginScreen() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-panel').style.display = 'none';
        }

        function showAdminPanel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // ===== CONCOURS =====
        async function loadConcours() {
            try {
                const doc = await db.collection('concours').doc('main').get();
                if (doc.exists) {
                    document.getElementById('concours-description').value = doc.data().description || '';
                    if (doc.data().image) {
                        const img = document.getElementById('concours-image-preview');
                        img.src = doc.data().image;
                        img.style.display = 'block';
                        img.dataset.url = doc.data().image;
                    }
                }
            } catch (error) {
                console.error('Error loading concours:', error);
            }
        }

        function uploadConcoursImage() {
            cloudinary.openUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    cropping: true,
                    croppingAspectRatio: 16 / 9
                },
                (error, result) => {
                    if (result && result.event === 'success') {
                        const img = document.getElementById('concours-image-preview');
                        img.src = result.info.secure_url;
                        img.style.display = 'block';
                        img.dataset.url = result.info.secure_url;
                    }
                }
            );
        }

        async function saveConcours() {
            const description = document.getElementById('concours-description').value;
            const imageEl = document.getElementById('concours-image-preview');
            const image = imageEl.dataset.url || imageEl.src;

            if (!image) {
                showMessage('concours', 'Téléchargez une image', 'error');
                return;
            }

            try {
                await db.collection('concours').doc('main').set({
                    description,
                    image
                });
                showMessage('concours', 'Concours sauvegardé!', 'success');
            } catch (error) {
                showMessage('concours', error.message, 'error');
            }
        }

        // ===== PRODUCTS =====
        async function loadProducts() {
            try {
                const snapshot = await db.collection('products').get();
                const grid = document.getElementById('products-list');
                grid.innerHTML = '';

                if (snapshot.empty) {
                    grid.innerHTML = '<p style="color: #aaa; grid-column: 1/-1; text-align: center;">Aucun produit</p>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const product = { id: doc.id, ...doc.data() };
                    const card = document.createElement('div');
                    card.className = 'product-item';
                    card.innerHTML = `
                        <img src="${product.image || 'https://via.placeholder.com/200'}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <div class="product-actions">
                            <button class="edit-btn" onclick="editProduct('${doc.id}')">Éditer</button>
                            <button class="delete-btn" onclick="deleteProduct('${doc.id}')">Supprimer</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function uploadProductImage() {
            cloudinary.openUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    cropping: true,
                    croppingAspectRatio: 1
                },
                (error, result) => {
                    if (result && result.event === 'success') {
                        const img = document.getElementById('product-image-preview');
                        img.src = result.info.secure_url;
                        img.style.display = 'block';
                        productImageUrl = result.info.secure_url;
                    }
                }
            );
        }

        function uploadGalleryImage() {
            cloudinary.openUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    cropping: true,
                    croppingAspectRatio: 1
                },
                (error, result) => {
                    if (result && result.event === 'success' && productGallery.length < 10) {
                        productGallery.push(result.info.secure_url);
                        updateGalleryPreview();
                    }
                }
            );
        }

        function updateGalleryPreview() {
            const preview = document.getElementById('gallery-preview');
            preview.innerHTML = '';

            productGallery.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="${img}" alt="Gallery ${index}">
                    <button class="gallery-remove" onclick="removeGalleryImage(${index})">×</button>
                `;
                preview.appendChild(item);
            });
        }

        function removeGalleryImage(index) {
            productGallery.splice(index, 1);
            updateGalleryPreview();
        }

        function uploadProductVideo() {
            cloudinary.openUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    resourceType: 'video'
                },
                (error, result) => {
                    if (result && result.event === 'success') {
                        document.getElementById('product-video').value = result.info.secure_url;
                    }
                }
            );
        }

        async function saveProduct() {
            const name = document.getElementById('product-name').value;
            const description = document.getElementById('product-description').value;
            const tariffs = document.getElementById('product-tariffs').value;
            const stock = document.getElementById('product-stock').value;
            const image = productImageUrl || document.getElementById('product-image-preview').src;
            const video = document.getElementById('product-video').value;

            if (!name || !tariffs || !image) {
                showMessage('products', 'Remplissez tous les champs obligatoires', 'error');
                return;
            }

            const productData = {
                name,
                description,
                tariffs,
                stock,
                image,
                images: productGallery.length > 0 ? productGallery : [],
                video: video || null
            };

            try {
                if (currentProductId) {
                    await db.collection('products').doc(currentProductId).update(productData);
                } else {
                    await db.collection('products').add(productData);
                }
                showMessage('products', 'Produit sauvegardé!', 'success');
                resetProductForm();
                loadProducts();
            } catch (error) {
                showMessage('products', error.message, 'error');
            }
        }

        async function editProduct(id) {
            try {
                const doc = await db.collection('products').doc(id).get();
                const product = doc.data();
                currentProductId = id;
                productGallery = product.images || [];

                document.getElementById('product-name').value = product.name;
                document.getElementById('product-description').value = product.description || '';
                document.getElementById('product-tariffs').value = product.tariffs;
                document.getElementById('product-stock').value = product.stock;
                document.getElementById('product-video').value = product.video || '';

                const img = document.getElementById('product-image-preview');
                img.src = product.image;
                img.style.display = 'block';
                productImageUrl = product.image;

                updateGalleryPreview();
                document.getElementById('save-product-btn').textContent = 'Modifier Produit';
                document.getElementById('products-tab').scrollIntoView();
            } catch (error) {
                console.error('Error editing product:', error);
            }
        }

        async function deleteProduct(id) {
            if (confirm('Êtes-vous sûr?')) {
                try {
                    await db.collection('products').doc(id).delete();
                    showMessage('products', 'Produit supprimé!', 'success');
                    loadProducts();
                } catch (error) {
                    showMessage('products', error.message, 'error');
                }
            }
        }

        function resetProductForm() {
            document.getElementById('product-name').value = '';
            document.getElementById('product-description').value = '';
            document.getElementById('product-tariffs').value = '';
            document.getElementById('product-stock').value = 'En stock';
            document.getElementById('product-video').value = '';
            document.getElementById('product-image-preview').style.display = 'none';
            productGallery = [];
            productImageUrl = null;
            updateGalleryPreview();
            currentProductId = null;
            document.getElementById('save-product-btn').textContent = 'Ajouter Produit';
        }

        function showMessage(type, message, status) {
            const el = document.getElementById(type + '-message');
            el.textContent = message;
            el.className = 'message ' + status;
            setTimeout(() => el.className = 'message', 3000);
        }

        // Initialize
        resetProductForm();
    </script>
</body>
</html>
