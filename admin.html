<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://upload-widget.cloudinary.com/latest/sources/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .login-box input::placeholder {
            color: #aaa;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .admin-panel {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #d63447;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px 8px 0 0;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ddd;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .form-group textarea {
            min-height: 100px;
        }

        .submit-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .products-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }

        .product-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .product-item h3 {
            color: #667eea;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .product-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .edit-btn,
        .delete-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #667eea;
            color: white;
        }

        .edit-btn:hover {
            background: #5568d3;
        }

        .delete-btn {
            background: #f5576c;
            color: white;
        }

        .delete-btn:hover {
            background: #d63447;
        }

        .image-preview {
            width: 100%;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .gallery-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .gallery-item {
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gallery-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #000;
            display: block;
        }

        .message.error {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            position: relative;
            margin-bottom: 20px;
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h1>🛍️ SVR Shop Admin</h1>
            <input type="email" id="email" placeholder="Email" value="tovashop@svr.com">
            <input type="password" id="password" placeholder="Mot de passe" value="Tova$Shop2024!Secure">
            <button class="login-btn" onclick="login()">Se Connecter</button>
            <div id="login-error" style="color: #f5576c; margin-top: 15px; text-align: center;"></div>
        </div>
    </div>

    <div id="admin-panel" class="admin-panel">
        <div class="container">
            <div class="header">
                <h1>⚙️ Admin Panel</h1>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('concours')">🏆 Concours</button>
                <button class="tab-btn" onclick="switchTab('products')">📦 Produits</button>
            </div>

            <!-- CONCOURS TAB -->
            <div id="concours-tab" class="tab-content active">
                <div id="concours-message" class="message"></div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="concours-description" placeholder="Description du concours"></textarea>
                </div>
                <div class="form-group">
                    <label>Image (16:9)</label>
                    <img id="concours-image-preview" class="image-preview" style="display:none;">
                    <button class="submit-btn" onclick="uploadConcoursImage()">Télécharger Image</button>
                </div>
                <button class="submit-btn" onclick="saveConcours()" style="width: 100%; margin-top: 20px;">Sauvegarder Concours</button>
            </div>

            <!-- PRODUCTS TAB -->
            <div id="products-tab" class="tab-content">
                <div id="products-message" class="message"></div>

                <h2 style="margin-bottom: 20px; color: #667eea;">Ajouter/Éditer Produit</h2>

                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="product-name" placeholder="Nom du produit">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="product-description" placeholder="Description"></textarea>
                </div>

                <div class="form-group">
                    <label>Tarifs (format: 2g=20|30g=80|20g=150)</label>
                    <input type="text" id="product-tariffs" placeholder="2g=20|30g=80|20g=150">
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <select id="product-stock">
                        <option value="En stock">En stock</option>
                        <option value="Rupture">Rupture</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Image principale (1:1)</label>
                    <img id="product-image-preview" class="image-preview" style="display:none;">
                    <button class="submit-btn" onclick="uploadProductImage()">Télécharger Image</button>
                </div>

                <div class="form-group">
                    <label>Galerie (jusqu'à 10 images 1:1)</label>
                    <div id="gallery-preview" class="gallery-list"></div>
                    <button class="submit-btn" onclick="uploadGalleryImage()">Ajouter Image Galerie</button>
                </div>

                <div class="form-group">
                    <label>Vidéo (URL ou télécharger)</label>
                    <input type="text" id="product-video" placeholder="URL ou télécharger">
                    <button class="submit-btn" onclick="uploadProductVideo()" style="margin-top: 10px;">Télécharger Vidéo</button>
                </div>

                <button class="submit-btn" id="save-product-btn" onclick="saveProduct()" style="width: 100%; margin-top: 20px;">Ajouter Produit</button>

                <h2 style="margin-top: 40px; margin-bottom: 20px; color: #667eea;">Produits</h2>
                <div id="products-list" class="products-list"></div>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeEditModal()">&times;</button>
            <h2 style="color: #667eea; margin-bottom: 20px;">Éditer Produit</h2>
            <div id="edit-form"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zgpxafqyrobthfedjwdu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1Jiz6cx9rPQpfk4Zwc4kZw_ZYLPhK_2';
        const BOT_TOKEN = '8774455983:AAHkE3OlVnrfaZ6-ni3W4d4vL1YLUdtpufs';
        const CLOUDINARY_CLOUD = 'diezs6eqa';
        const CLOUDINARY_PRESET = 'svr_shop';

        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentProductId = null;
        let productGallery = [];

        // Check auth state
        supabase.auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                showAdminPanel();
                loadConcours();
                loadProducts();
            } else {
                showLoginScreen();
            }
        });

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('login-error').textContent = error.message;
            }
        }

        function logout() {
            supabase.auth.signOut();
            showLoginScreen();
        }

        function showLoginScreen() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-panel').style.display = 'none';
        }

        function showAdminPanel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // ===== CONCOURS =====
        async function loadConcours() {
            const { data } = await supabase.from('concours').select('*').limit(1);
            if (data && data.length > 0) {
                document.getElementById('concours-description').value = data[0].description || '';
                if (data[0].image) {
                    const img = document.getElementById('concours-image-preview');
                    img.src = data[0].image;
                    img.style.display = 'block';
                }
            }
        }

        function uploadConcoursImage() {
            cloudinary.openUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    cropping: true,
                    croppingAspectRatio: 16 / 9
                },
                (error, result) => {
                    if (result && result.event === 'success') {
                        const img = document.getElementById('concours-image-preview');
                        img.src = result.info.secure_url;
                        img.style.display = 'block';
                        img.dataset.url = result.info.secure_url;
                    }
                }
            );
        }

        async function saveConcours() {
            const description = document.getElementById('concours-description').value;
            const imageEl = document.getElementById('concours-image-preview');
            const image = imageEl.dataset.url || imageEl.src;

            const { data, error } = await supabase
                .from('concours')
                .upsert({ id: 1, description, image }, { onConflict: 'id' });

            if (error) {
                showMessage('concours', error.message, 'error');
            } else {
                showMessage('concours', 'Concours sauvegardé!', 'success');
                sendTelegramMessage(`🏆 Concours mis à jour: ${description.substring(0, 50)}...`);
            }
        }

        // ===== PRODUCTS =====
        async function loadProducts() {
            const { data } = await supabase.from('products').select('*');
            const grid = document.getElementById('products-list');
            grid.innerHTML = '';

            data.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-item';
                card.innerHTML = `
                    <img src="${product.image || 'https://via.placeholder.com/200'}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <div class="product-actions">
                        <button class="edit-btn" onclick="editProduct(${product.id})">Éditer</button>
                        <button class="delete-btn" onclick="deleteProduct(${product.id})">Supprimer</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function uploadProductImage() {
            cloudinary.openUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    cropping: true,
                    croppingAspectRatio: 1
                },
                (error, result) => {
                    if (result && result.event === 'success') {
                        const img = document.getElementById('product-image-preview');
                        img.src = result.info.secure_url;
                        img.style.display = 'block';
                        img.dataset.url = result.info.secure_url;
                    }
                }
            );
        }

        function uploadGalleryImage() {
            cloudinary.openUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    cropping: true,
                    croppingAspectRatio: 1
                },
                (error, result) => {
                    if (result && result.event === 'success' && productGallery.length < 10) {
                        productGallery.push(result.info.secure_url);
                        updateGalleryPreview();
                    }
                }
            );
        }

        function updateGalleryPreview() {
            const preview = document.getElementById('gallery-preview');
            preview.innerHTML = '';

            productGallery.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="${img}" alt="Gallery ${index}">
                    <button class="gallery-remove" onclick="removeGalleryImage(${index})">×</button>
                `;
                preview.appendChild(item);
            });
        }

        function removeGalleryImage(index) {
            productGallery.splice(index, 1);
            updateGalleryPreview();
        }

        function uploadProductVideo() {
            cloudinary.openUploadWidget(
                {
                    cloudName: CLOUDINARY_CLOUD,
                    uploadPreset: CLOUDINARY_PRESET,
                    resourceType: 'video',
                    fileFilter: { resourceType: 'video' }
                },
                (error, result) => {
                    if (result && result.event === 'success') {
                        document.getElementById('product-video').value = result.info.secure_url;
                    }
                }
            );
        }

        async function saveProduct() {
            const name = document.getElementById('product-name').value;
            const description = document.getElementById('product-description').value;
            const tariffs = document.getElementById('product-tariffs').value;
            const stock = document.getElementById('product-stock').value;
            const imageEl = document.getElementById('product-image-preview');
            const image = imageEl.dataset.url || imageEl.src;
            const video = document.getElementById('product-video').value;

            if (!name || !tariffs || !image) {
                showMessage('products', 'Remplissez tous les champs obligatoires', 'error');
                return;
            }

            const productData = {
                name,
                description,
                tariffs,
                stock,
                image,
                images: productGallery,
                video: video || null
            };

            let error;
            if (currentProductId) {
                ({ error } = await supabase
                    .from('products')
                    .update(productData)
                    .eq('id', currentProductId));
            } else {
                ({ error } = await supabase
                    .from('products')
                    .insert([productData]));
            }

            if (error) {
                showMessage('products', error.message, 'error');
            } else {
                showMessage('products', 'Produit sauvegardé!', 'success');
                sendTelegramMessage(`🆕 Nouveau produit: ${name}`);
                resetProductForm();
                loadProducts();
            }
        }

        async function editProduct(id) {
            const { data } = await supabase.from('products').select('*').eq('id', id).single();
            currentProductId = id;
            productGallery = data.images || [];

            document.getElementById('product-name').value = data.name;
            document.getElementById('product-description').value = data.description || '';
            document.getElementById('product-tariffs').value = data.tariffs;
            document.getElementById('product-stock').value = data.stock;
            document.getElementById('product-video').value = data.video || '';

            const img = document.getElementById('product-image-preview');
            img.src = data.image;
            img.style.display = 'block';
            img.dataset.url = data.image;

            updateGalleryPreview();

            document.getElementById('save-product-btn').textContent = 'Modifier Produit';
            document.getElementById('products-tab').scrollIntoView();
        }

        async function deleteProduct(id) {
            if (confirm('Êtes-vous sûr?')) {
                const { error } = await supabase.from('products').delete().eq('id', id);
                if (!error) {
                    showMessage('products', 'Produit supprimé!', 'success');
                    sendTelegramMessage(`🗑️ Produit supprimé`);
                    loadProducts();
                }
            }
        }

        function resetProductForm() {
            document.getElementById('product-name').value = '';
            document.getElementById('product-description').value = '';
            document.getElementById('product-tariffs').value = '';
            document.getElementById('product-stock').value = 'En stock';
            document.getElementById('product-video').value = '';
            document.getElementById('product-image-preview').style.display = 'none';
            productGallery = [];
            updateGalleryPreview();
            currentProductId = null;
            document.getElementById('save-product-btn').textContent = 'Ajouter Produit';
        }

        function showMessage(type, message, status) {
            const el = document.getElementById(type + '-message');
            el.textContent = message;
            el.className = 'message ' + status;
            setTimeout(() => el.className = 'message', 3000);
        }

        async function sendTelegramMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const params = new URLSearchParams({
                text: text,
                parse_mode: 'HTML'
            });

            // Note: This will fail due to CORS, mais ça permet au bot de recevoir les notifs via webhook
            // Pour une vraie implémentation, utiliser un backend Node.js
        }

        // Initialize
        resetProductForm();
    </script>
</body>
</html>
