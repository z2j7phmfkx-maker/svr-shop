<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop Admin</title>
    <script src="https://upload-widget.cloudinary.com/latest/CloudinaryUploadWidget.js" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .login-form {
            background: rgba(26, 31, 58, 0.8);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .login-form h2 {
            margin-bottom: 20px;
            color: #00d4ff;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b8d4;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(45, 53, 97, 0.5);
            border: 1px solid #00d4ff;
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            background: rgba(45, 53, 97, 0.8);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #0a0e27;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        .admin-panel {
            display: none;
        }
        .admin-panel.active {
            display: block;
        }
        .section {
            background: rgba(26, 31, 58, 0.8);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .section h3 {
            color: #00d4ff;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }
        .upload-btn {
            background: linear-gradient(135deg, #ff6b00 0%, #ff8c00 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.4);
        }
        .image-preview {
            width: 100px;
            height: 100px;
            margin-top: 10px;
            border-radius: 5px;
            object-fit: cover;
            border: 1px solid #00d4ff;
        }
        .product-item {
            background: rgba(45, 53, 97, 0.5);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 3px solid #00d4ff;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .product-image {
            width: 80px;
            height: 80px;
            border-radius: 5px;
            object-fit: cover;
            border: 1px solid #00d4ff;
            flex-shrink: 0;
        }
        .product-info {
            flex: 1;
        }
        .product-item h4 {
            color: #00d4ff;
            margin-bottom: 8px;
        }
        .product-item p {
            color: #b0b8d4;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-edit, .btn-delete {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-edit {
            background: #00d4ff;
            color: #0a0e27;
        }
        .btn-edit:hover {
            box-shadow: 0 3px 10px rgba(0, 212, 255, 0.4);
        }
        .btn-delete {
            background: #ff4444;
            color: white;
        }
        .btn-delete:hover {
            background: #ff2222;
        }
        .logout-btn {
            background: #ff4444;
            color: white;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background: #ff2222;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: rgba(26, 31, 58, 0.95);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            margin: 20px auto;
        }
        .modal-content h3 {
            color: #00d4ff;
            margin-bottom: 20px;
        }
        .close-modal {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
            cursor: pointer;
        }
        .close-modal:hover {
            color: #ff6b00;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div class="login-form" id="loginForm">
            <h2>🔐 SVR Shop Admin</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="adminEmail" placeholder="admin@ltdm.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="adminPassword" placeholder="Entrez votre mot de passe">
            </div>
            <button onclick="login()">Se connecter</button>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel">
            <!-- Concours Section -->
            <div class="section">
                <h3>📢 Gérer le Concours</h3>
                <div class="form-group">
                    <label>Description du concours</label>
                    <input type="text" id="concoursDesc" placeholder="Gagnez des cadeaux!">
                </div>
                <div class="form-group">
                    <label>Image du concours</label>
                    <button class="upload-btn" onclick="openConcoursUpload()">📁 Sélectionner une photo</button>
                    <img id="concoursImagePreview" class="image-preview" style="display: none;">
                    <input type="hidden" id="concoursImageUrl">
                </div>
                <button onclick="saveConcours()">💾 Sauvegarder le concours</button>
            </div>

            <!-- Add Product Section -->
            <div class="section">
                <h3>➕ Ajouter un produit</h3>
                <div class="form-group">
                    <label>Nom du produit</label>
                    <input type="text" id="productName" placeholder="Ex: Hash de luxe">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="productDesc" placeholder="Ex: Hash premium de haute qualité">
                </div>
                <div class="form-group">
                    <label>Tarifs (séparés par |)</label>
                    <input type="text" id="productTarifs" placeholder="Ex: 1g = 20€ | 5g = 90€ | 10g = 150€">
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="productStock" placeholder="Ex: 10" value="10">
                </div>
                <div class="form-group">
                    <label>Image principale</label>
                    <button class="upload-btn" onclick="openProductImageUpload('main')">📁 Sélectionner une photo</button>
                    <img id="productImagePreview" class="image-preview" style="display: none;">
                    <input type="hidden" id="productImage">
                </div>
                <div class="form-group">
                    <label>Galerie (images séparées par |)</label>
                    <button class="upload-btn" onclick="openProductImageUpload('gallery')">📁 Ajouter à la galerie</button>
                    <input type="text" id="productGallery" placeholder="URL1 | URL2 | URL3">
                </div>
                <div class="form-group">
                    <label>Vidéo (URL MP4)</label>
                    <input type="text" id="productVideo" placeholder="https://example.com/video.mp4">
                </div>
                <button onclick="addProduct()">✅ Ajouter le produit</button>
            </div>

            <!-- Products List -->
            <div class="section">
                <h3>📦 Produits</h3>
                <div id="productsList"></div>
            </div>

            <!-- Logout -->
            <button class="logout-btn" onclick="logout()">🚪 Déconnexion</button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h3>✏️ Modifier le produit</h3>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="editProductName">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="editProductDesc">
            </div>
            <div class="form-group">
                <label>Tarifs</label>
                <input type="text" id="editProductTarifs">
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" id="editProductStock">
            </div>
            <div class="form-group">
                <label>Image principale</label>
                <button class="upload-btn" onclick="openEditImageUpload()">📁 Changer la photo</button>
                <img id="editImagePreview" class="image-preview" style="display: none;">
                <input type="hidden" id="editProductImage">
            </div>
            <button onclick="saveEditProduct()">💾 Sauvegarder</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let editingProductId = null;
        let uploadType = 'main';
        let cloudinaryCloudName = "diezs6eqa";

        window.login = async function() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                currentUser = auth.currentUser;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                loadProducts();
                loadConcours();
            } catch (error) {
                alert('Erreur de connexion: ' + error.message);
            }
        };

        window.logout = async function() {
            await signOut(auth);
            currentUser = null;
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
        };

        window.openConcoursUpload = function() {
            uploadType = 'concours';
            cloudinary.openUploadWidget({
                cloudName: cloudinaryCloudName,
                uploadPreset: "unsigned_upload",
                cropping: true,
                croppingAspectRatio: 16/9,
                maxFiles: 1,
                resourceType: "image"
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    const url = result.info.secure_url;
                    document.getElementById('concoursImageUrl').value = url;
                    document.getElementById('concoursImagePreview').src = url;
                    document.getElementById('concoursImagePreview').style.display = 'block';
                }
            });
        };

        window.openProductImageUpload = function(type) {
            uploadType = type;
            cloudinary.openUploadWidget({
                cloudName: cloudinaryCloudName,
                uploadPreset: "unsigned_upload",
                cropping: true,
                croppingAspectRatio: 1,
                maxFiles: 1,
                resourceType: "image"
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    const url = result.info.secure_url;
                    if (type === 'main') {
                        document.getElementById('productImage').value = url;
                        document.getElementById('productImagePreview').src = url;
                        document.getElementById('productImagePreview').style.display = 'block';
                    } else if (type === 'gallery') {
                        const currentGallery = document.getElementById('productGallery').value;
                        if (currentGallery) {
                            document.getElementById('productGallery').value = currentGallery + ' | ' + url;
                        } else {
                            document.getElementById('productGallery').value = url;
                        }
                    }
                }
            });
        };

        window.openEditImageUpload = function() {
            cloudinary.openUploadWidget({
                cloudName: cloudinaryCloudName,
                uploadPreset: "unsigned_upload",
                cropping: true,
                croppingAspectRatio: 1,
                maxFiles: 1,
                resourceType: "image"
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    const url = result.info.secure_url;
                    document.getElementById('editProductImage').value = url;
                    document.getElementById('editImagePreview').src = url;
                    document.getElementById('editImagePreview').style.display = 'block';
                }
            });
        };

        window.saveConcours = async function() {
            const desc = document.getElementById('concoursDesc').value;
            const image = document.getElementById('concoursImageUrl').value;

            try {
                const concoursRef = doc(db, "concours", "main");
                await updateDoc(concoursRef, {
                    description: desc,
                    image: image
                }).catch(() => {
                    return addDoc(collection(db, "concours"), {
                        description: desc,
                        image: image
                    });
                });
                alert('Concours sauvegardé !');
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };

        window.addProduct = async function() {
            const name = document.getElementById('productName').value;
            const desc = document.getElementById('productDesc').value;
            const tarifs = document.getElementById('productTarifs').value;
            const stock = parseInt(document.getElementById('productStock').value) || 0;
            const image = document.getElementById('productImage').value;
            const gallery = document.getElementById('productGallery').value;
            const video = document.getElementById('productVideo').value;

            if (!name || !desc || !tarifs) {
                alert('Remplissez les champs obligatoires (nom, description, tarifs)');
                return;
            }

            try {
                await addDoc(collection(db, "products"), {
                    name: name,
                    description: desc,
                    tarifs: tarifs,
                    stock: stock,
                    image: image || '',
                    gallery: gallery || '',
                    video: video || ''
                });
                alert('Produit ajouté !');
                document.getElementById('productName').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productTarifs').value = '';
                document.getElementById('productStock').value = '10';
                document.getElementById('productImage').value = '';
                document.getElementById('productImagePreview').style.display = 'none';
                document.getElementById('productGallery').value = '';
                document.getElementById('productVideo').value = '';
                loadProducts();
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };

        window.loadProducts = async function() {
            const querySnapshot = await getDocs(collection(db, "products"));
            let html = '';
            querySnapshot.forEach(doc => {
                const product = doc.data();
                html += `
                    <div class="product-item">
                        ${product.image ? `<img src="${product.image}" alt="${product.name}" class="product-image">` : ''}
                        <div class="product-info">
                            <h4>${product.name}</h4>
                            <p><strong>Description:</strong> ${product.description}</p>
                            <p><strong>Tarifs:</strong> ${product.tarifs}</p>
                            <p><strong>Stock:</strong> ${product.stock}</p>
                            <div class="product-actions">
                                <button class="btn-edit" onclick="editProduct('${doc.id}')">✏️ Modifier</button>
                                <button class="btn-delete" onclick="deleteProduct('${doc.id}')">🗑️ Supprimer</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('productsList').innerHTML = html || '<p>Aucun produit</p>';
        };

        window.editProduct = async function(productId) {
            editingProductId = productId;
            const docSnap = await getDoc(doc(db, "products", productId));
            const product = docSnap.data();
            document.getElementById('editProductName').value = product.name;
            document.getElementById('editProductDesc').value = product.description;
            document.getElementById('editProductTarifs').value = product.tarifs;
            document.getElementById('editProductStock').value = product.stock;
            
            if (product.image) {
                document.getElementById('editProductImage').value = product.image;
                document.getElementById('editImagePreview').src = product.image;
                document.getElementById('editImagePreview').style.display = 'block';
            }
            
            document.getElementById('editModal').classList.add('active');
        };

        window.saveEditProduct = async function() {
            if (!editingProductId) return;
            try {
                const updateData = {
                    name: document.getElementById('editProductName').value,
                    description: document.getElementById('editProductDesc').value,
                    tarifs: document.getElementById('editProductTarifs').value,
                    stock: parseInt(document.getElementById('editProductStock').value) || 0
                };
                
                const newImage = document.getElementById('editProductImage').value;
                if (newImage) {
                    updateData.image = newImage;
                }
                
                await updateDoc(doc(db, "products", editingProductId), updateData);
                alert('Produit modifié !');
                closeEditModal();
                loadProducts();
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };

        window.closeEditModal = function() {
            document.getElementById('editModal').classList.remove('active');
            editingProductId = null;
        };

        window.deleteProduct = async function(productId) {
            if (confirm('Êtes-vous sûr?')) {
                try {
                    await deleteDoc(doc(db, "products", productId));
                    alert('Produit supprimé !');
                    loadProducts();
                } catch (error) {
                    alert('Erreur: ' + error.message);
                }
            }
        };

        window.loadConcours = async function() {
            try {
                const docSnap = await getDoc(doc(db, "concours", "main"));
                if (docSnap.exists()) {
                    const concours = docSnap.data();
                    document.getElementById('concoursDesc').value = concours.description || '';
                    if (concours.image) {
                        document.getElementById('concoursImageUrl').value = concours.image;
                        document.getElementById('concoursImagePreview').src = concours.image;
                        document.getElementById('concoursImagePreview').style.display = 'block';
                    }
                }
            } catch (error) {
                console.log('Aucun concours trouvé');
            }
        };
    </script>
</body>
</html>
