<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin SVR Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0e27; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #00d4ff; margin-bottom: 30px; font-size: 24px; }
        h2 { color: #00d4ff; margin-top: 30px; margin-bottom: 20px; font-size: 18px; }
        .login-form, .admin-panel { background: #1a1f3a; padding: 30px; border-radius: 12px; }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #2d3561;
            background: #0f1428;
            color: white;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
        }
        button { 
            width: 100%;
            padding: 12px; 
            margin: 10px 0;
            background: #00d4ff; 
            color: #0a0e27; 
            border: none;
            cursor: pointer; 
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        button:hover { 
            background: #fff;
            transform: translateY(-2px);
        }
        .products-list { margin-top: 30px; }
        .product-item { 
            background: #2d3561; 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }
        .product-item h3 { margin-bottom: 10px; color: #00d4ff; }
        .product-item p { font-size: 13px; color: #aaa; margin: 5px 0; }
        .btn-delete { background: #f44336; color: white; }
        .btn-delete:hover { background: #d32f2f; }
        .hidden { display: none; }
        .logout-btn { background: #666; color: white; width: auto; padding: 10px 20px !important; margin: 0 !important; }
        .logout-btn:hover { background: #555; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .section { 
            background: #1a1f3a; 
            padding: 25px; 
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2d3561;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: 600;
            font-size: 13px;
        }
        .divider { height: 1px; background: #2d3561; margin: 30px 0; }
    </style>
</head>
<body>
    <div class="container">
        <!-- FORMULAIRE LOGIN -->
        <div id="loginForm" class="login-form">
            <h1>🔐 Connexion Admin</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button onclick="login()">Se connecter</button>
            <p style="margin-top: 20px; font-size: 12px; color: #aaa;">Les identifiants vous ont été envoyés par le propriétaire du site.</p>
        </div>

        <!-- PANEL ADMIN -->
        <div id="adminPanel" class="admin-panel hidden">
            <div class="header">
                <h1>📊 Tableau de bord Admin</h1>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>

            <!-- SECTION CONCOURS -->
            <div class="section">
                <h2>🎉 Gérer le Concours</h2>
                <div class="form-group">
                    <label>Description du concours</label>
                    <textarea id="concoursDesc" placeholder="Ex: Gagnez des cadeaux!" style="height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label>URL de l'image (concours)</label>
                    <input type="text" id="concoursImage" placeholder="https://example.com/image.jpg">
                </div>
                <button onclick="saveConcours()">Sauvegarder le concours</button>
            </div>

            <div class="divider"></div>

            <!-- SECTION PRODUITS -->
            <div class="section">
                <h2>➕ Ajouter un produit</h2>
                <div class="form-group">
                    <label>Nom du produit</label>
                    <input type="text" id="productName" placeholder="Ex: Hash de luxe">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDesc" placeholder="Ex: Haute Gamme Qualité" style="height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Tarifs (séparés par |)</label>
                    <input type="text" id="productTarifs" placeholder="Ex: 1g = 20€ | 5g = 90€ | 10g = 150€">
                    <small style="color: #aaa; display: block; margin-top: 5px;">Format: quantité = prix | quantité = prix</small>
                </div>
                <div class="form-group">
                    <label>Stock (0 = indisponible)</label>
                    <input type="number" id="productStock" placeholder="Ex: 10" step="1">
                </div>
                <div class="form-group">
                    <label>URL de l'image</label>
                    <input type="text" id="productImage" placeholder="https://example.com/image.jpg">
                </div>
                <button onclick="addProduct()">Ajouter le produit</button>
            </div>

            <div class="divider"></div>

            <!-- LISTE PRODUITS -->
            <div class="products-list">
                <h2>📦 Vos produits</h2>
                <div id="productsList"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, setDoc, query, limit } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // VOS DONNÉES FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.login = async function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                alert("Veuillez remplir email et mot de passe");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById("loginForm").classList.add("hidden");
                document.getElementById("adminPanel").classList.remove("hidden");
                loadProducts();
                loadConcours();
            } catch (error) {
                alert("Erreur de connexion: " + error.message);
            }
        };

        window.logout = async function() {
            await signOut(auth);
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("adminPanel").classList.add("hidden");
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
        };

        window.addProduct = async function() {
            const name = document.getElementById("productName").value;
            const desc = document.getElementById("productDesc").value;
            const tarifs = document.getElementById("productTarifs").value;
            const stock = parseInt(document.getElementById("productStock").value);
            const image = document.getElementById("productImage").value;

            if (!name || !desc || !tarifs || stock === "" || !image) {
                alert("Remplissez tous les champs!");
                return;
            }

            try {
                await addDoc(collection(db, "products"), {
                    name,
                    description: desc,
                    tarifs,
                    stock,
                    image
                });
                alert("Produit ajouté avec succès!");
                document.getElementById("productName").value = "";
                document.getElementById("productDesc").value = "";
                document.getElementById("productTarifs").value = "";
                document.getElementById("productStock").value = "";
                document.getElementById("productImage").value = "";
                loadProducts();
            } catch (error) {
                alert("Erreur: " + error.message);
            }
        };

        window.saveConcours = async function() {
            const desc = document.getElementById("concoursDesc").value;
            const image = document.getElementById("concoursImage").value;

            if (!desc || !image) {
                alert("Remplissez tous les champs du concours!");
                return;
            }

            try {
                await setDoc(doc(db, "concours", "main"), {
                    description: desc,
                    image: image
                });
                alert("Concours sauvegardé!");
            } catch (error) {
                alert("Erreur: " + error.message);
            }
        };

        async function loadProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                const list = document.getElementById("productsList");
                list.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    const html = `
                        <div class="product-item">
                            <h3>📌 ${product.name}</h3>
                            <p><strong>Description:</strong> ${product.description}</p>
                            <p><strong>Tarifs:</strong> ${product.tarifs}</p>
                            <p><strong>Stock:</strong> ${product.stock}</p>
                            <p><strong>Disponibilité:</strong> ${product.stock > 0 ? "✓ Disponible" : "✕ Non disponible"}</p>
                            <button class="btn-delete" onclick="deleteProduct('${doc.id}')">🗑️ Supprimer</button>
                        </div>
                    `;
                    list.innerHTML += html;
                });
            } catch (error) {
                console.error("Erreur:", error);
            }
        }

        async function loadConcours() {
            try {
                const docSnap = await getDocs(collection(db, "concours"));
                docSnap.forEach((doc) => {
                    const concours = doc.data();
                    document.getElementById("concoursDesc").value = concours.description || "";
                    document.getElementById("concoursImage").value = concours.image || "";
                });
            } catch (error) {
                console.error("Erreur concours:", error);
            }
        }

        window.deleteProduct = async function(docId) {
            if (confirm("Êtes-vous sûr de vouloir supprimer ce produit?")) {
                try {
                    await deleteDoc(doc(db, "products", docId));
                    alert("Produit supprimé!");
                    loadProducts();
                } catch (error) {
                    alert("Erreur: " + error.message);
                }
            }
        };
    </script>
</body>
</html>
