<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - SVR Shop</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1e1e2e; color: #fff; padding: 20px; }
        .login { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #333; padding: 40px; border-radius: 8px; width: 300px; }
        .login-box h2 { margin-bottom: 20px; color: #667eea; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #666; border-radius: 4px; background: #444; color: #fff; }
        button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .error { color: #f5576c; font-size: 12px; margin-top: 10px; }
        .admin { display: none; max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 20px; background: #333; border-radius: 8px; }
        .logout { padding: 10px 20px; background: #f5576c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .products-list { display: grid; gap: 10px; }
        .product { background: #333; padding: 15px; border-radius: 8px; }
        .product h3 { color: #667eea; }
    </style>
</head>
<body>
    <div class="login" id="loginDiv">
        <div class="login-box">
            <h2>🛍️ Admin Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button onclick="login()">Se Connecter</button>
            <div class="error" id="error"></div>
        </div>
    </div>

    <div class="admin" id="adminDiv">
        <div class="header">
            <h1>🛍️ Admin Panel</h1>
            <button class="logout" onclick="logout()">Déconnexion</button>
        </div>
        <h2>Produits</h2>
        <div class="products-list" id="productsList"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('adminDiv').style.display = 'block';
                loadProducts();
            } else {
                document.getElementById('loginDiv').style.display = 'flex';
                document.getElementById('adminDiv').style.display = 'none';
            }
        });

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            auth.signInWithEmailAndPassword(email, password).catch(err => {
                document.getElementById('error').textContent = 'Erreur: ' + err.message;
            });
        }

        function logout() {
            auth.signOut();
        }

        async function loadProducts() {
            const snapshot = await db.collection('products').get();
            let html = '';
            snapshot.forEach(doc => {
                const p = doc.data();
                html += `<div class="product"><h3>${p.name}</h3><p>Tarifs: ${p.tariffs}</p><p>Stock: ${p.stock}</p></div>`;
            });
            document.getElementById('productsList').innerHTML = html || '<p>Aucun produit</p>';
        }
    </script>
</body>
</html>
