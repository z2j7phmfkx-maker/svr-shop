<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SVR Shop</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script src="https://widget.cloudinary.com/v2.0/cloudinary-core.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* LOGIN FORM */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 100%;
        }

        .login-box h1 {
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
        }

        .login-box input::placeholder {
            color: #aaa;
        }

        .login-box input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-msg {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #f5576c;
        }

        /* ADMIN PANEL */
        .admin-panel {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn:hover {
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            color: #aaa;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ddd;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .preview-img {
            max-width: 200px;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .product-list {
            display: grid;
            gap: 15px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-info {
            flex: 1;
        }

        .product-info h3 {
            margin-bottom: 5px;
            color: #667eea;
        }

        .product-info p {
            font-size: 12px;
            color: #aaa;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 100%;
            position: relative;
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #667eea;
        }

        .success-msg {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .gallery-item {
            position: relative;
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .gallery-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .gallery-item .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: #f5576c;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <h1>🛍️ Admin Login</h1>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Mot de passe">
            <button class="login-btn" onclick="login()">Se Connecter</button>
            <div id="login-message" class="login-msg"></div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="admin-panel">
        <div class="container">
            <div class="header">
                <h1>🛍️ Admin Panel</h1>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('concours')">📣 Concours</button>
                <button class="tab-btn" onclick="switchTab('products')">📦 Produits</button>
            </div>

            <!-- CONCOURS TAB -->
            <div id="concours" class="tab-content active">
                <div class="form-section">
                    <h2>Gérer le Concours</h2>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="concoursDescription"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Photo (16:9)</label>
                        <button class="btn btn-secondary" onclick="openConcoursUpload()">📁 Sélectionner</button>
                        <input type="hidden" id="concoursImage">
                        <div id="concours-preview"></div>
                    </div>
                    <button class="btn" onclick="saveConcours()">💾 Sauvegarder</button>
                    <div id="concours-message"></div>
                </div>
            </div>

            <!-- PRODUCTS TAB -->
            <div id="products" class="tab-content">
                <div class="form-section">
                    <h2>Ajouter un Produit</h2>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" id="productName">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDescription"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Tarifs (ex: 1g=20€|5g=90€)</label>
                        <textarea id="productTariffs"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Stock</label>
                        <select id="productStock">
                            <option value="En stock">✓ En stock</option>
                            <option value="Rupture de stock">✕ Rupture</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Photo Principale (1:1)</label>
                        <button class="btn btn-secondary" onclick="openProductImageUpload('main')">📁 Sélectionner</button>
                        <input type="hidden" id="productImage">
                        <div id="product-image-preview"></div>
                    </div>
                    <div class="form-group">
                        <label>Galerie (jusqu'à 10)</label>
                        <button class="btn btn-secondary" onclick="openProductGalleryUpload()">📁 Ajouter</button>
                        <div id="product-gallery-container"></div>
                    </div>
                    <div class="form-group">
                        <label>Vidéo (MP4)</label>
                        <button class="btn btn-secondary" onclick="openProductVideoUpload()">🎥 Sélectionner</button>
                        <input type="hidden" id="productVideo">
                        <div id="product-video-preview"></div>
                    </div>
                    <button class="btn" onclick="addProduct()">➕ Ajouter</button>
                    <div id="add-product-message"></div>
                </div>

                <div class="form-section">
                    <h2>Produits</h2>
                    <div id="products-list" class="product-list">
                        <div class="loading">Chargement...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeEditModal()">&times;</button>
            <h2>Modifier le Produit</h2>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="editProductName">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="editProductDescription"></textarea>
            </div>
            <div class="form-group">
                <label>Tarifs</label>
                <textarea id="editProductTariffs"></textarea>
            </div>
            <div class="form-group">
                <label>Stock</label>
                <select id="editProductStock">
                    <option value="En stock">✓ En stock</option>
                    <option value="Rupture de stock">✕ Rupture</option>
                </select>
            </div>
            <div class="form-group">
                <label>Photo Principale</label>
                <button class="btn btn-secondary" onclick="openProductImageUpload('edit')">📁 Changer</button>
                <input type="hidden" id="editProductImage">
                <div id="edit-product-image-preview"></div>
            </div>
            <div class="form-group">
                <label>Galerie</label>
                <button class="btn btn-secondary" onclick="openProductGalleryUpload('edit')">📁 Modifier</button>
                <div id="edit-product-gallery-container"></div>
            </div>
            <div class="form-group">
                <label>Vidéo</label>
                <button class="btn btn-secondary" onclick="openProductVideoUpload('edit')">🎥 Changer</button>
                <input type="hidden" id="editProductVideo">
                <div id="edit-product-video-preview"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="saveEditProduct()">💾 Sauvegarder</button>
                <button class="btn btn-danger" onclick="deleteProduct()">🗑️ Supprimer</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const CLOUDINARY_CLOUD_NAME = "diezs6eqa";
        const CLOUDINARY_UPLOAD_PRESET = "unsigned_upload";

        let currentEditProductId = null;
        let currentProductGallery = [];

        // CHECK AUTH ON LOAD
        auth.onAuthStateChanged((user) => {
            if (user) {
                showAdminPanel();
                loadProducts();
                loadConcours();
            } else {
                showLoginForm();
            }
        });

        function showLoginForm() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }

        function showAdminPanel() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        }

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                document.getElementById('login-message').textContent = 'Remplissez les champs';
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('loginEmail').value = '';
                    document.getElementById('loginPassword').value = '';
                })
                .catch((error) => {
                    document.getElementById('login-message').textContent = 'Email ou mot de passe incorrect';
                });
        }

        function logout() {
            auth.signOut().then(() => {
                showLoginForm();
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // CLOUDINARY UPLOADS
        function openConcoursUpload() {
            cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                cropping: true,
                croppingAspectRatio: 16/9,
                maxFiles: 1
            }, (error, result) => {
                if (result && result.event === 'success') {
                    document.getElementById('concoursImage').value = result.info.secure_url;
                    showPreview('concours-preview', result.info.secure_url);
                }
            });
        }

        function openProductImageUpload(type) {
            cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                cropping: true,
                croppingAspectRatio: 1,
                maxFiles: 1
            }, (error, result) => {
                if (result && result.event === 'success') {
                    if (type === 'main') {
                        document.getElementById('productImage').value = result.info.secure_url;
                        showPreview('product-image-preview', result.info.secure_url);
                    } else if (type === 'edit') {
                        document.getElementById('editProductImage').value = result.info.secure_url;
                        showPreview('edit-product-image-preview', result.info.secure_url);
                    }
                }
            });
        }

        function openProductGalleryUpload(type) {
            cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                cropping: true,
                croppingAspectRatio: 1,
                maxFiles: 1
            }, (error, result) => {
                if (result && result.event === 'success') {
                    currentProductGallery.push(result.info.secure_url);
                    const containerId = type === 'edit' ? 'edit-product-gallery-container' : 'product-gallery-container';
                    displayGallery(containerId);
                }
            });
        }

        function openProductVideoUpload(type) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/mp4,video/webm,video/ogg';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                    fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (type === 'main') {
                            document.getElementById('productVideo').value = data.secure_url;
                            showVideoPreview('product-video-preview', data.secure_url);
                        } else {
                            document.getElementById('editProductVideo').value = data.secure_url;
                            showVideoPreview('edit-product-video-preview', data.secure_url);
                        }
                    });
                }
            };
            input.click();
        }

        function showPreview(containerId, url) {
            document.getElementById(containerId).innerHTML = `<img src="${url}" class="preview-img">`;
        }

        function showVideoPreview(containerId, url) {
            document.getElementById(containerId).innerHTML = `<video width="200" height="112" style="border-radius: 8px;" controls><source src="${url}" type="video/mp4"></video>`;
        }

        function displayGallery(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            currentProductGallery.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${img}">
                    <button class="remove-btn" onclick="removeGalleryItem(${idx})">×</button>
                `;
                container.appendChild(div);
            });
        }

        function removeGalleryItem(idx) {
            currentProductGallery.splice(idx, 1);
            const containerId = document.getElementById('edit-product-gallery-container').innerHTML ? 'edit-product-gallery-container' : 'product-gallery-container';
            displayGallery(containerId);
        }

        // PRODUCTS
        async function addProduct() {
            const name = document.getElementById('productName').value;
            const description = document.getElementById('productDescription').value;
            const tariffs = document.getElementById('productTariffs').value;
            const stock = document.getElementById('productStock').value;
            const image = document.getElementById('productImage').value;
            const video = document.getElementById('productVideo').value;

            if (!name || !tariffs || !image) {
                showMessage('add-product-message', '❌ Remplissez: Nom, Tarifs, Photo', false);
                return;
            }

            try {
                await db.collection('products').add({
                    name,
                    description,
                    tariffs,
                    stock,
                    image,
                    images: currentProductGallery,
                    video,
                    promos: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                showMessage('add-product-message', '✅ Produit ajouté!', true);
                clearProductForm();
                loadProducts();
            } catch (error) {
                showMessage('add-product-message', '❌ Erreur: ' + error.message, false);
            }
        }

        function clearProductForm() {
            document.getElementById('productName').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('productTariffs').value = '';
            document.getElementById('productStock').value = 'En stock';
            document.getElementById('productImage').value = '';
            document.getElementById('productVideo').value = '';
            document.getElementById('product-image-preview').innerHTML = '';
            document.getElementById('product-video-preview').innerHTML = '';
            currentProductGallery = [];
            document.getElementById('product-gallery-container').innerHTML = '';
        }

        async function loadProducts() {
            const list = document.getElementById('products-list');
            const snapshot = await db.collection('products').get();
            list.innerHTML = '';

            if (snapshot.empty) {
                list.innerHTML = '<p class="loading">Aucun produit</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const product = doc.data();
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p>Tarifs: ${product.tariffs}</p>
                        <p>Stock: ${product.stock}</p>
                    </div>
                    <div class="product-actions">
                        <button class="btn btn-small" onclick="editProduct('${doc.id}')">✏️ Modifier</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function editProduct(id) {
            currentEditProductId = id;
            const doc = await db.collection('products').doc(id).get();
            const product = doc.data();

            document.getElementById('editProductName').value = product.name;
            document.getElementById('editProductDescription').value = product.description || '';
            document.getElementById('editProductTariffs').value = product.tariffs;
            document.getElementById('editProductStock').value = product.stock;
            document.getElementById('editProductImage').value = product.image;
            document.getElementById('editProductVideo').value = product.video || '';

            currentProductGallery = product.images || [];

            if (product.image) showPreview('edit-product-image-preview', product.image);
            if (product.video) showVideoPreview('edit-product-video-preview', product.video);
            displayGallery('edit-product-gallery-container');

            document.getElementById('editModal').classList.add('show');
        }

        async function saveEditProduct() {
            const name = document.getElementById('editProductName').value;
            const description = document.getElementById('editProductDescription').value;
            const tariffs = document.getElementById('editProductTariffs').value;
            const stock = document.getElementById('editProductStock').value;
            const image = document.getElementById('editProductImage').value;
            const video = document.getElementById('editProductVideo').value;

            if (!name || !tariffs || !image) {
                alert('Remplissez: Nom, Tarifs, Photo');
                return;
            }

            try {
                await db.collection('products').doc(currentEditProductId).update({
                    name, description, tariffs, stock, image, images: currentProductGallery, video
                });
                closeEditModal();
                loadProducts();
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        async function deleteProduct() {
            if (confirm('Supprimer ce produit?')) {
                try {
                    await db.collection('products').doc(currentEditProductId).delete();
                    closeEditModal();
                    loadProducts();
                } catch (error) {
                    alert('Erreur: ' + error.message);
                }
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        // CONCOURS
        async function loadConcours() {
            const doc = await db.collection('concours').doc('main').get();
            if (doc.exists) {
                document.getElementById('concoursDescription').value = doc.data().description || '';
                if (doc.data().image) {
                    showPreview('concours-preview', doc.data().image);
                }
            }
        }

        async function saveConcours() {
            const description = document.getElementById('concoursDescription').value;
            const image = document.getElementById('concoursImage').value;

            if (!description || !image) {
                showMessage('concours-message', '❌ Remplissez tous les champs', false);
                return;
            }

            try {
                await db.collection('concours').doc('main').set({ description, image });
                showMessage('concours-message', '✅ Sauvegardé!', true);
            } catch (error) {
                showMessage('concours-message', '❌ Erreur: ' + error.message, false);
            }
        }

        function showMessage(elementId, text, success) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="${success ? 'success-msg' : ''}" style="color: ${success ? '#000' : '#f5576c'};">${text}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 3000);
        }

        // HIDDEN INPUT
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.id = 'concoursImage';
            document.body.appendChild(input);
        });
    </script>
</body>
</html>
