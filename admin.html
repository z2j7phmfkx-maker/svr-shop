<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin SVR Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0e27; 
            color: white; 
            font-family: Arial, sans-serif; 
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #00d4ff; margin-bottom: 30px; }
        .login-form, .admin-panel { background: #1a1f3a; padding: 30px; border-radius: 10px; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid #00d4ff;
            background: #2d3561;
            color: white;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }
        button { 
            width: 100%;
            padding: 12px; 
            margin: 10px 0;
            background: #00d4ff; 
            color: #0a0e27; 
            border: none;
            cursor: pointer; 
            font-weight: bold;
            border-radius: 5px;
        }
        button:hover { background: #fff; }
        .products-list { margin-top: 30px; }
        .product-item { 
            background: #2d3561; 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
        }
        .product-item h3 { margin-bottom: 10px; }
        .btn-delete { background: #ff6b00; color: white; }
        .btn-delete:hover { background: #ff4500; }
        .hidden { display: none; }
        .logout-btn { background: #888; width: auto; padding: 10px 20px !important; margin: 0 !important; }
        .logout-btn:hover { background: #666; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- FORMULAIRE LOGIN -->
        <div id="loginForm" class="login-form">
            <h1>🔐 Connexion Admin</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button onclick="login()">Se connecter</button>
            <p style="margin-top: 20px; font-size: 12px; color: #aaa;">Les identifiants vous ont été envoyés par le propriétaire du site.</p>
        </div>

        <!-- PANEL ADMIN -->
        <div id="adminPanel" class="admin-panel hidden">
            <div class="header">
                <h1>📊 Tableau de bord Admin</h1>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>

            <h2 style="margin-top: 30px; margin-bottom: 20px;">➕ Ajouter un produit</h2>
            <input type="text" id="productName" placeholder="Nom du produit">
            <textarea id="productDesc" placeholder="Description" style="height: 80px;"></textarea>
            <input type="number" id="productPrice" placeholder="Prix (€)" step="0.01">
            <input type="number" id="productStock" placeholder="Stock" step="1">
            <input type="text" id="productImage" placeholder="URL de l'image (ex: https://example.com/image.jpg)">
            <button onclick="addProduct()">Ajouter le produit</button>

            <div class="products-list">
                <h2>📦 Vos produits</h2>
                <div id="productsList"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // VOS DONNÉES FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.login = async function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                alert("Veuillez remplir email et mot de passe");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById("loginForm").classList.add("hidden");
                document.getElementById("adminPanel").classList.remove("hidden");
                loadProducts();
            } catch (error) {
                alert("Erreur de connexion: " + error.message);
            }
        };

        window.logout = async function() {
            await signOut(auth);
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("adminPanel").classList.add("hidden");
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
        };

        window.addProduct = async function() {
            const name = document.getElementById("productName").value;
            const desc = document.getElementById("productDesc").value;
            const price = parseFloat(document.getElementById("productPrice").value);
            const stock = parseInt(document.getElementById("productStock").value);
            const image = document.getElementById("productImage").value;

            if (!name || !desc || !price || stock === "" || !image) {
                alert("Remplissez tous les champs!");
                return;
            }

            try {
                await addDoc(collection(db, "products"), {
                    name,
                    description: desc,
                    price,
                    stock,
                    image
                });
                alert("Produit ajouté avec succès!");
                document.getElementById("productName").value = "";
                document.getElementById("productDesc").value = "";
                document.getElementById("productPrice").value = "";
                document.getElementById("productStock").value = "";
                document.getElementById("productImage").value = "";
                loadProducts();
            } catch (error) {
                alert("Erreur: " + error.message);
            }
        };

        async function loadProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                const list = document.getElementById("productsList");
                list.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    const html = `
                        <div class="product-item">
                            <h3>📌 ${product.name}</h3>
                            <p><strong>Description:</strong> ${product.description}</p>
                            <p><strong>Prix:</strong> ${product.price}€</p>
                            <p><strong>Stock:</strong> ${product.stock}</p>
                            <p><strong>Image:</strong> ${product.image}</p>
                            <button class="btn-delete" onclick="deleteProduct('${doc.id}')">🗑️ Supprimer ce produit</button>
                        </div>
                    `;
                    list.innerHTML += html;
                });
            } catch (error) {
                console.error("Erreur:", error);
            }
        }

        window.deleteProduct = async function(docId) {
            if (confirm("Êtes-vous sûr de vouloir supprimer ce produit?")) {
                try {
                    await deleteDoc(doc(db, "products", docId));
                    alert("Produit supprimé!");
                    loadProducts();
                } catch (error) {
                    alert("Erreur: " + error.message);
                }
            }
        };
    </script>
</body>
</html>
