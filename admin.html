<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin SVR Shop</title>
    <script src="https://upload-widget.cloudinary.com/latest/CloudinaryUploadWidget.js" type="text/javascript"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0e27; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #00d4ff; margin-bottom: 30px; font-size: 24px; }
        h2 { color: #00d4ff; margin-top: 30px; margin-bottom: 20px; font-size: 18px; }
        .login-form, .admin-panel { background: #1a1f3a; padding: 30px; border-radius: 12px; }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #2d3561;
            background: #0f1428;
            color: white;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
        }
        button { 
            width: 100%;
            padding: 12px; 
            margin: 10px 0;
            background: #00d4ff; 
            color: #0a0e27; 
            border: none;
            cursor: pointer; 
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        button:hover { 
            background: #fff;
            transform: translateY(-2px);
        }
        .products-list { margin-top: 30px; }
        .product-item { 
            background: #2d3561; 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
            display: flex;
            gap: 15px;
        }
        .product-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #00d4ff;
            flex-shrink: 0;
        }
        .product-info {
            flex: 1;
        }
        .product-item h3 { margin-bottom: 10px; color: #00d4ff; }
        .product-item p { font-size: 13px; color: #aaa; margin: 5px 0; }
        .product-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .product-buttons button {
            flex: 1;
            margin: 0;
            padding: 10px;
        }
        .btn-modify { background: #2196f3; color: white; }
        .btn-modify:hover { background: #1976d2; }
        .btn-delete { background: #f44336; color: white; }
        .btn-delete:hover { background: #d32f2f; }
        .hidden { display: none; }
        .logout-btn { background: #666; color: white; width: auto; padding: 10px 20px !important; margin: 0 !important; }
        .logout-btn:hover { background: #555; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .section { 
            background: #1a1f3a; 
            padding: 25px; 
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2d3561;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: 600;
            font-size: 13px;
        }
        .divider { height: 1px; background: #2d3561; margin: 30px 0; }
        .optional { color: #888; font-size: 12px; }
        
        /* UPLOAD BUTTON */
        .upload-btn {
            background: linear-gradient(135deg, #ff6b00 0%, #ff8c00 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            margin: 10px 0;
            width: auto;
            transition: all 0.3s ease;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.4);
        }
        .image-preview {
            margin-top: 10px;
        }
        .image-preview img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #00d4ff;
        }
        
        /* MODALE MODIFICATION */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
        }
        .modal-content {
            background: #1a1f3a;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            border: 1px solid #2d3561;
        }
        .close-modal {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-modal:hover {
            color: #fff;
        }
        .modal-content h2 {
            margin-bottom: 20px;
            margin-top: 0;
        }
        .btn-cancel {
            background: #666;
            color: white;
        }
        .btn-cancel:hover {
            background: #555;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        .button-group button {
            flex: 1;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- FORMULAIRE LOGIN -->
        <div id="loginForm" class="login-form">
            <h1>🔐 Connexion Admin</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button onclick="login()">Se connecter</button>
            <p style="margin-top: 20px; font-size: 12px; color: #aaa;">Les identifiants vous ont été envoyés par le propriétaire du site.</p>
        </div>

        <!-- PANEL ADMIN -->
        <div id="adminPanel" class="admin-panel hidden">
            <div class="header">
                <h1>📊 Tableau de bord Admin</h1>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>

            <!-- SECTION CONCOURS -->
            <div class="section">
                <h2>🎉 Gérer le Concours</h2>
                <div class="form-group">
                    <label>Description du concours</label>
                    <textarea id="concoursDesc" placeholder="Ex: Gagnez des cadeaux!" style="height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Image du concours <span class="optional">(optionnel)</span></label>
                    <button class="upload-btn" onclick="openConcoursUpload()">📁 Sélectionner une photo</button>
                    <input type="text" id="concoursImage" placeholder="L'URL s'affichera ici" readonly>
                    <div class="image-preview" id="concoursImagePreview"></div>
                </div>
                <button onclick="saveConcours()">Sauvegarder le concours</button>
            </div>

            <div class="divider"></div>

            <!-- SECTION PRODUITS -->
            <div class="section">
                <h2>➕ Ajouter un produit</h2>
                <div class="form-group">
                    <label>Nom du produit *</label>
                    <input type="text" id="productName" placeholder="Ex: Hash de luxe">
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="productDesc" placeholder="Ex: Haute Gamme Qualité" style="height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Tarifs (séparés par |) *</label>
                    <input type="text" id="productTarifs" placeholder="Ex: 1g = 20€ | 5g = 90€ | 10g = 150€">
                    <small style="color: #aaa; display: block; margin-top: 5px;">Format: quantité = prix | quantité = prix</small>
                </div>
                <div class="form-group">
                    <label>Stock (0 = indisponible) *</label>
                    <input type="number" id="productStock" placeholder="Ex: 10" step="1">
                </div>
                <div class="form-group">
                    <label>Image principale <span class="optional">(optionnel)</span></label>
                    <button class="upload-btn" onclick="openProductImageUpload('main')">📁 Sélectionner une photo</button>
                    <input type="text" id="productImage" placeholder="L'URL s'affichera ici" readonly>
                    <div class="image-preview" id="productImagePreview"></div>
                </div>
                <div class="form-group">
                    <label>Galerie d'images <span class="optional">(optionnel - plusieurs images)</span></label>
                    <button class="upload-btn" onclick="openProductImagesUpload('gallery')">📁 Ajouter à la galerie</button>
                    <input type="text" id="productImages" placeholder="Les URLs s'afficheront ici" readonly>
                    <div class="image-preview" id="productImagesPreview"></div>
                </div>
                <div class="form-group">
                    <label>URL de la vidéo <span class="optional">(optionnel - MP4 ou formats de base)</span></label>
                    <input type="text" id="productVideo" placeholder="https://example.com/video.mp4">
                </div>
                <button onclick="addProduct()">Ajouter le produit</button>
            </div>

            <div class="divider"></div>

            <!-- LISTE PRODUITS -->
            <div class="products-list">
                <h2>📦 Vos produits</h2>
                <div id="productsList"></div>
            </div>
        </div>
    </div>

    <!-- MODALE MODIFICATION PRODUIT -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h2>✏️ Modifier le produit</h2>
            
            <div class="form-group">
                <label>Nom du produit *</label>
                <input type="text" id="editProductName" placeholder="Ex: Hash de luxe">
            </div>
            <div class="form-group">
                <label>Description *</label>
                <textarea id="editProductDesc" placeholder="Ex: Haute Gamme Qualité" style="height: 60px;"></textarea>
            </div>
            <div class="form-group">
                <label>Tarifs (séparés par |) *</label>
                <input type="text" id="editProductTarifs" placeholder="Ex: 1g = 20€ | 5g = 90€ | 10g = 150€">
                <small style="color: #aaa; display: block; margin-top: 5px;">Format: quantité = prix | quantité = prix</small>
            </div>
            <div class="form-group">
                <label>Stock (0 = indisponible) *</label>
                <input type="number" id="editProductStock" placeholder="Ex: 10" step="1">
            </div>
            <div class="form-group">
                <label>Image principale <span class="optional">(optionnel)</span></label>
                <button class="upload-btn" onclick="openProductImageUpload('edit')">📁 Sélectionner une photo</button>
                <input type="text" id="editProductImage" placeholder="L'URL s'affichera ici" readonly>
                <div class="image-preview" id="editProductImagePreview"></div>
            </div>
            <div class="form-group">
                <label>Galerie d'images <span class="optional">(optionnel)</span></label>
                <button class="upload-btn" onclick="openProductImagesUpload('edit')">📁 Ajouter à la galerie</button>
                <input type="text" id="editProductImages" placeholder="Les URLs s'afficheront ici" readonly>
                <div class="image-preview" id="editProductImagesPreview"></div>
            </div>
            <div class="form-group">
                <label>URL de la vidéo <span class="optional">(optionnel - MP4 ou formats de base)</span></label>
                <input type="text" id="editProductVideo" placeholder="https://example.com/video.mp4">
            </div>

            <div class="button-group">
                <button onclick="saveEditProduct()">💾 Sauvegarder</button>
                <button class="btn-cancel" onclick="closeEditModal()">❌ Annuler</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // VOS DONNÉES FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // CLOUDINARY CONFIG
        const CLOUDINARY_CLOUD_NAME = "diezs6eqa";

        let currentEditProductId = null;
        let uploadType = 'main';

        window.login = async function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                alert("Veuillez remplir email et mot de passe");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById("loginForm").classList.add("hidden");
                document.getElementById("adminPanel").classList.remove("hidden");
                loadProducts();
                loadConcours();
            } catch (error) {
                alert("Erreur de connexion: " + error.message);
            }
        };

        window.logout = async function() {
            await signOut(auth);
            document.getElementById("loginForm").classList.remove("hidden");
            document.getElementById("adminPanel").classList.add("hidden");
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
        };

        // CLOUDINARY UPLOAD WIDGET
        window.openConcoursUpload = function() {
            uploadType = 'concours';
            cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: "unsigned_upload",
                cropping: true,
                croppingAspectRatio: 16/9,
                maxFiles: 1,
                resourceType: "image"
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    const url = result.info.secure_url;
                    document.getElementById("concoursImage").value = url;
                    document.getElementById("concoursImagePreview").innerHTML = `<img src="${url}" alt="Concours">`;
                }
            });
        };

        window.openProductImageUpload = function(type) {
            uploadType = type;
            cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: "unsigned_upload",
                cropping: true,
                croppingAspectRatio: 1,
                maxFiles: 1,
                resourceType: "image"
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    const url = result.info.secure_url;
                    if (type === 'main') {
                        document.getElementById("productImage").value = url;
                        document.getElementById("productImagePreview").innerHTML = `<img src="${url}" alt="Produit">`;
                    } else if (type === 'edit') {
                        document.getElementById("editProductImage").value = url;
                        document.getElementById("editProductImagePreview").innerHTML = `<img src="${url}" alt="Produit">`;
                    }
                }
            });
        };

        window.openProductImagesUpload = function(type) {
            uploadType = type;
            cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: "unsigned_upload",
                cropping: true,
                croppingAspectRatio: 1,
                maxFiles: 10,
                resourceType: "image"
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    const url = result.info.secure_url;
                    const inputId = type === 'edit' ? "editProductImages" : "productImages";
                    const previewId = type === 'edit' ? "editProductImagesPreview" : "productImagesPreview";
                    
                    const currentValue = document.getElementById(inputId).value;
                    const newValue = currentValue ? currentValue + " | " + url : url;
                    
                    document.getElementById(inputId).value = newValue;
                    
                    // Afficher toutes les images
                    let previewHTML = "";
                    newValue.split(" | ").forEach(imgUrl => {
                        if (imgUrl.trim()) {
                            previewHTML += `<img src="${imgUrl}" alt="Galerie">`;
                        }
                    });
                    document.getElementById(previewId).innerHTML = previewHTML;
                }
            });
        };

        window.addProduct = async function() {
            const name = document.getElementById("productName").value;
            const desc = document.getElementById("productDesc").value;
            const tarifs = document.getElementById("productTarifs").value;
            const stock = parseInt(document.getElementById("productStock").value);
            const image = document.getElementById("productImage").value;
            const images = document.getElementById("productImages").value;
            const video = document.getElementById("productVideo").value;

            if (!name || !desc || !tarifs || stock === "" || stock === null) {
                alert("Remplissez les champs obligatoires (*)!");
                return;
            }

            try {
                const productData = {
                    name,
                    description: desc,
                    tarifs,
                    stock
                };

                if (image) {
                    productData.image = image;
                }

                if (images) {
                    productData.images = images;
                }

                if (video) {
                    productData.video = video;
                }

                await addDoc(collection(db, "products"), productData);
                alert("Produit ajouté avec succès!");
                document.getElementById("productName").value = "";
                document.getElementById("productDesc").value = "";
                document.getElementById("productTarifs").value = "";
                document.getElementById("productStock").value = "";
                document.getElementById("productImage").value = "";
                document.getElementById("productImages").value = "";
                document.getElementById("productVideo").value = "";
                document.getElementById("productImagePreview").innerHTML = "";
                document.getElementById("productImagesPreview").innerHTML = "";
                loadProducts();
            } catch (error) {
                alert("Erreur: " + error.message);
            }
        };

        window.openEditModal = function(productId, product) {
            currentEditProductId = productId;
            document.getElementById("editProductName").value = product.name;
            document.getElementById("editProductDesc").value = product.description;
            document.getElementById("editProductTarifs").value = product.tarifs;
            document.getElementById("editProductStock").value = product.stock;
            document.getElementById("editProductImage").value = product.image || "";
            document.getElementById("editProductImages").value = product.images || "";
            document.getElementById("editProductVideo").value = product.video || "";
            
            if (product.image) {
                document.getElementById("editProductImagePreview").innerHTML = `<img src="${product.image}" alt="Produit">`;
            } else {
                document.getElementById("editProductImagePreview").innerHTML = "";
            }
            
            if (product.images) {
                let previewHTML = "";
                product.images.split(" | ").forEach(url => {
                    if (url.trim()) {
                        previewHTML += `<img src="${url}" alt="Galerie">`;
                    }
                });
                document.getElementById("editProductImagesPreview").innerHTML = previewHTML;
            } else {
                document.getElementById("editProductImagesPreview").innerHTML = "";
            }
            
            document.getElementById("editModal").style.display = "block";
        };

        window.closeEditModal = function() {
            document.getElementById("editModal").style.display = "none";
            currentEditProductId = null;
        };

        window.saveEditProduct = async function() {
            if (!currentEditProductId) return;

            const name = document.getElementById("editProductName").value;
            const desc = document.getElementById("editProductDesc").value;
            const tarifs = document.getElementById("editProductTarifs").value;
            const stock = parseInt(document.getElementById("editProductStock").value);
            const image = document.getElementById("editProductImage").value;
            const images = document.getElementById("editProductImages").value;
            const video = document.getElementById("editProductVideo").value;

            if (!name || !desc || !tarifs || stock === "" || stock === null) {
                alert("Remplissez les champs obligatoires (*)!");
                return;
            }

            try {
                const updateData = {
                    name,
                    description: desc,
                    tarifs,
                    stock
                };

                if (image) {
                    updateData.image = image;
                }

                if (images) {
                    updateData.images = images;
                }

                if (video) {
                    updateData.video = video;
                }

                await updateDoc(doc(db, "products", currentEditProductId), updateData);
                alert("Produit modifié avec succès!");
                closeEditModal();
                loadProducts();
            } catch (error) {
                alert("Erreur: " + error.message);
            }
        };

        window.saveConcours = async function() {
            const desc = document.getElementById("concoursDesc").value;
            const image = document.getElementById("concoursImage").value;

            if (!desc) {
                alert("Remplissez la description du concours!");
                return;
            }

            try {
                const concoursData = {
                    description: desc
                };

                if (image) {
                    concoursData.image = image;
                }

                await setDoc(doc(db, "concours", "main"), concoursData);
                alert("Concours sauvegardé!");
            } catch (error) {
                alert("Erreur: " + error.message);
            }
        };

        async function loadProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                const list = document.getElementById("productsList");
                list.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    const videoBadge = product.video ? `<p><strong>Vidéo:</strong> ✓ Oui</p>` : "";
                    const imageBadge = product.image ? `<p><strong>Image principale:</strong> ✓ Oui</p>` : "";
                    const galleryBadge = product.images ? `<p><strong>Galerie:</strong> ✓ ${product.images.split(" | ").filter(u => u.trim()).length} images</p>` : "";
                    const productImage = product.image ? `<img src="${product.image}" alt="${product.name}" class="product-image">` : '';

                    const html = `
                        <div class="product-item">
                            ${productImage}
                            <div class="product-info">
                                <h3>📌 ${product.name}</h3>
                                <p><strong>Description:</strong> ${product.description}</p>
                                <p><strong>Tarifs:</strong> ${product.tarifs}</p>
                                <p><strong>Stock:</strong> ${product.stock}</p>
                                <p><strong>Disponibilité:</strong> ${product.stock > 0 ? "✓ Disponible" : "✕ Non disponible"}</p>
                                ${imageBadge}
                                ${galleryBadge}
                                ${videoBadge}
                                <div class="product-buttons">
                                    <button class="btn-modify" onclick="openEditModal('${doc.id}', ${JSON.stringify(product).replace(/"/g, '&quot;')})">✏️ Modifier</button>
                                    <button class="btn-delete" onclick="deleteProduct('${doc.id}')">🗑️ Supprimer</button>
                                </div>
                            </div>
                        </div>
                    `;
                    list.innerHTML += html;
                });
            } catch (error) {
                console.error("Erreur:", error);
            }
        }

        async function loadConcours() {
            try {
                const querySnapshot = await getDocs(collection(db, "concours"));
                querySnapshot.forEach((doc) => {
                    const concours = doc.data();
                    document.getElementById("concoursDesc").value = concours.description || "";
                    document.getElementById("concoursImage").value = concours.image || "";
                    if (concours.image) {
                        document.getElementById("concoursImagePreview").innerHTML = `<img src="${concours.image}" alt="Concours">`;
                    }
                });
            } catch (error) {
                console.error("Erreur concours:", error);
            }
        }

        window.deleteProduct = async function(docId) {
            if (confirm("Êtes-vous sûr de vouloir supprimer ce produit?")) {
                try {
                    await deleteDoc(doc(db, "products", docId));
                    alert("Produit supprimé!");
                    loadProducts();
                } catch (error) {
                    alert("Erreur: " + error.message);
                }
            }
        };

        // Fermer modale en cliquant dehors
        window.onclick = function(event) {
            const modal = document.getElementById("editModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        };
    </script>
</body>
</html>
