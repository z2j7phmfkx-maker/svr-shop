<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0e27; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        h1 { 
            margin-bottom: 30px; 
            text-align: center; 
            color: #00d4ff; 
            font-size: 28px;
            font-weight: 600;
        }
        /* BANNIÈRE CONCOURS */
        .concours-banner {
            background: linear-gradient(135deg, #1a1f3a 0%, #2d3561 100%);
            border: 1px solid #00d4ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            overflow: hidden;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .concours-banner img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }
        .concours-content {
            flex: 1;
        }
        .concours-title {
            color: #00d4ff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .concours-text {
            color: #aaa;
            font-size: 13px;
            line-height: 1.5;
        }
        /* MENU PRODUITS */
        .menu { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        .product { 
            background: linear-gradient(135deg, #1a1f3a, #2d3561);
            border-radius: 12px; 
            overflow: hidden;
            border: 1px solid #1e2847;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .product:hover {
            border-color: #00d4ff;
            transform: translateY(-2px);
        }
        .product img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover;
        }
        .product-info { 
            padding: 15px; 
        }
        .product h3 { 
            margin-bottom: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        .product p { 
            font-size: 12px; 
            color: #aaa; 
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .tarifs {
            background: rgba(0, 212, 255, 0.1);
            border-left: 2px solid #00d4ff;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #00d4ff;
            font-weight: 500;
        }
        .tarifs div {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }
        .disponibilite {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .disponible {
            background: rgba(76, 175, 80, 0.2);
            color: #4cb050;
        }
        .indisponible {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        .admin-btn { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: #ff6b00; 
            padding: 12px 24px; 
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
            transition: all 0.3s ease;
        }
        .admin-btn:hover {
            background: #ff5500;
            transform: translateY(-2px);
        }
        /* ÉCRAN DE CHARGEMENT PRO */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            background: #0a0e27;
        }
        .loading-logo {
            font-size: 48px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .spinner-advanced {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
        }
        .spinner-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }
        .spinner-circle:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 10px;
            left: 10px;
            border-top-color: #ff6b00;
            animation: spin 2s linear infinite reverse;
        }
        .spinner-circle:nth-child(3) {
            width: 40px;
            height: 40px;
            top: 20px;
            left: 20px;
            border-top-color: #00d4ff;
            animation: spin 2.5s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #00d4ff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .loading-subtext {
            color: #666;
            font-size: 12px;
            text-align: center;
        }
        .progress-bar {
            width: 200px;
            height: 3px;
            background: #1a1f3a;
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #ff6b00);
            border-radius: 2px;
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        /* PAGE DÉTAILS PRODUIT */
        .details-page {
            display: none;
        }
        .details-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .back-btn {
            background: #2d3561;
            border: none;
            color: #00d4ff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #3d4571;
        }
        /* GALERIE */
        .gallery-container {
            margin-bottom: 30px;
        }
        .gallery-main {
            width: 100%;
            height: 300px;
            background: #1a1f3a;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-thumbnails {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .gallery-thumbnails img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            object-fit: cover;
        }
        .gallery-thumbnails img:hover,
        .gallery-thumbnails img.active {
            border-color: #00d4ff;
        }
        /* VIDÉO */
        .video-container {
            margin-bottom: 30px;
            background: #1a1f3a;
            border-radius: 12px;
            overflow: hidden;
        }
        .video-container video {
            width: 100%;
            height: auto;
            display: block;
        }
        /* INFOS PRODUIT */
        .product-details {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2d3561;
        }
        .product-details h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 22px;
        }
        .product-details p {
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .details-tarifs {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .details-tarifs-title {
            color: #00d4ff;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .details-tarifs div {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            color: #aaa;
            font-size: 14px;
        }
        .details-disponibilite {
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-block;
        }
        .details-disponibilite.disponible {
            background: rgba(76, 175, 80, 0.2);
            color: #4cb050;
        }
        .details-disponibilite.indisponible {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
    </style>
</head>
<body>
    <!-- ÉCRAN DE CHARGEMENT -->
    <div id="loadingScreen" class="loading-container">
        <div class="loading-logo">🏪</div>
        <div class="spinner-advanced">
            <div class="spinner-circle"></div>
            <div class="spinner-circle"></div>
            <div class="spinner-circle"></div>
        </div>
        <div class="loading-text">SVR Shop</div>
        <div class="loading-subtext">Chargement de votre boutique...</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <!-- PAGE MENU -->
    <div id="menuPage" style="display: none;">
        <h1>🏪 SVR Shop</h1>
        
        <!-- BANNIÈRE CONCOURS -->
        <div id="concoursBanner" style="display: none;" class="concours-banner">
            <img id="concoursImage" src="" alt="Concours">
            <div class="concours-content">
                <div class="concours-title">🎉 Concours</div>
                <div class="concours-text" id="concoursText"></div>
            </div>
        </div>

        <!-- MENU PRODUITS -->
        <div class="menu" id="menu"></div>
        <a href="admin.html" class="admin-btn">⚙️ Admin</a>
    </div>

    <!-- PAGE DÉTAILS PRODUIT -->
    <div id="detailsPage" class="details-page">
        <div class="details-header">
            <button class="back-btn" onclick="goBackToMenu()">← Retour</button>
        </div>

        <!-- GALERIE -->
        <div class="gallery-container">
            <div class="gallery-main">
                <img id="mainImage" src="" alt="Produit">
            </div>
            <div class="gallery-thumbnails" id="thumbnails"></div>
        </div>

        <!-- VIDÉO -->
        <div id="videoContainer" class="video-container" style="display: none;">
            <video id="detailVideo" controls autoplay style="width: 100%; height: auto;"></video>
        </div>

        <!-- INFOS -->
        <div class="product-details">
            <h2 id="detailName"></h2>
            <p id="detailDesc"></p>
            <div class="details-tarifs">
                <div class="details-tarifs-title">💰 Tarifs</div>
                <div id="detailTarifs"></div>
            </div>
            <div id="detailDisponibilite"></div>
        </div>

        <a href="admin.html" class="admin-btn">⚙️ Admin</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Support pour Telegram Mini App
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // VOS DONNÉES FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.goBackToMenu = function() {
            document.getElementById("menuPage").style.display = "block";
            document.getElementById("detailsPage").style.display = "none";
        };

        window.openProductDetails = function(product) {
            // Images
            const images = product.images ? product.images.split(" | ").filter(img => img.trim()) : [];
            const mainImage = images[0] || (product.image || "https://via.placeholder.com/150?text=No+Image");

            document.getElementById("mainImage").src = mainImage;

            // Galerie thumbnails
            const thumbnailsContainer = document.getElementById("thumbnails");
            thumbnailsContainer.innerHTML = "";
            images.forEach((img, index) => {
                const thumb = document.createElement("img");
                thumb.src = img;
                thumb.className = index === 0 ? "active" : "";
                thumb.onclick = () => {
                    document.getElementById("mainImage").src = img;
                    document.querySelectorAll(".gallery-thumbnails img").forEach(t => t.classList.remove("active"));
                    thumb.classList.add("active");
                };
                thumbnailsContainer.appendChild(thumb);
            });

            // Vidéo
            const videoContainer = document.getElementById("videoContainer");
            if (product.video) {
                document.getElementById("detailVideo").src = product.video;
                videoContainer.style.display = "block";
            } else {
                videoContainer.style.display = "none";
            }

            // Infos
            document.getElementById("detailName").textContent = product.name;
            document.getElementById("detailDesc").textContent = product.description;

            // Tarifs
            const tarifsArray = product.tarifs ? product.tarifs.split(" | ") : [];
            const tarifsHTML = tarifsArray.map(t => `<div><span>${t}</span></div>`).join("");
            document.getElementById("detailTarifs").innerHTML = tarifsHTML;

            // Disponibilité
            const disponibilite = product.stock > 0 ? "Disponible" : "Non disponible";
            const classDisponibilite = product.stock > 0 ? "disponible" : "indisponible";
            document.getElementById("detailDisponibilite").innerHTML = `
                <div class="details-disponibilite ${classDisponibilite}">
                    ${disponibilite ? '✓' : '✕'} ${disponibilite}
                </div>
            `;

            // Afficher la page de détails
            document.getElementById("menuPage").style.display = "none";
            document.getElementById("detailsPage").style.display = "block";
        };

        async function loadProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                const menu = document.getElementById("menu");
                menu.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    const disponibilite = product.stock > 0 ? "Disponible" : "Non disponible";
                    const classDisponibilite = product.stock > 0 ? "disponible" : "indisponible";
                    
                    // Image par défaut si vide
                    const image = product.image || "https://via.placeholder.com/150?text=No+Image";
                    
                    // Afficher les tarifs
                    const tarifsArray = product.tarifs ? product.tarifs.split(" | ") : [];
                    const tarifsHTML = tarifsArray.length > 0 ? `
                        <div class="tarifs">
                            ${tarifsArray.map(t => `<div><span>${t}</span></div>`).join('')}
                        </div>
                    ` : '';

                    const html = `
                        <div class="product" onclick="openProductDetails(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                            <img src="${image}" alt="${product.name}">
                            <div class="product-info">
                                <h3>${product.name}</h3>
                                <p>${product.description}</p>
                                ${tarifsHTML}
                                <span class="disponibilite ${classDisponibilite}">
                                    ${disponibilite ? '✓' : '✕'} ${disponibilite}
                                </span>
                            </div>
                        </div>
                    `;
                    menu.innerHTML += html;
                });

                // Charger la bannière concours
                loadConcours();

                // Masquer l'écran de chargement et afficher le menu
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("menuPage").style.display = "block";

            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("menuPage").style.display = "block";
            }
        }

        async function loadConcours() {
            try {
                const querySnapshot = await getDocs(collection(db, "concours"));
                querySnapshot.forEach((doc) => {
                    const concours = doc.data();
                    if (concours.description) {
                        document.getElementById("concoursText").textContent = concours.description;
                        if (concours.image) {
                            document.getElementById("concoursImage").src = concours.image;
                        }
                        document.getElementById("concoursBanner").style.display = "flex";
                    }
                });
            } catch (error) {
                console.error("Erreur concours:", error);
            }
        }

        loadProducts();
    </script>
</body>
</html>
