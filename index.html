<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop - Menu Produits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .concours-banner {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .concours-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .concours-description {
            font-size: 16px;
            line-height: 1.6;
            color: #ddd;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
            color: #667eea;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #84fab0;
            margin-bottom: 8px;
        }

        .product-stock {
            font-size: 12px;
            color: #aaa;
        }

        .product-stock.en-stock {
            color: #84fab0;
        }

        .product-stock.rupture {
            color: #f5576c;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            position: relative;
            margin-bottom: 20px;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #667eea;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #667eea;
        }

        .modal-description {
            font-size: 14px;
            color: #ddd;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .tariffs {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #667eea;
        }

        .tariff-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }

        .tariff-item:last-child {
            border-bottom: none;
        }

        .tariff-quantity {
            font-weight: bold;
            color: #84fab0;
        }

        .tariff-price {
            color: #f5576c;
            font-weight: bold;
        }

        .gallery {
            margin-bottom: 20px;
        }

        .gallery-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #ddd;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .gallery-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .gallery-img:hover {
            transform: scale(1.05);
        }

        .video-container {
            margin-bottom: 20px;
        }

        .video-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #ddd;
        }

        .video-player {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stock-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .stock-badge.en-stock {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #000;
        }

        .stock-badge.rupture {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }

        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            z-index: 100;
            transition: all 0.3s;
        }

        .admin-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ SVR Shop</h1>
            <p style="color: #aaa; font-size: 14px;">Menu Produits</p>
        </div>

        <div id="concours-section" class="concours-banner" style="display: none;">
            <img id="concours-image" class="concours-image" alt="Concours">
            <div id="concours-description" class="concours-description"></div>
        </div>

        <div id="products-grid" class="menu-grid"></div>
    </div>

    <!-- PRODUCT MODAL -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <button class="back-btn" onclick="closeModal()">← Retour</button>
            
            <h2 class="modal-title" id="modal-name"></h2>
            <p class="modal-description" id="modal-description"></p>
            <div class="tariffs" id="modal-tariffs"></div>
            <div id="modal-stock"></div>

            <div class="gallery" id="gallery-section" style="display: none;">
                <div class="gallery-title">🖼️ Galerie</div>
                <div class="gallery-grid" id="modal-gallery"></div>
            </div>

            <div class="video-container" id="video-section" style="display: none;">
                <div class="video-title">🎥 Vidéo</div>
                <video id="modal-video" class="video-player" controls></video>
            </div>
        </div>
    </div>

    <a href="/admin" class="admin-link">⚙️ Admin</a>

    <script>
        let shopData = {
            concours: {
                description: "Bienvenue sur SVR Shop!",
                image: "https://via.placeholder.com/1600x900"
            },
            products: [
                {
                    id: 1,
                    name: "GARY PAYTON",
                    description: "Produit premium",
                    tariffs: "2g=20|30g=80|20g=150",
                    stock: "En stock",
                    image: "https://via.placeholder.com/250",
                    images: [],
                    video: ""
                }
            ]
        };

        // Load data from server
        async function loadData() {
            try {
                const response = await fetch('/data.json');
                if (response.ok) {
                    shopData = await response.json();
                } else {
                    console.log('Using default data');
                }
            } catch (error) {
                console.log('Using default data:', error);
            }

            // Display concours
            if (shopData.concours && shopData.concours.image) {
                document.getElementById('concours-section').style.display = 'block';
                document.getElementById('concours-image').src = shopData.concours.image;
                document.getElementById('concours-description').textContent = shopData.concours.description || '';
            }

            // Display products
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            if (!shopData.products || shopData.products.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #aaa; grid-column: 1/-1;">Aucun produit disponible</p>';
                return;
            }

            shopData.products.forEach(product => {
                const card = createProductCard(product);
                grid.appendChild(card);
            });
        }

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => openProductModal(product);

            const tariffs = product.tariffs.split('|');
            let minPrice = parseFloat(tariffs[0].split('=')[1]);
            tariffs.forEach(t => {
                const price = parseFloat(t.split('=')[1]);
                if (price < minPrice) minPrice = price;
            });

            const stockClass = product.stock === 'En stock' ? 'en-stock' : 'rupture';

            card.innerHTML = `
                <img src="${product.image}" class="product-image" alt="${product.name}">
                <div class="product-info">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">À partir de ${minPrice}€</div>
                    <div class="product-stock ${stockClass}">${product.stock}</div>
                </div>
            `;

            return card;
        }

        function openProductModal(product) {
            document.getElementById('modal-name').textContent = product.name;
            document.getElementById('modal-description').textContent = product.description || '';

            const tariffsList = document.getElementById('modal-tariffs');
            tariffsList.innerHTML = '';
            const tariffs = product.tariffs.split('|');

            tariffs.forEach(tariff => {
                const [qty, price] = tariff.split('=');
                tariffsList.innerHTML += `<div class="tariff-item"><span class="tariff-quantity">${qty}</span> <span class="tariff-price">${price}€</span></div>`;
            });

            const stockClass = product.stock === 'En stock' ? 'en-stock' : 'rupture';
            document.getElementById('modal-stock').innerHTML = `<div class="stock-badge ${stockClass}">${product.stock}</div>`;

            if (product.images && product.images.length > 0) {
                document.getElementById('gallery-section').style.display = 'block';
                const galleryGrid = document.getElementById('modal-gallery');
                galleryGrid.innerHTML = '';
                product.images.forEach((img) => {
                    const imgEl = document.createElement('img');
                    imgEl.src = img;
                    imgEl.className = 'gallery-img';
                    galleryGrid.appendChild(imgEl);
                });
            } else {
                document.getElementById('gallery-section').style.display = 'none';
            }

            if (product.video) {
                document.getElementById('video-section').style.display = 'block';
                document.getElementById('modal-video').src = product.video;
            } else {
                document.getElementById('video-section').style.display = 'none';
            }

            document.getElementById('productModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('show');
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
