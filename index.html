<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop - Menu Produits</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #aaa;
            font-size: 14px;
        }

        .error-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
            text-align: center;
        }

        .error-icon {
            font-size: 60px;
        }

        .error-message {
            color: #f5576c;
            font-size: 18px;
            max-width: 300px;
            line-height: 1.6;
        }

        .retry-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .concours-banner {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .concours-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .concours-description {
            font-size: 16px;
            line-height: 1.6;
            color: #ddd;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        .product-nouveau {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #000;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
            color: #667eea;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #84fab0;
            margin-bottom: 8px;
        }

        .product-stock {
            font-size: 12px;
            color: #aaa;
        }

        .product-stock.en-stock {
            color: #84fab0;
        }

        .product-stock.rupture {
            color: #f5576c;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            position: relative;
            margin-bottom: 20px;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #667eea;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #667eea;
        }

        .modal-description {
            font-size: 14px;
            color: #ddd;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .tariffs {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #667eea;
        }

        .tariff-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }

        .tariff-item:last-child {
            border-bottom: none;
        }

        .tariff-quantity {
            font-weight: bold;
            color: #84fab0;
        }

        .tariff-price {
            color: #f5576c;
            font-weight: bold;
        }

        .gallery {
            margin-bottom: 20px;
        }

        .gallery-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #ddd;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .gallery-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .video-container {
            margin-bottom: 20px;
        }

        .video-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #ddd;
        }

        .video-player {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stock-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .stock-badge.en-stock {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #000;
        }

        .stock-badge.rupture {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }

        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            z-index: 100;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .badges {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 12px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="loading-container" class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Chargement du menu...</div>
    </div>

    <div id="error-container" style="display: none;" class="error-screen">
        <div class="error-icon">❌</div>
        <div class="error-message" id="error-text"></div>
        <button class="retry-btn" onclick="location.reload()">Réessayer</button>
    </div>

    <div id="main-container" style="display: none;">
        <div class="container">
            <div class="header">
                <h1>🛍️ SVR Shop</h1>
                <p style="color: #aaa; font-size: 14px;">Menu Produits</p>
            </div>

            <div id="concours-section" class="concours-banner" style="display: none;">
                <img id="concours-image" class="concours-image" alt="Concours">
                <div id="concours-description" class="concours-description"></div>
            </div>

            <div id="products-grid" class="menu-grid"></div>
        </div>
    </div>

    <!-- PRODUCT MODAL -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <button class="back-btn" onclick="closeModal()">← Retour</button>
            
            <h2 class="modal-title" id="modal-name"></h2>
            <p class="modal-description" id="modal-description"></p>
            <div class="badges" id="modal-badges"></div>
            <div class="tariffs" id="modal-tariffs"></div>
            <div id="modal-stock"></div>

            <div class="gallery" id="gallery-section" style="display: none;">
                <div class="gallery-title">🖼️ Galerie</div>
                <div class="gallery-grid" id="modal-gallery"></div>
            </div>

            <div class="video-container" id="video-section" style="display: none;">
                <div class="video-title">🎥 Vidéo</div>
                <video id="modal-video" class="video-player" controls autoplay></video>
            </div>
        </div>
    </div>

    <a href="/admin" class="admin-link">⚙️ Admin</a>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const loadTimeout = setTimeout(() => {
            showError("La connexion à la base de données prend trop de temps. Vérifiez votre connexion réseau.");
        }, 10000);

        async function loadData() {
            try {
                const concoursDoc = await db.collection('concours').doc('main').get();
                if (concoursDoc.exists) {
                    document.getElementById('concours-section').style.display = 'block';
                    document.getElementById('concours-image').src = concoursDoc.data().image;
                    document.getElementById('concours-description').textContent = concoursDoc.data().description;
                }

                const productsSnapshot = await db.collection('products').get();
                const productsGrid = document.getElementById('products-grid');
                productsGrid.innerHTML = '';

                if (productsSnapshot.empty) {
                    productsGrid.innerHTML = '<p style="text-align: center; color: #aaa; grid-column: 1/-1;">Aucun produit disponible</p>';
                    showMain();
                    return;
                }

                productsSnapshot.forEach((doc) => {
                    const product = { id: doc.id, ...doc.data() };
                    const card = createProductCard(product);
                    productsGrid.appendChild(card);
                });

                showMain();
                clearTimeout(loadTimeout);

            } catch (error) {
                console.error('Erreur:', error);
                showError("Erreur de chargement: " + error.message);
            }
        }

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => openProductModal(product);

            const tariffs = product.tariffs.split('|');
            let minPrice = parseFloat(tariffs[0].split('=')[1]);
            tariffs.forEach(t => {
                const price = parseFloat(t.split('=')[1]);
                if (price < minPrice) minPrice = price;
            });

            const stockClass = product.stock === 'En stock' ? 'en-stock' : 'rupture';
            const badgeHTML = `<div class="product-badge product-nouveau">✨ Nouveau</div>`;

            card.innerHTML = `
                <img src="${product.image}" class="product-image" alt="${product.name}">
                ${badgeHTML}
                <div class="product-info">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">À partir de ${minPrice}€</div>
                    <div class="product-stock ${stockClass}">${product.stock}</div>
                </div>
            `;

            return card;
        }

        function openProductModal(product) {
            document.getElementById('modal-name').textContent = product.name;
            document.getElementById('modal-description').textContent = product.description || '';

            const tariffsList = document.getElementById('modal-tariffs');
            tariffsList.innerHTML = '';
            const tariffs = product.tariffs.split('|');

            tariffs.forEach(tariff => {
                const [qty, price] = tariff.split('=');
                tariffsList.innerHTML += `<div class="tariff-item"><span class="tariff-quantity">${qty}</span> <span class="tariff-price">${price}€</span></div>`;
            });

            const stockClass = product.stock === 'En stock' ? 'en-stock' : 'rupture';
            document.getElementById('modal-stock').innerHTML = `<div class="stock-badge ${stockClass}">${product.stock}</div>`;

            if (product.images && product.images.length > 0) {
                document.getElementById('gallery-section').style.display = 'block';
                const galleryGrid = document.getElementById('modal-gallery');
                galleryGrid.innerHTML = '';
                product.images.forEach((img) => {
                    const imgEl = document.createElement('img');
                    imgEl.src = img;
                    imgEl.className = 'gallery-img';
                    galleryGrid.appendChild(imgEl);
                });
            } else {
                document.getElementById('gallery-section').style.display = 'none';
            }

            if (product.video) {
                document.getElementById('video-section').style.display = 'block';
                document.getElementById('modal-video').src = product.video;
            } else {
                document.getElementById('video-section').style.display = 'none';
            }

            document.getElementById('productModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('show');
        }

        function showMain() {
            document.getElementById('loading-container').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loading-container').style.display = 'none';
            document.getElementById('error-container').style.display = 'flex';
            document.getElementById('error-text').textContent = message;
        }

        loadData();
    </script>
</body>
</html>
