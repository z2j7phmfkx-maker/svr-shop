<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%); color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 32px; color: #667eea; margin-bottom: 10px; }
        .concours { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .concours img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #667eea; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-name { color: #667eea; font-weight: bold; margin-bottom: 5px; }
        .card-price { color: #84fab0; font-weight: bold; margin-bottom: 5px; }
        .card-stock { font-size: 12px; color: #aaa; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal.show { display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; }
        .modal-content { background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; width: 90%; max-width: 600px; padding: 30px; position: relative; margin-bottom: 20px; }
        .close { position: absolute; right: 20px; top: 20px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }
        .modal-title { font-size: 24px; color: #667eea; margin-bottom: 15px; }
        .tariffs { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 3px solid #667eea; }
        .tariff-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tariff-qty { color: #84fab0; font-weight: bold; }
        .tariff-price { color: #f5576c; font-weight: bold; }
        .tariff-promo { color: #ffd700; font-weight: bold; }
        .original-price { text-decoration: line-through; color: #aaa; }
        .admin-link { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ SVR Shop</h1>
        </div>
        <div id="concours" class="concours" style="display:none;">
            <img id="concours-img" alt="">
            <p id="concours-desc"></p>
        </div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="close" onclick="closeModal()">&times;</button>
            <h2 class="modal-title" id="modal-name"></h2>
            <p id="modal-desc" style="margin-bottom: 20px;"></p>
            <div class="tariffs" id="tariffs"></div>
            <div id="stock" style="margin-bottom: 20px;"></div>
        </div>
    </div>

    <a href="/admin" class="admin-link">⚙️ Admin</a>

    <script>
        let shopData = { concours: {}, products: [], promos: [] };

        async function loadData() {
            try {
                const response = await fetch('/data.json');
                shopData = await response.json();
            } catch (error) {
                console.log('Error:', error);
            }

            // Concours
            if (shopData.concours && shopData.concours.image) {
                document.getElementById('concours').style.display = 'block';
                document.getElementById('concours-img').src = shopData.concours.image;
                document.getElementById('concours-desc').textContent = shopData.concours.description;
            }

            // Products
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            if (!shopData.products || shopData.products.length === 0) {
                grid.innerHTML = '<p style="color: #aaa;">Aucun produit</p>';
                return;
            }

            shopData.products.forEach((product, index) => {
                const tariffs = product.tariffs.split('|');
                let minPrice = parseFloat(tariffs[0].split('=')[1]);
                tariffs.forEach(t => {
                    const price = parseFloat(t.split('=')[1]);
                    if (price < minPrice) minPrice = price;
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <div class="card-info">
                        <div class="card-name">${product.name}</div>
                        <div class="card-price">À partir de ${minPrice}€</div>
                        <div class="card-stock">${product.stock}</div>
                    </div>
                `;
                card.onclick = () => openModal(product, index);
                grid.appendChild(card);
            });
        }

        function openModal(product, productIndex) {
            document.getElementById('modal-name').textContent = product.name;
            document.getElementById('modal-desc').textContent = product.description;

            const tariffsList = document.getElementById('tariffs');
            tariffsList.innerHTML = '';

            const tariffs = product.tariffs.split('|');
            tariffs.forEach(tariff => {
                const [qty, price] = tariff.split('=');
                const promo = shopData.promos && shopData.promos.find(p => p.productId === productIndex && p.quantity === qty);

                let html = `<div class="tariff-item"><span class="tariff-qty">${qty}</span>`;

                if (promo) {
                    html += ` <span><span class="original-price">${price}€</span> <span class="tariff-promo">${promo.price}€ (-${promo.percent}%)</span></span>`;
                } else {
                    html += ` <span class="tariff-price">${price}€</span>`;
                }

                html += `</div>`;
                tariffsList.innerHTML += html;
            });

            document.getElementById('stock').innerHTML = `<div style="color: ${product.stock === 'En stock' ? '#84fab0' : '#f5576c'};">${product.stock}</div>`;
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        loadData();
    </script>
</body>
</html>
