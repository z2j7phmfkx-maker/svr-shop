<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1e1e2e; color: #fff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #667eea; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product { background: #333; padding: 15px; border-radius: 8px; }
        .product img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .product h3 { color: #667eea; margin-bottom: 5px; }
        .product p { font-size: 12px; color: #aaa; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
        .admin { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; z-index: 100; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ SVR Shop</h1>
        <div id="content" class="loading">Chargement...</div>
    </div>
    <a href="/admin" class="admin">⚙️ Admin</a>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection('products').get().then(snapshot => {
            let html = '<div class="products">';
            snapshot.forEach(doc => {
                const p = doc.data();
                html += `<div class="product">
                    <img src="${p.image}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p>${p.description || ''}</p>
                    <p><b>Tarifs:</b> ${p.tariffs}</p>
                    <p><b>Stock:</b> ${p.stock}</p>
                </div>`;
            });
            html += '</div>';
            document.getElementById('content').innerHTML = html || '<p class="loading">Aucun produit</p>';
        }).catch(err => {
            document.getElementById('content').innerHTML = '<p class="loading">Erreur: ' + err.message + '</p>';
        });
    </script>
</body>
</html>
