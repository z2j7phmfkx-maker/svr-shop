<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* LOADING SCREEN */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-screen.hidden {
            display: none;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #00d4ff;
            font-size: 16px;
            font-weight: 600;
        }

        /* CONCOURS BANNER */
        .concours-banner {
            background: linear-gradient(135deg, #ff6b00 0%, #ff8c00 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(255, 107, 0, 0.3);
        }

        .concours-banner img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .concours-banner h2 {
            color: white;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .concours-banner p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        /* MENU */
        h1 {
            color: #00d4ff;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .product-card {
            background: rgba(26, 31, 58, 0.8);
            border: 1px solid #2d3561;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .product-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #0f1428;
        }

        .product-info {
            padding: 12px;
        }

        .product-name {
            color: #00d4ff;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .product-price {
            color: #ff6b00;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .product-stock {
            font-size: 12px;
            color: #aaa;
        }

        .stock-available {
            color: #00ff88;
        }

        .stock-unavailable {
            color: #ff4444;
        }

        .badges {
            display: flex;
            gap: 5px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 3px 6px;
            border-radius: 3px;
        }

        /* MODALE */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border: 1px solid #2d3561;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            margin-top: 20px;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-modal {
            position: sticky;
            top: 0;
            right: 0;
            background: #1a1f3a;
            color: #00d4ff;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 15px;
            border: none;
            z-index: 10;
        }

        .close-modal:hover {
            color: #ff6b00;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .modal-title {
            color: #00d4ff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .modal-description {
            color: #b0b8d4;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .modal-tarifs {
            background: rgba(45, 53, 97, 0.5);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .modal-tarifs h4 {
            color: #ff6b00;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .tarif-item {
            color: #aaa;
            font-size: 13px;
            padding: 5px 0;
        }

        /* GALERIE */
        .gallery {
            margin: 20px 0;
        }

        .gallery h4 {
            color: #00d4ff;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .gallery-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .gallery-image {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #2d3561;
            transition: all 0.3s ease;
        }

        .gallery-image:hover {
            border-color: #00d4ff;
            transform: scale(1.05);
        }

        /* VIDÉO */
        .video-section {
            margin: 20px 0;
        }

        .video-section h4 {
            color: #00d4ff;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .video-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #0f1428;
        }

        .video-container video {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ADMIN BUTTON */
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #0a0e27;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.4);
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }

            .modal-content {
                max-width: 95%;
            }

            .gallery-images {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loading-text">SVR Shop</div>
    </div>

    <div class="container">
        <!-- CONCOURS -->
        <div id="concoursSection" class="concours-banner" style="display: none;">
            <img id="concoursImage" src="" alt="Concours" style="display: none;">
            <h2>🎉 Concours</h2>
            <p id="concoursDesc"></p>
        </div>

        <!-- TITRE -->
        <h1>📦 Catalogue</h1>

        <!-- GRILLE PRODUITS -->
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- MODALE DÉTAILS PRODUIT -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeProductModal()">&times;</button>
            <div class="modal-body">
                <img id="modalImage" src="" alt="Produit" class="modal-image">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-description" id="modalDescription"></div>
                <div class="modal-tarifs">
                    <h4>💰 Tarifs</h4>
                    <div id="modalTarifs"></div>
                </div>
                <div id="modalGallerySection" class="gallery" style="display: none;">
                    <h4>🖼️ Galerie</h4>
                    <div class="gallery-images" id="modalGallery"></div>
                </div>
                <div id="modalVideoSection" class="video-section" style="display: none;">
                    <h4>🎥 Vidéo</h4>
                    <div class="video-container" id="modalVideo"></div>
                </div>
                <div style="color: #aaa; font-size: 12px; margin-top: 15px;">
                    Disponibilité: <span id="modalStock"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- BOUTON ADMIN -->
    <a href="admin.html" class="admin-btn">⚙️ Admin</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        let allProducts = [];

        window.openProductModal = function(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            document.getElementById("modalImage").src = product.image || "https://via.placeholder.com/400";
            document.getElementById("modalTitle").textContent = product.name;
            document.getElementById("modalDescription").textContent = product.description;

            // Tarifs
            const tarifsHTML = product.tarifs.split('|').map(t => 
                `<div class="tarif-item">• ${t.trim()}</div>`
            ).join('');
            document.getElementById("modalTarifs").innerHTML = tarifsHTML;

            // Galerie
            const gallerySection = document.getElementById("modalGallerySection");
            if (product.images) {
                const images = product.images.split('|').filter(i => i.trim());
                if (images.length > 0) {
                    const galleryHTML = images.map(img => 
                        `<img src="${img.trim()}" alt="Galerie" class="gallery-image">`
                    ).join('');
                    document.getElementById("modalGallery").innerHTML = galleryHTML;
                    gallerySection.style.display = "block";
                } else {
                    gallerySection.style.display = "none";
                }
            } else {
                gallerySection.style.display = "none";
            }

            // Vidéo
            const videoSection = document.getElementById("modalVideoSection");
            if (product.video) {
                document.getElementById("modalVideo").innerHTML = `<video controls><source src="${product.video}"></video>`;
                videoSection.style.display = "block";
            } else {
                videoSection.style.display = "none";
            }

            // Stock
            const stockText = product.stock > 0 ? `✓ Disponible (${product.stock})` : "✕ Non disponible";
            const stockClass = product.stock > 0 ? "stock-available" : "stock-unavailable";
            document.getElementById("modalStock").innerHTML = `<span class="${stockClass}">${stockText}</span>`;

            document.getElementById("productModal").classList.add("active");
        };

        window.closeProductModal = function() {
            document.getElementById("productModal").classList.remove("active");
        };

        async function loadProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                let html = '';

                querySnapshot.forEach((doc) => {
                    const product = { id: doc.id, ...doc.data() };
                    allProducts.push(product);

                    const stockClass = product.stock > 0 ? "stock-available" : "stock-unavailable";
                    const stockText = product.stock > 0 ? "✓ Disponible" : "✕ Indisponible";
                    
                    const badges = [];
                    if (product.image) badges.push('📸');
                    if (product.images && product.images.split('|').filter(i => i.trim()).length > 0) badges.push('🖼️');
                    if (product.video) badges.push('🎥');

                    html += `
                        <div class="product-card" onclick="openProductModal('${doc.id}')">
                            <img src="${product.image || 'https://via.placeholder.com/160'}" alt="${product.name}" class="product-image">
                            <div class="product-info">
                                <div class="product-name">${product.name}</div>
                                <div class="product-price">${product.tarifs.split('|')[0].trim()}</div>
                                <div class="product-stock"><span class="${stockClass}">${stockText}</span></div>
                                <div class="badges">${badges.join('')}</div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById("productsGrid").innerHTML = html;
            } catch (error) {
                console.error("Erreur:", error);
            }
        }

        async function loadConcours() {
            try {
                const docSnap = await getDoc(doc(db, "concours", "main"));
                if (docSnap.exists()) {
                    const concours = docSnap.data();
                    if (concours.description) {
                        document.getElementById("concoursDesc").textContent = concours.description;
                        if (concours.image) {
                            document.getElementById("concoursImage").src = concours.image;
                            document.getElementById("concoursImage").style.display = "block";
                        }
                        document.getElementById("concoursSection").style.display = "block";
                    }
                }
            } catch (error) {
                console.error("Erreur concours:", error);
            }
        }

        // Charger les données
        await loadProducts();
        await loadConcours();

        // Masquer le loading
        document.getElementById("loadingScreen").classList.add("hidden");

        // Fermer modale en cliquant dehors
        window.onclick = function(event) {
            const modal = document.getElementById("productModal");
            if (event.target == modal) {
                modal.classList.remove("active");
            }
        };
    </script>
</body>
</html>
