<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVR Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0e27; 
            color: white; 
            font-family: Arial, sans-serif; 
            padding: 20px;
        }
        h1 { margin-bottom: 30px; text-align: center; color: #00d4ff; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product { 
            background: linear-gradient(135deg, #1a1f3a, #2d3561);
            border-radius: 12px; 
            overflow: hidden;
            border: 2px solid #00d4ff;
        }
        .product img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover;
        }
        .product-info { padding: 15px; }
        .product h3 { margin-bottom: 5px; }
        .product p { font-size: 12px; color: #aaa; margin-bottom: 10px; }
        .price { color: #00d4ff; font-weight: bold; margin-bottom: 5px; }
        .stock { font-size: 12px; color: #888; }
        .admin-btn { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: #ff6b00; 
            padding: 10px 20px; 
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            z-index: 100;
        }
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid #2d3561;
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #00d4ff;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- ÉCRAN DE CHARGEMENT -->
    <div id="loadingScreen" class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Chargement en cours...</div>
    </div>

    <!-- LE MENU (caché au départ) -->
    <div id="mainContent" style="display: none;">
        <h1>🏪 SVR Shop</h1>
        <div class="menu" id="menu"></div>
        <a href="admin.html" class="admin-btn">⚙️ Admin</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Support pour Telegram Mini App
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // VOS DONNÉES FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCyrxd0NSQQfBjSy_Rhz9vF-moHxl1D2dk",
            authDomain: "tovasvr.firebaseapp.com",
            projectId: "tovasvr",
            storageBucket: "tovasvr.firebasestorage.app",
            messagingSenderId: "747176572181",
            appId: "1:747176572181:web:0ce458b78d97f93f8e251c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                const menu = document.getElementById("menu");
                menu.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    const html = `
                        <div class="product">
                            <img src="${product.image}" alt="${product.name}">
                            <div class="product-info">
                                <h3>${product.name}</h3>
                                <p>${product.description}</p>
                                <div class="price">${product.price}€</div>
                                <div class="stock">Stock: ${product.stock}</div>
                            </div>
                        </div>
                    `;
                    menu.innerHTML += html;
                });

                // Masquer l'écran de chargement et afficher le menu
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("mainContent").style.display = "block";

            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById("menu").innerHTML = "<p>Erreur de chargement</p>";
                document.getElementById("loadingScreen").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
            }
        }

        loadProducts();
    </script>
</body>
</html>
